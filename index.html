调用比例 3.异常数量。状态：关闭->打开(超阈值)->半开(试探)->关闭/打开。Sentinel支持慢调用比例和异常比例两种策略。",answer:"指标：1.异常比例 2.慢调用比例 3.异常数量。状态：关闭->打开(超阈值)->半开(试探)->关闭/打开。Sentinel支持慢调用比例和异常比例两种策略。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-38',title:"如何设计降级策略？",category:'scenario',difficulty:'medium',content:"降级方式：1.返回默认值 2.返回缓存 3.关闭非核心功能 4.简化逻辑 5.人工开关。分级：P0(不可降级)、P1(可简化)、P2(可关闭)。",answer:"降级方式：1.返回默认值 2.返回缓存 3.关闭非核心功能 4.简化逻辑 5.人工开关。分级：P0(不可降级)、P1(可简化)、P2(可关闭)。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-39',title:"如何设计重试策略？",category:'scenario',difficulty:'medium',content:"原则：1.幂等操作才重试 2.指数退避(1s,2s,4s...) 3.最大重试次数 4.重试不同实例 5.记录重试日志。Spring Retry/Resilience4j。",answer:"原则：1.幂等操作才重试 2.指数退避(1s,2s,4s...) 3.最大重试次数 4.重试不同实例 5.记录重试日志。Spring Retry/Resilience4j。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-40',title:"如何设计超时策略？",category:'scenario',difficulty:'easy',content:"原则：1.设置合理的超时时间 2.区分连接超时和读取超时 3.上游超时>下游超时 4.超时后释放资源。HTTP：连接5s+读取30s。数据库：查询3s。",answer:"原则：1.设置合理的超时时间 2.区分连接超时和读取超时 3.上游超时>下游超时 4.超时后释放资源。HTTP：连接5s+读取30s。数据库：查询3s。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-41',title:"如何设计补偿机制？",category:'scenario',difficulty:'hard',content:"场景：分布式事务失败后需要补偿。方案：1.TCC(Try-Confirm-Cancel) 2.Saga(正向+补偿) 3.本地消息表+定时补偿 4.人工补偿。补偿操作必须幂等。",answer:"场景：分布式事务失败后需要补偿。方案：1.TCC(Try-Confirm-Cancel) 2.Saga(正向+补偿) 3.本地消息表+定时补偿 4.人工补偿。补偿操作必须幂等。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-42',title:"如何设计幂等方案？",category:'scenario',difficulty:'medium',content:"核心：同一操作执行多次结果相同。方案：1.唯一ID+去重表 2.数据库唯一约束 3.乐观锁(版本号) 4.状态机 5.Token机制。关键：全局唯一ID生成。",answer:"核心：同一操作执行多次结果相同。方案：1.唯一ID+去重表 2.数据库唯一约束 3.乐观锁(版本号) 4.状态机 5.Token机制。关键：全局唯一ID生成。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-43',title:"如何设计数据一致性方案？",category:'scenario',difficulty:'hard',content:"强一致：2PC、Paxos/Raft。最终一致：1.消息队列 2.binlog同步 3.定时对账 4.补偿机制。根据业务选择：金融用强一致，社交用最终一致。",answer:"强一致：2PC、Paxos/Raft。最终一致：1.消息队列 2.binlog同步 3.定时对账 4.补偿机制。根据业务选择：金融用强一致，社交用最终一致。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-44',title:"如何设计灰度发布平台？",category:'scenario',difficulty:'hard',content:"功能：1.灰度规则配置 2.流量分配 3.效果对比 4.一键回滚 5.多维度灰度(用户/地域/设备)。架构：网关层路由+配置中心+监控。",answer:"功能：1.灰度规则配置 2.流量分配 3.效果对比 4.一键回滚 5.多维度灰度(用户/地域/设备)。架构：网关层路由+配置中心+监控。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-45',title:"如何设计链路追踪？",category:'scenario',difficulty:'hard',content:"OpenTelemetry标准。核心：1.TraceID(全局唯一) 2.SpanID(操作标识) 3.ParentSpanID(调用关系)。采样：1.全量(性能差) 2.概率 3.自适应。",answer:"OpenTelemetry标准。核心：1.TraceID(全局唯一) 2.SpanID(操作标识) 3.ParentSpanID(调用关系)。采样：1.全量(性能差) 2.概率 3.自适应。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-46',title:"如何设计服务网格？",category:'scenario',difficulty:'hard',content:"数据面：Sidecar代理(Envoy)拦截所有流量。控制面：1.Pilot(服务发现+路由) 2.Citadel(证书管理) 3.Galley(配置验证)。Istio是主流实现。",answer:"数据面：Sidecar代理(Envoy)拦截所有流量。控制面：1.Pilot(服务发现+路由) 2.Citadel(证书管理) 3.Galley(配置验证)。Istio是主流实现。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-47',title:"如何设计混沌工程？",category:'scenario',difficulty:'hard',content:"原则：1.定义稳态假设 2.模拟真实事件 3.在生产环境运行 4.最小爆炸半径 5.自动化。工具：Chaos Mesh、LitmusChaos。实验：网络延迟、节点宕机、磁盘满。",answer:"原则：1.定义稳态假设 2.模拟真实事件 3.在生产环境运行 4.最小爆炸半径 5.自动化。工具：Chaos Mesh、LitmusChaos。实验：网络延迟、节点宕机、磁盘满。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-48',title:"如何设计SLO/SLI/SLA？",category:'scenario',difficulty:'medium',content:"SLI(指标)：延迟P99、可用性、错误率。SLO(目标)：P99<200ms、可用性>99.9%。SLA(协议)：不满足SLO的赔偿条款。Error Budget=1-SLO，用于决定是否发版。",answer:"SLI(指标)：延迟P99、可用性、错误率。SLO(目标)：P99<200ms、可用性>99.9%。SLA(协议)：不满足SLO的赔偿条款。Error Budget=1-SLO，用于决定是否发版。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-49',title:"如何设计On-Call体系？",category:'scenario',difficulty:'medium',content:"1.轮值制度(Primary+Secondary) 2.升级路径(L1->L2->L3) 3.Runbook(操作手册) 4.告警分级 5.事后复盘(Blameless)。目标：5分钟响应、30分钟恢复。",answer:"1.轮值制度(Primary+Secondary) 2.升级路径(L1->L2->L3) 3.Runbook(操作手册) 4.告警分级 5.事后复盘(Blameless)。目标：5分钟响应、30分钟恢复。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-50',title:"如何设计灾备方案？",category:'scenario',difficulty:'hard',content:"RPO(恢复点目标)：可接受的数据丢失量。RTO(恢复时间目标)：恢复服务的时间。方案：1.主备(冷备/热备) 2.双活 3.两地三中心。定期灾备演练。",answer:"RPO(恢复点目标)：可接受的数据丢失量。RTO(恢复时间目标)：恢复服务的时间。方案：1.主备(冷备/热备) 2.双活 3.两地三中心。定期灾备演练。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-51',title:"如何设计容量评估？",category:'scenario',difficulty:'medium',content:"步骤：1.收集当前指标(QPS、延迟、资源) 2.压测确定单机极限 3.计算安全容量(极限*70%) 4.规划扩容阈值 5.制定扩容方案。关注木桶效应。",answer:"步骤：1.收集当前指标(QPS、延迟、资源) 2.压测确定单机极限 3.计算安全容量(极限*70%) 4.规划扩容阈值 5.制定扩容方案。关注木桶效应。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-52',title:"如何设计技术方案评审？",category:'scenario',difficulty:'easy',content:"评审内容：1.需求理解 2.方案设计(架构图) 3.技术选型 4.性能和安全 5.降级和回滚 6.工作量评估。参与者：架构师、开发、测试、运维。",answer:"评审内容：1.需求理解 2.方案设计(架构图) 3.技术选型 4.性能和安全 5.降级和回滚 6.工作量评估。参与者：架构师、开发、测试、运维。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-53',title:"如何设计代码审查规范？",category:'scenario',difficulty:'easy',content:"规范：1.每次PR<400行 2.必须有人Approve 3.CI必须通过 4.关注：逻辑正确性、安全性、性能、可读性 5.建设性反馈。工具：GitHub/GitLab MR。",answer:"规范：1.每次PR<400行 2.必须有人Approve 3.CI必须通过 4.关注：逻辑正确性、安全性、性能、可读性 5.建设性反馈。工具：GitHub/GitLab MR。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-54',title:"如何设计技术债务管理？",category:'scenario',difficulty:'medium',content:"1.登记技术债务(类型、影响、修复成本) 2.按优先级排序 3.每个迭代分配20%时间还债 4.新代码不允许增加债务 5.定期Review。工具：JIRA标签。",answer:"1.登记技术债务(类型、影响、修复成本) 2.按优先级排序 3.每个迭代分配20%时间还债 4.新代码不允许增加债务 5.定期Review。工具：JIRA标签。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-55',title:"如何设计知识库？",category:'scenario',difficulty:'medium',content:"内容：1.架构文档 2.API文档 3.Runbook 4.最佳实践 5.故障案例。工具：Confluence、Notion、GitBook。原则：写有用的文档、保持更新、易于搜索。",answer:"内容：1.架构文档 2.API文档 3.Runbook 4.最佳实践 5.故障案例。工具：Confluence、Notion、GitBook。原则：写有用的文档、保持更新、易于搜索。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'os-cmd-1',title:"Linux中ls命令的作用和使用方法？",category:'os',difficulty:'easy',content:"ls命令用于列出目录内容。常用参数：-a显示隐藏 -l详细 -h人类可读 -R递归。",answer:"ls是Linux常用命令，用于列出目录内容。常用参数：-a显示隐藏 -l详细 -h人类可读 -R递归。ls命令用于查看目录内容。掌握ls是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-2',title:"Linux中cd命令的作用和使用方法？",category:'os',difficulty:'easy',content:"cd命令用于切换目录。常用参数：~家目录 .当前 ..上级 -上一次。",answer:"cd是Linux常用命令，用于切换目录。常用参数：~家目录 .当前 ..上级 -上一次。cd命令用于在目录间切换。掌握cd是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-3',title:"Linux中pwd命令的作用和使用方法？",category:'os',difficulty:'easy',content:"pwd命令用于显示当前目录。常用参数：无参数。",answer:"pwd是Linux常用命令，用于显示当前目录。常用参数：无参数。pwd显示当前工作目录的绝对路径。掌握pwd是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-4',title:"Linux中mkdir命令的作用和使用方法？",category:'os',difficulty:'easy',content:"mkdir命令用于创建目录。常用参数：-p递归创建 -m设置权限。",answer:"mkdir是Linux常用命令，用于创建目录。常用参数：-p递归创建 -m设置权限。mkdir用于创建新目录。掌握mkdir是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-5',title:"Linux中rm命令的作用和使用方法？",category:'os',difficulty:'easy',content:"rm命令用于删除文件或目录。常用参数：-r递归 -f强制 -i交互确认。",answer:"rm是Linux常用命令，用于删除文件或目录。常用参数：-r递归 -f强制 -i交互确认。rm用于删除文件，-rf组合需谨慎使用。掌握rm是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-6',title:"Linux中cp命令的作用和使用方法？",category:'os',difficulty:'easy',content:"cp命令用于复制文件。常用参数：-r递归 -p保留属性 -i覆盖确认。",answer:"cp是Linux常用命令，用于复制文件。常用参数：-r递归 -p保留属性 -i覆盖确认。cp用于复制文件或目录。掌握cp是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-7',title:"Linux中mv命令的作用和使用方法？",category:'os',difficulty:'easy',content:"mv命令用于移动或重命名。常用参数：-i覆盖确认 -f强制 -n不覆盖。",answer:"mv是Linux常用命令，用于移动或重命名。常用参数：-i覆盖确认 -f强制 -n不覆盖。mv用于移动文件或重命名。掌握mv是Linux运维和开发的基本技能。",sourceType:'builtin',source:"Linux命令速查",tags:["Linux", "命令"]},{id:'os-cmd-8',title:"Linux中cat命令的作用和使用方法？",category:'os',difficulty:'easy',content:"cat命令用于查看文件内容。常用参数：-n显示行号 -b非空行号。",answer:"cat是Linux常用命令，用于查看文件内容。常用参数：-n显示行号 -b非空行号。cat用于查看完整文件内容。掌握cat是Linux运维和开发的基本技能。",sour shMap使用CAS+synchronized锁桶节点，锁粒度更细。不允许key/value为null。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-2',title:"Java的线程生命周期？",category:'language',difficulty:'medium',content:"六种状态：NEW(新建)、RUNNABLE(可运行)、BLOCKED(阻塞)、WAITING(等待)、TIMED_WAITING(超时等待)、TERMINATED(终止)。wait()进入WAITING，sleep()进入TIMED_WAITING。",answer:"六种状态：NEW(新建)、RUNNABLE(可运行)、BLOCKED(阻塞)、WAITING(等待)、TIMED_WAITING(超时等待)、TERMINATED(终止)。wait()进入WAITING，sleep()进入TIMED_WAITING。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-3',title:"Java的类加载机制？双亲委派？",category:'language',difficulty:'hard',content:"类加载五步：加载->验证->准备->解析->初始化。双亲委派：先让父类加载器加载，父类无法加载时自己加载。保证核心类不被篡改。可以打破：SPI、Tomcat。",answer:"类加载五步：加载->验证->准备->解析->初始化。双亲委派：先让父类加载器加载，父类无法加载时自己加载。保证核心类不被篡改。可以打破：SPI、Tomcat。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-4',title:"Java的泛型擦除？",category:'language',difficulty:'medium',content:"Java泛型在编译时擦除为原始类型。List<String>运行时是List。通过反射可以绕过泛型检查。PECS原则：Producer Extends Consumer Super。",answer:"Java泛型在编译时擦除为原始类型。List<String>运行时是List。通过反射可以绕过泛型检查。PECS原则：Producer Extends Consumer Super。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-5',title:"Java的Stream API？",category:'language',difficulty:'medium',content:"Stream是函数式数据处理API。中间操作：filter/map/flatMap/sorted/distinct。终端操作：forEach/collect/reduce/count。并行流parallelStream()利用多核。",answer:"Stream是函数式数据处理API。中间操作：filter/map/flatMap/sorted/distinct。终端操作：forEach/collect/reduce/count。并行流parallelStream()利用多核。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-6',title:"Java的Optional类？",category:'language',difficulty:'easy',content:"Optional是空值安全的容器。创建：of()/ofNullable()/empty()。操作：isPresent()/ifPresent()/orElse()/orElseGet()/orElseThrow()/map()/flatMap()。避免null检查。",answer:"Optional是空值安全的容器。创建：of()/ofNullable()/empty()。操作：isPresent()/ifPresent()/orElse()/orElseGet()/orElseThrow()/map()/flatMap()。避免null检查。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-7',title:"Java的CompletableFuture？",category:'language',difficulty:'hard',content:"CompletableFuture是异步编程工具。创建：supplyAsync()/runAsync()。组合：thenApply/thenCompose/allOf/anyOf。异常：exceptionally/handle。比Future更灵活。",answer:"CompletableFuture是异步编程工具。创建：supplyAsync()/runAsync()。组合：thenApply/thenCompose/allOf/anyOf。异常：exceptionally/handle。比Future更灵活。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-8',title:"Java的Record类？",category:'language',difficulty:'easy',content:"Record是Java 14+的不可变数据类。自动生成：构造器、getter、equals、hashCode、toString。不可继承、字段final。适合DTO和值对象。",answer:"Record是Java 14+的不可变数据类。自动生成：构造器、getter、equals、hashCode、toString。不可继承、字段final。适合DTO和值对象。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-9',title:"Java的密封类(Sealed Class)？",category:'language',difficulty:'medium',content:"密封类(Java 17+)限制哪些类可以继承它。permits子句指定允许的子类。与switch模式匹配配合实现穷举检查。",answer:"密封类(Java 17+)限制哪些类可以继承它。permits子句指定允许的子类。与switch模式匹配配合实现穷举检查。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-10',title:"Java的虚拟线程(Virtual Thread)？",category:'language',difficulty:'hard',content:"虚拟线程(Java 21+)是轻量级线程，由JVM调度而非OS。创建：Thread.ofVirtual()。百万级虚拟线程可行。适合IO密集型任务。与平台线程1:1映射不同。",answer:"虚拟线程(Java 21+)是轻量级线程，由JVM调度而非OS。创建：Thread.ofVirtual()。百万级虚拟线程可行。适合IO密集型任务。与平台线程1:1映射不同。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-11',title:"C++的RAII？",category:'language',difficulty:'medium',content:"RAII(资源获取即初始化)：构造时获取资源，析构时释放资源。智能指针、lock_guard、fstream都是RAII。保证异常安全，防止资源泄漏。",answer:"RAII(资源获取即初始化)：构造时获取资源，析构时释放资源。智能指针、lock_guard、fstream都是RAII。保证异常安全，防止资源泄漏。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-12',title:"C++的移动语义和完美转发？",category:'language',difficulty:'hard',content:"移动语义：右值引用(&&)和move()转移资源。完美转发：forward<T>()保持值类别。引用折叠：T& && = T&。用于泛型编程和容器实现。",answer:"移动语义：右值引用(&&)和move()转移资源。完美转发：forward<T>()保持值类别。引用折叠：T& && = T&。用于泛型编程和容器实现。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-13',title:"C++的模板元编程？",category:'language',difficulty:'hard',content:"模板元编程在编译时计算。递归模板实例化实现循环，特化实现条件。type_traits提供编译时类型检查。C++17的if constexpr简化编译时分支。",answer:"模板元编程在编译时计算。递归模板实例化实现循环，特化实现条件。type_traits提供编译时类型检查。C++17的if constexpr简化编译时分支。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-14',title:"C++的内存模型？",category:'language',difficulty:'hard',content:"C++11定义6种内存序：memory_order_relaxed/acquire/release/acq_rel/seq_cst/consume。seq_cst最严格，relaxed最宽松。用于实现无锁数据结构。",answer:"C++11定义6种内存序：memory_order_relaxed/acquire/release/acq_rel/seq_cst/consume。seq_cst最严格，relaxed最宽松。用于实现无锁数据结构。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-15',title:"Python的上下文管理器？",category:'language',difficulty:'medium',content:"with语句使用上下文管理器。实现__enter__和__exit__方法。contextlib.contextmanager装饰器简化创建。用于资源管理(文件、锁、连接)。",answer:"with语句使用上下文管理器。实现__enter__和__exit__方法。contextlib.contextmanager装饰器简化创建。用于资源管理(文件、锁、连接)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-16',title:"Python的asyncio？",category:'language',difficulty:'hard',content:"asyncio是Python异步IO框架。核心：事件循环、协程(async/await)、Future、Task。asyncio.gather()并行执行。aiohttp异步HTTP。适合IO密集型。",answer:"asyncio是Python异步IO框架。核心：事件循环、协程(async/await)、Future、Task。asyncio.gather()并行执行。aiohttp异步HTTP。适合IO密集型。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-17',title:"Python的元类(metaclass)？",category:'language',difficulty:'hard',content:"元类是类的类，控制类的创建。type是默认元类。自定义元类继承type，重写__new__或__init__。ORM框架(Django/SQLAlchemy)使用元类。",answer:"元类是类的类，控制类的创建。type是默认元类。自定义元类继承type，重写__new__或__init__。ORM框架(Django/SQLAlchemy)使用元类。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-18',title:"Python的描述符(descriptor)？",category:'language',difficulty:'hard',content:"描述符是实现__get__/__set__/__delete__的对象。数据描述符(有__set__)优先级高于实例属性。property是描述符。用于属性验证和计算属性。",answer:"描述符是实现__get__/__set__/__delete__的对象。数据描述符(有__set__)优先级高于实例属性。property是描述符。用于属性验证和计算属性。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-19',title:"Go的泛型？",category:'language',difficulty:'medium',content:"Go 1.18+支持泛型。类型参数：func Foo[T any](x T)。约束：interface{...}。内置约束：comparable/any。类型推断简化调用。",answer:"Go 1.18+支持泛型。类型参数：func Foo[T any](x T)。约束：interface{...}。内置约束：comparable/any。类型推断简化调用。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-20',title:"Go的错误处理？",category:'language',difficulty:'easy',content:"Go使用多返回值返回error。if err != nil检查。errors.Is/As判断错误类型。panic/recover处理不可恢复错误。defer确保资源释放。",answer:"Go使用多返回值返回error。if err != nil检查。errors.Is/As判断错误类型。panic/recover处理不可恢复错误。defer确保资源释放。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-21',title:"Go的context包？",category:'language',difficulty:'medium',content:"context用于传递截止时间、取消信号和值。WithCancel/WithTimeout/WithValue。函数第一个参数通常是ctx。用于请求超时和级联取消。",answer:"context用于传递截止时间、取消信号和值。WithCancel/WithTimeout/WithValue。函数第一个参数通常是ctx。用于请求超时和级联取消。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-22',title:"Go的反射(reflect)？",category:'language',difficulty:'medium',content:"reflect包运行时检查类型。TypeOf()获取类型，ValueOf()获取值。NumField()/Field()遍历结构体。用于JSON序列化、ORM映射。性能较差。",answer:"reflect包运行时检查类型。TypeOf()获取类型，ValueOf()获取值。NumField()/Field()遍历结构体。用于JSON序列化、ORM映射。性能较差。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-23',title:"Rust的trait？",category:'language',difficulty:'medium',content:"trait类似接口，定义行为。impl Trait for Type实现。trait bound约束泛型。关联类型。默认实现。derive宏自动实现常见trait(Debug/Clone)。",answer:"trait类似接口，定义行为。impl Trait for Type实现。trait bound约束泛型。关联类型。默认实现。derive宏自动实现常见trait(Debug/Clone)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-24',title:"Rust的并发模型？",category:'language',difficulty:'hard',content:"Rust通过所有权保证线程安全。Send trait表示可跨线程传递，Sync表示可跨线程共享。Arc(原子引用计数)+Mutex/RwLock实现共享状态。通道mpsc通信。",answer:"Rust通过所有权保证线程安全。Send trait表示可跨线程传递，Sync表示可跨线程共享。Arc(原子引用计数)+Mutex/RwLock实现共享状态。通道mpsc通信。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-25',title:"Rust的宏系统？",category:'language',difficulty:'hard',content:"两种宏：1.声明宏(macro_rules!)模式匹配 2.过程宏(proc_macro)自定义derive/属性/函数式。宏在编译时展开，零运行时开销。",answer:"两种宏：1.声明宏(macro_rules!)模式匹配 2.过程宏(proc_macro)自定义derive/属性/函数式。宏在编译时展开，零运行时开销。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-26',title:"Rust的Pin和Unpin？",category:'language',difficulty:'hard',content:"Pin防止值在内存中移动。自引用结构需要Pin。Unpin表示可以安全移动(大多数类型)。async/await生成的Future需要Pin。",answer:"Pin防止值在内存中移动。自引用结构需要Pin。Unpin表示可以安全移动(大多数类型)。async/await生成的Future需要Pin。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-27',title:"Rust的Unsafe？",category:'language',difficulty:'medium',content:"unsafe允许：1.解引用裸指针 2.调用unsafe函数 3.访问可变静态变量 4.实现unsafe trait 5.访问union字段。用于FFI和底层操作。",answer:"unsafe允许：1.解引用裸指针 2.调用unsafe函数 3.访问可变静态变量 4.实现unsafe trait 5.访问union字段。用于FFI和底层操作。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-28',title:"Rust的Cargo？",category:'language',difficulty:'easy',content:"Cargo是Rust的包管理器和构建工具。cargo build/run/test/doc/publish。Cargo.toml配置依赖。workspace管理多包。features条件编译。",answer:"Cargo是Rust的包管理器和构建工具。cargo build/run/test/doc/publish。Cargo.toml配置依赖。workspace管理多包。features条件编译。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-29',title:"Rust的错误处理？",category:'language',difficulty:'medium',content:"Result<T,E>可恢复错误，panic!不可恢复。?运算符传播错误。thiserror/anyhow库简化错误处理。自定义错误类型实现std::error::Error。",answer:"Result<T,E>可恢复错误，panic!不可恢复。?运算符传播错误。thiserror/anyhow库简化错误处理。自定义错误类型实现std::error::Error。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-30',title:"Rust的异步编程？",category:'language',difficulty:'hard',content:"async/await语法。Future trait。tokio异步运行时。async fn返回impl Future。Pin保证自引用安全。spawn创建异步任务。select!并发等待。",answer:"async/await语法。Future trait。tokio异步运行时。async fn返回impl Future。Pin保证自引用安全。spawn创建异步任务。select!并发等待。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-31',title:"什么是JIT编译？",category:'language',difficulty:'medium',content:"JIT(即时编译)在运行时将字节码编译为机器码。热点代码编译优化。Java的JVM、JavaScript的V8使用JIT。比解释快，比AOT灵活。",answer:"JIT(即时编译)在运行时将字节码编译为机器码。热点代码编译优化。Java的JVM、JavaScript的V8使用JIT。比解释快，比AOT灵活。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-32',title:"什么是GC调优？",category:'language',difficulty:'hard',content:"JVM GC调优参数：-Xms/-Xmx堆大小、-XX:+UseG1GC选择收集器、-XX:MaxGCPauseMillis目标暂停时间。工具：jstat、jmap、GCViewer。",answer:"JVM GC调优参数：-Xms/-Xmx堆大小、-XX:+UseG1GC选择收集器、-XX:MaxGCPauseMillis目标暂停时间。工具：jstat、jmap、GCViewer。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-33',title:"什么是内存模型？",category:'language',difficulty:'hard',content:"内存模型定义多线程访问内存的规则。Java Memory Model：happens-before关系保证可见性。volatile、synchronized、final建立happens-before。",answer:"内存模型定义多线程访问内存的规则。Java Memory Model：happens-before关系保证可见性。volatile、synchronized、final建立happens-before。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-34',title:"什么是协程？",category:'language',difficulty:'medium',content:"协程是用户态轻量级线程。由程序控制切换，不需要内核参与。Python asyncio、Go goroutine、Kotlin协程。比线程开销小，适合IO密集型。",answer:"协程是用户态轻量级线程。由程序控制切换，不需要内核参与。Python asyncio、Go goroutine、Kotlin协程。比线程开销小，适合IO密集型。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-35',title:"什么是Actor模型？",category:'language',difficulty:'medium',content:"Actor模型中每个Actor有独立状态和邮箱，通过消息通信。不共享内存。Erlang/Akka使用Actor模型。优点：无锁并发、容错、分布式。",answer:"Actor模型中每个Actor有独立状态和邮箱，通过消息通信。不共享内存。Erlang/Akka使用Actor模型。优点：无锁并发、容错、分布式。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-36',title:"什么是CSP模型？",category:'language',difficulty:'medium',content:"CSP(通信顺序进程)通过通道通信，不共享内存。Go语言基于CSP模型。goroutine+channel。与Actor区别：通道是第一类对象，不绑定特定进程。",answer:"CSP(通信顺序进程)通过通道通信，不共享内存。Go语言基于CSP模型。goroutine+channel。与Actor区别：通道是第一类对象，不绑定特定进程。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-37',title:"什么是尾递归优化？",category:'language',difficulty:'medium',content:"尾递归：递归调用是函数最后操作。编译器将其优化为循环，避免栈溢出。函数式语言(Haskell/Scala)支持。Python/Java不支持尾递归优化。",answer:"尾递归：递归调用是函数最后操作。编译器将其优化为循环，避免栈溢出。函数式语言(Haskell/Scala)支持。Python/Java不支持尾递归优化。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-38',title:"什么是模式匹配？",category:'language',difficulty:'medium',content:"模式匹配检查数据结构是否符合模式。Rust的match、Scala的case、Haskell的模式。比switch更强大：解构、守卫、嵌套。编译器检查穷举性。",answer:"模式匹配检查数据结构是否符合模式。Rust的match、Scala的case、Haskell的模式。比switch更强大：解构、守卫、嵌套。编译器检查穷举性。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-39',title:"什么是代数数据类型(ADT)？",category:'language',difficulty:'medium',content:"ADT是类型组合方式：和类型(Sum，或)和积类型(Product，与)。Rust的enum是Sum类型，struct是Product类型。用于建模领域。",answer:"ADT是类型组合方式：和类型(Sum，或)和积类型(Product，与)。Rust的enum是Sum类型，struct是Product类型。用于建模领域。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-40',title:"什么是类型推导？",category:'language',difficulty:'medium',content:"类型推导自动推断表达式类型。Haskell全推导，C++ auto，Java var，Go :=。减少冗余类型标注，但需要可读性权衡。",answer:"类型推导自动推断表达式类型。Haskell全推导，C++ auto，Java var，Go :=。减少冗余类型标注，但需要可读性权衡。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-41',title:"什么是高阶函数？",category:'language',difficulty:'easy',content:"高阶函数接收或返回函数。map/filter/reduce/sort都是高阶函数。闭包/lambda是匿名函数。函数组合：f.g = f(g(x))。",answer:"高阶函数接收或返回函数。map/filter/reduce/sort都是高阶函数。闭包/lambda是匿名函数。函数组合：f.g = f(g(x))。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-42',title:"什么是单子(Monad)？",category:'language',difficulty:'hard',content:"Monad是函数式编程的抽象。操作：return(包装)和bind(>>=，链式操作)。Maybe/IO/List都是Monad。用于处理副作用和计算链。",answer:"Monad是函数式编程的抽象。操作：return(包装)和bind(>>=，链式操作)。Maybe/IO/List都是Monad。用于处理副作用和计算链。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-43',title:"什么是不可变数据结构？",category:'language',difficulty:'medium',content:"不可变数据创建后不能修改。修改操作返回新副本(结构共享)。优点：线程安全、可缓存、易推理。Clojure/Haskell默认不可变。持久化数据结构。",answer:"不可变数据创建后不能修改。修改操作返回新副本(结构共享)。优点：线程安全、可缓存、易推理。Clojure/Haskell默认不可变。持久化数据结构。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-44',title:"什么是尾调用优化(TCO)？",category:'language',difficulty:'medium',content:"TCO将尾位置的函数调用优化为跳转，不增加栈帧。ES6严格模式支持但浏览器实现不一致。函数式语言普遍支持。避免递归栈溢出。",answer:"TCO将尾位置的函数调用优化为跳转，不增加栈帧。ES6严格模式支持但浏览器实现不一致。函数式语言普遍支持。避免递归栈溢出。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-45',title:"什么是惰性求值？",category:'language',difficulty:'medium',content:"惰性求值只在需要时计算。Haskell默认惰性。Python生成器、Java Stream.lazy。优点：无限数据结构、避免不必要计算。缺点：内存泄漏、难以预测性能。",answer:"惰性求值只在需要时计算。Haskell默认惰性。Python生成器、Java Stream.lazy。优点：无限数据结构、避免不必要计算。缺点：内存泄漏、难以预测性能。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-46',title:"什么是动态分发和静态分发？",category:'language',difficulty:'medium',content:"静态分发：编译时确定调用(泛型/内联)，零开销。动态分发：运行时确定(vtable/接口)，有间接调用开销。Rust的impl Trait vs dyn Trait。",answer:"静态分发：编译时确定调用(泛型/内联)，零开销。动态分发：运行时确定(vtable/接口)，有间接调用开销。Rust的impl Trait vs dyn Trait。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-47',title:"什么是零成本抽象？",category:'language',difficulty:'medium',content:"零成本抽象：高级抽象不引入运行时开销。Rust的迭代器、C++的模板、Go的接口。编译时优化掉抽象层。'你不需要为你不用的功能付费'。",answer:"零成本抽象：高级抽象不引入运行时开销。Rust的迭代器、C++的模板、Go的接口。编译时优化掉抽象层。'你不需要为你不用的功能付费'。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-48',title:"什么是内存对齐？",category:'language',difficulty:'medium',content:"内存对齐要求数据存储在特定边界上。CPU访问对齐内存更快。struct字段顺序影响大小。Rust/C++可用repr(C/align)控制。",answer:"内存对齐要求数据存储在特定边界上。CPU访问对齐内存更快。struct字段顺序影响大小。Rust/C++可用repr(C/align)控制。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-49',title:"什么是ABI稳定性？",category:'language',difficulty:'medium',content:"ABI(应用二进制接口)定义编译后的接口。C ABI最稳定。C++ ABI不稳定(name mangling)。Rust暂无稳定ABI。跨语言调用用C ABI。",answer:"ABI(应用二进制接口)定义编译后的接口。C ABI最稳定。C++ ABI不稳定(name mangling)。Rust暂无稳定ABI。跨语言调用用C ABI。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-50',title:"什么是增量编译？",category:'language',difficulty:'medium',content:"增量编译只重新编译变化的部分。Rust/Cargo支持增量编译。Go编译本身很快。Java增量编译(Gradle)。减少开发时的等待时间。",answer:"增量编译只重新编译变化的部分。Rust/Cargo支持增量编译。Go编译本身很快。Java增量编译(Gradle)。减少开发时的等待时间。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-51',title:"什么是交叉编译？",category:'language',difficulty:'medium',content:"交叉编译在一个平台生成另一个平台的可执行文件。Go：GOOS/GOARCH。Rust：target。C/C++：toolchain。用于嵌入式和移动开发。",answer:"交叉编译在一个平台生成另一个平台的可执行文件。Go：GOOS/GOARCH。Rust：target。C/C++：toolchain。用于嵌入式和移动开发。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-52',title:"什么是LSP(Language Server Protocol)？",category:'language',difficulty:'easy',content:"LSP是微软定义的编辑器-语言服务通信协议。统一了代码补全、跳转、诊断等功能。各大语言都有LSP实现。VS Code基于LSP。",answer:"LSP是微软定义的编辑器-语言服务通信协议。统一了代码补全、跳转、诊断等功能。各大语言都有LSP实现。VS Code基于LSP。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-53',title:"什么是DAP(Debug Adapter Protocol)？",category:'language',difficulty:'medium',content:"DAP是调试适配器协议，统一编辑器和调试器通信。类似LSP的调试版。VS Code基于DAP。各语言实现Debug Adapter。",answer:"DAP是调试适配器协议，统一编辑器和调试器通信。类似LSP的调试版。VS Code基于DAP。各语言实现Debug Adapter。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-54',title:"什么是构建图(Build Graph)？",category:'language',difficulty:'medium',content:"构建图描述编译依赖关系。DAG(有向无环图)。增量编译基于构建图。Bazel/Buck构建大规模项目。任务并行执行。",answer:"构建图描述编译依赖关系。DAG(有向无环图)。增量编译基于构建图。Bazel/Buck构建大规模项目。任务并行执行。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-55',title:"什么是语义化版本(SemVer)？",category:'language',difficulty:'easy',content:"SemVer格式：MAJOR.MINOR.PATCH。MAJOR不兼容变更，MINOR向后兼容新功能，PATCH向后兼容修复。预发布：1.0.0-alpha。依赖管理基础。",answer:"SemVer格式：MAJOR.MINOR.PATCH。MAJOR不兼容变更，MINOR向后兼容新功能，PATCH向后兼容修复。预发布：1.0.0-alpha。依赖管理基础。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-56',title:"什么是依赖注入(DI)？",category:'language',difficulty:'medium',content:"DI将依赖从外部注入而非内部创建。方式：1.构造器注入 2.Setter注入 3.接口注入。Spring IoC容器自动注入。降低耦合，提高可测试性。",answer:"DI将依赖从外部注入而非内部创建。方式：1.构造器注入 2.Setter注入 3.接口注入。Spring IoC容器自动注入。降低耦合，提高可测试性。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-57',title:"什么是SOLID原则？",category:'language',difficulty:'medium',content:"SOLID：1.单一职责(SRP) 2.开闭(OCP) 3.里氏替换(LSP) 4.接口隔离(ISP) 5.依赖反转(DIP)。面向对象设计的基本原则。",answer:"SOLID：1.单一职责(SRP) 2.开闭(OCP) 3.里氏替换(LSP) 4.接口隔离(ISP) 5.依赖反转(DIP)。面向对象设计的基本原则。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-58',title:"什么是设计模式中的创建型模式？",category:'language',difficulty:'medium',content:"创建型：1.单例(唯一实例) 2.工厂方法(子类决定创建) 3.抽象工厂(产品族) 4.建造者(分步构建) 5.原型(克隆)。关注对象创建机制。",answer:"创建型：1.单例(唯一实例) 2.工厂方法(子类决定创建) 3.抽象工厂(产品族) 4.建造者(分步构建) 5.原型(克隆)。关注对象创建机制。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-59',title:"什么是设计模式中的结构型模式？",category:'language',difficulty:'medium',content:"结构型：1.适配器(接口转换) 2.桥接(抽象与实现分离) 3.组合(树形结构) 4.装饰器(动态添加功能) 5.外观(简化接口) 6.享元(共享对象) 7.代理(访问控制)。",answer:"结构型：1.适配器(接口转换) 2.桥接(抽象与实现分离) 3.组合(树形结构) 4.装饰器(动态添加功能) 5.外观(简化接口) 6.享元(共享对象) 7.代理(访问控制)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-60',title:"什么是设计模式中的行为型模式？",category:'language',difficulty:'medium',content:"行为型：1.责任链(请求链式处理) 2.命令(请求对象化) 3.迭代器(顺序访问) 4.中介者(对象间通信) 5.备忘录(状态保存) 6.观察者(通知依赖) 7.状态(状态切换) 8.策略(算法族) 9.模板方法(算法骨架) 10.访问者(操作与结构分离)。",answer:"行为型：1.责任链(请求链式处理) 2.命令(请求对象化) 3.迭代器(顺序访问) 4.中介者(对象间通信) 5.备忘录(状态保存) 6.观察者(通知依赖) 7.状态(状态切换) 8.策略(算法族) 9.模板方法(算法骨架) 10.访问者(操作与结构分离)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-61',title:"什么是DDD(领域驱动设计)？",category:'language',difficulty:'hard',content:"DDD核心概念：1.限界上下文(Bounded Context) 2.聚合(Aggregate) 3.领域事件 4.值对象 5.实体 6.仓储(Repository)。战略设计和战术设计。",answer:"DDD核心概念：1.限界上下文(Bounded Context) 2.聚合(Aggregate) 3.领域事件 4.值对象 5.实体 6.仓储(Repository)。战略设计和战术设计。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-62',title:"什么是CQRS？",category:'language',difficulty:'hard',content:"CQRS(命令查询职责分离)：写操作(命令)和读操作(查询)使用不同模型。写模型保证一致性，读模型优化查询。常与Event Sourcing配合。",answer:"CQRS(命令查询职责分离)：写操作(命令)和读操作(查询)使用不同模型。写模型保证一致性，读模型优化查询。常与Event Sourcing配合。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-extra-63',title:"什么是Event Sourcing？",category:'language',difficulty:'hard',content:"Event Sourcing不存储当前状态，而是存储所有事件。状态通过回放事件重建。优点：完整审计、时间旅行、事件驱动。缺点：事件量大、最终一致性。",answer:"Event Sourcing不存储当前状态，而是存储所有事件。状态通过回放事件重建。优点：完整审计、时间旅行、事件驱动。缺点：事件量大、最终一致性。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'net-1',title:"TCP/IP模型有几层？每层的作用？",category:'network',difficulty:'easy',content:"TCP/IP四层：应用层(HTTP/FTP/DNS)、传输层(TCP/UDP)、网络层(IP/ICMP/ARP)、网络接口层(以太网/WiFi)。OSI七层多了表示层和会话层。每一层封装本层头部为上层提供服务。",answer:"TCP/IP四层：应用层(HTTP/FTP/DNS)、传输层(TCP/UDP)、网络层(IP/ICMP/ARP)、网络接口层(以太网/WiFi)。OSI七层多了表示层和会话层。每一层封装本层头部为上层提供服务。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-2',title:"TCP和UDP的区别？适用场景？",category:'network',difficulty:'easy',content:"TCP：面向连接、可靠(ACK重传)、流量控制(滑动窗口)、拥塞控制、字节流。适用HTTP/HTTPS/FTP/SMTP/SSH。UDP：无连接、不可靠、数据报、速度快。适用DNS/DHCP/视频通话/游戏/QUIC。QUIC基于UDP实现可靠传输。",answer:"TCP：面向连接、可靠(ACK重传)、流量控制(滑动窗口)、拥塞控制、字节流。适用HTTP/HTTPS/FTP/SMTP/SSH。UDP：无连接、不可靠、数据报、速度快。适用DNS/DHCP/视频通话/游戏/QUIC。QUIC基于UDP实现可靠传输。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-3',title:"TCP三次握手详细过程？SYN攻击？",category:'network',difficulty:'medium',content:"1.客户端发SYN(seq=x) 2.服务器回SYN+ACK(seq=y ack=x+1) 3.客户端发ACK(ack=y+1)。SYN Flood：大量伪造SYN不完成握手耗尽半连接队列(SYN_RECV)。防御：SYN Cookie、增大backlog、防火墙过滤。",answer:"1.客户端发SYN(seq=x) 2.服务器回SYN+ACK(seq=y ack=x+1) 3.客户端发ACK(ack=y+1)。SYN Flood：大量伪造SYN不完成握手耗尽半连接队列(SYN_RECV)。防御：SYN Cookie、增大backlog、防火墙过滤。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-4',title:"TCP四次挥手？TIME_WAIT作用？",category:'network',difficulty:'medium',content:"主动方FIN->被动方ACK->被动方FIN->主动方ACK。TIME_WAIT(2MSL)：1.确保最后ACK到达 2.等待迟到的报文消散。过多TIME_WAIT：启用reuseaddr/recycle端口复用、调整tcp_tw_reuse。",answer:"主动方FIN->被动方ACK->被动方FIN->主动方ACK。TIME_WAIT(2MSL)：1.确保最后ACK到达 2.等待迟到的报文消散。过多TIME_WAIT：启用reuseaddr/recycle端口复用、调整tcp_tw_reuse。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-5',title:"TCP滑动窗口？流量控制？",category:'network',difficulty:'medium',content:"窗口：接收方告知发送方可接收的数据量(rwnd)。发送方根据窗口大小控制发送速率。零窗口探测：接收方窗口0时定期发送探测。Nagle算法合并小包减少网络小分组。糊涂窗口综合征需避免。",answer:"窗口：接收方告知发送方可接收的数据量(rwnd)。发送方根据窗口大小控制发送速率。零窗口探测：接收方窗口0时定期发送探测。Nagle算法合并小包减少网络小分组。糊涂窗口综合征需避免。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-6',title:"TCP拥塞控制？慢启动/拥塞避免/快重传/快恢复？",category:'network',difficulty:'hard',content:"慢启动：cwnd指数增长至ssthresh。拥塞避免：cwnd线性增长。快重传：3个重复ACK立即重传不等超时。快恢复：cwnd减半+3而非降为1。BBR/CUBIC是现代算法。ECN显式拥塞通知。",answer:"慢启动：cwnd指数增长至ssthresh。拥塞避免：cwnd线性增长。快重传：3个重复ACK立即重传不等超时。快恢复：cwnd减半+3而非降为1。BBR/CUBIC是现代算法。ECN显式拥塞通知。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-7',title:"TCP粘包/拆包？如何解决？",category:'network',difficulty:'medium',content:"TCP字节流无消息边界。粘包多条消息合并，拆包一条消息分多包。解决：1.定长消息 2.分隔符(\\n/r\\n) 3.长度字段(Length Field) 4.应用层协议设计。Netty的DelimiterBasedFrameDecoder/LengthFieldBasedFrameDecoder解决。",answer:"TCP字节流无消息边界。粘包多条消息合并，拆包一条消息分多包。解决：1.定长消息 2.分隔符(\\n/r\\n) 3.长度字段(Length Field) 4.应用层协议设计。Netty的DelimiterBasedFrameDecoder/LengthFieldBasedFrameDecoder解决。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-8',title:"什么是MTU和MSS？关系？",category:'network',difficulty:'easy',content:"MTU(Maximum Transmission Unit)：数据链路层最大传输单元，以太网1500字节。MSS(Maximum Segment Size)：TCP层数据最大大小=MTU-40(IP+TCP头)=1460。Path MTU Discovery发现路径最小MTU。DF(Don't Fr",answer:"MTU(Maximum Transmission Unit)：数据链路层最大传输单元，以太网1500字节。MSS(Maximum Segment Size)：TCP层数据最大大小=MTU-40(IP+TCP头)=1460。Path MTU Discovery发现路径最小MTU。DF(Don't Fragment)标志。IP分片影响性能应避免。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-9',title:"ARP协议工作原理？ARP欺骗攻击？",category:'network',difficulty:'medium',content:"ARP(Address Resolution Protocol)：IP->MAC映射。请求广播响应单播。ARP缓存表有老化时间。ARP欺骗：伪造ARP响应欺骗网关或受害者实现MITM中间人攻击。防御：静态ARP绑定、DAI(Dynamic ARP Inspection)、802.1x认证。",answer:"ARP(Address Resolution Protocol)：IP->MAC映射。请求广播响应单播。ARP缓存表有老化时间。ARP欺骗：伪造ARP响应欺骗网关或受害者实现MITM中间人攻击。防御：静态ARP绑定、DAI(Dynamic ARP Inspection)、802.1x认证。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-10',title:"ICMP协议？ping和traceroute原理？",category:'network',difficulty:'medium',content:"ICMP(Internet Control Message Protocol)：网络层差错报告和控制。Echo Request/Reply(ping连通性测试)。Time Exceeded(traceroute TTL递增路由追踪)。Destination Unreachable(目标不可达)。IC",answer:"ICMP(Internet Control Message Protocol)：网络层差错报告和控制。Echo Request/Reply(ping连通性测试)。Time Exceeded(traceroute TTL递增路由追踪)。Destination Unreachable(目标不可达)。ICMP Rate Limiting防洪水。防火墙常禁ping但ICMP Path MTU Discovery需放行。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-11',title:"DNS解析过程？递归查询vs迭代查询？",category:'network',difficulty:'medium',content:"域名->IP：浏览器缓存->OS缓存->hosts文件->本地DNS服务器(递归)->根域(.)->顶级域(.com/.cn)->权威域NS。递归：DNS服务器代查全部。迭代：客户端逐步查询。DNS预取、HTTP/2连接合并减少DNS查询次数提升速度。",answer:"域名->IP：浏览器缓存->OS缓存->hosts文件->本地DNS服务器(递归)->根域(.)->顶级域(.com/.cn)->权威域NS。递归：DNS服务器代查全部。迭代：客户端逐步查询。DNS预取、HTTP/2连接合并减少DNS查询次数提升速度。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-12',title:"DNS记录类型？A/AAAA/CNAME/MX/TXT/NS/SOA/PTR？",category:'network',difficulty:'easy',content:"A：IPv4地址。AAAA：IPv6地址。CNAME：别名域名。MX：邮件交换服务器。TXT：文本记录(SPF DKIM验证)。NS：名称服务器。SOA：授权起始(主服务器信息)。PTR：反向解析(IP->域名)。SRV：服务定位。CAA：证书颁发机构授权。",answer:"A：IPv4地址。AAAA：IPv6地址。CNAME：别名域名。MX：邮件交换服务器。TXT：文本记录(SPF DKIM验证)。NS：名称服务器。SOA：授权起始(主服务器信息)。PTR：反向解析(IP->域名)。SRV：服务定位。CAA：证书颁发机构授权。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-13',title:"DNS劫持和DNS污染？区别与防护？",category:'network',difficulty:'medium',content:"DNS劫持：篡改DNS服务器返回结果(运营商劫持广告)。DNS污染：在查询路径上注入假响应(防火墙GFW)。防护：DoH(DNS over HTTPS加密查询443端口)、DoT(DNS over TLS 853端口)、可信DNS(8.8.8.8/1.1.1.1)、本地hosts文件。",answer:"DNS劫持：篡改DNS服务器返回结果(运营商劫持广告)。DNS污染：在查询路径上注入假响应(防火墙GFW)。防护：DoH(DNS over HTTPS加密查询443端口)、DoT(DNS over TLS 853端口)、可信DNS(8.8.8.8/1.1.1.1)、本地hosts文件。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-14',title:"HTTP/1.0 vs HTTP/1.1 vs HTTP/2 vs HTTP/3对比？",category:'network',difficulty:'medium',content:"HTTP/1.0：短连接。HTTP/1.1：长连接Keep-Alive、管线化(难部署)、Host头。HTTP/2：二进制帧、多路复用(无队头阻塞)、HPACK头部压缩、服务端推送。HTTP/3：基于QUIC(UDP)、0-RTT快速握手、连接迁移(网络切换不断连)。性能逐代大幅提升。",answer:"HTTP/1.0：短连接。HTTP/1.1：长连接Keep-Alive、管线化(难部署)、Host头。HTTP/2：二进制帧、多路复用(无队头阻塞)、HPACK头部压缩、服务端推送。HTTP/3：基于QUIC(UDP)、0-RTT快速握手、连接迁移(网络切换不断连)。性能逐代大幅提升。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-15',title:"HTTP状态码分类？常见状态码含义？",category:'network',difficulty:'easy',content:"1xx信息(100 Continue继续发送体)。2xx成功(200 OK / 201 Created / 204 No Content)。3xx重定向(301永久 / 302临时 / 304未修改)。4xx客户端错误(400参数错 / 401未认证 / 403禁止 / 404不存在)。5xx服务端",answer:"1xx信息(100 Continue继续发送体)。2xx成功(200 OK / 201 Created / 204 No Content)。3xx重定向(301永久 / 302临时 / 304未修改)。4xx客户端错误(400参数错 / 401未认证 / 403禁止 / 404不存在)。5xx服务端错误(500内部错 / 502网关错 / 503不可用 / 504超时)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-16',title:"HTTP请求方法？GET POST PUT DELETE PATCH RESTful？",category:'network',difficulty:'easy',content:"GET获取资源(幂等可缓存)。POST创建资源(非幂等)。PUT整体更新(幂等)。PATCH部分更新(非幂等)。DELETE删除(幂等)。HEAD获取头元数据。OPTIONS预检(CORS)。CONNECT建立隧道。TRACE调试回环。RESTful：名词URI+动词HTTP方法+状态码+JSON。",answer:"GET获取资源(幂等可缓存)。POST创建资源(非幂等)。PUT整体更新(幂等)。PATCH部分更新(非幂等)。DELETE删除(幂等)。HEAD获取头元数据。OPTIONS预检(CORS)。CONNECT建立隧道。TRACE调试回环。RESTful：名词URI+动词HTTP方法+状态码+JSON。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-17',title:"Cookie和Session？Token(JWT)？区别与选择？",category:'network',difficulty:'medium',content:"Cookie：客户端存储，每次请求自动携带，4KB限制，可设HttpOnly/Secure/SameSite安全属性。Session：服务端存储，Cookie存Session ID，服务端可控销毁。JWT(Json Web Token)：自包含签名令牌三段header.payload.signatu",answer:"Cookie：客户端存储，每次请求自动携带，4KB限制，可设HttpOnly/Secure/SameSite安全属性。Session：服务端存储，Cookie存Session ID，服务端可控销毁。JWT(Json Web Token)：自包含签名令牌三段header.payload.signature，无状态但payload Base64不加密勿存敏感信息。现代Web API倾向JWT Stateless。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-18',title:"HTTPS？TLS/SSL握手过程？版本？",category:'network',difficulty:'medium',content:"TLS握手：1.ClientHello(版本密码套件随机数) 2.ServerHello(选择套件证书随机数) 3.客户端验证证书链 4.密钥交换(ECDHE前向保密或RSA) 5.双方生成会话密钥 6.Finished加密通信开始。TLS 1.3(2018)：仅需1-RTT握手，强制前向保密，移除",answer:"TLS握手：1.ClientHello(版本密码套件随机数) 2.ServerHello(选择套件证书随机数) 3.客户端验证证书链 4.密钥交换(ECDHE前向保密或RSA) 5.双方生成会话密钥 6.Finished加密通信开始。TLS 1.3(2018)：仅需1-RTT握手，强制前向保密，移除不安全算法。0-RTT恢复先前连接更快但有重放风险需防范。Session Ticket/PSK复用。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-19',title:"对称加密和非对称加密？RSA/ECC/AES/ChaCha20？",category:'network',difficulty:'medium',content:"对称加密：加解密相同密钥。AES-256-GCM( Intel AES-NI硬件加速推荐)、ChaCha20-Poly1305( ARM移动端无AES指令集时更快)。非对称：公钥加密私钥解密/私钥签名公钥验签。RSA-2048+/ECDSA(secp256r1/secp384r1椭圆曲线)。混合加密",answer:"对称加密：加解密相同密钥。AES-256-GCM( Intel AES-NI硬件加速推荐)、ChaCha20-Poly1305( ARM移动端无AES指令集时更快)。非对称：公钥加密私钥解密/私钥签名公钥验签。RSA-2048+/ECDSA(secp256r1/secp384r1椭圆曲线)。混合加密：非对称交换对称密钥+对称加密数据体。TLS使用此模式。ECC同安全级别密钥远短于RSA。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-20',title:"XSS攻击类型和防御措施？",category:'network',difficulty:'medium',content:"XSS(Cross Site Scripting)：注入恶意JS脚本执行。存储型：存入数据库所有用户受害。反射型：URL参数反射触发。DOM型：前端JS修改DOM触发。防御：输出编码转义(HTML实体编码)、CSP(Content-Security-Policy白名单资源来源)、HttpOnly C",answer:"XSS(Cross Site Scripting)：注入恶意JS脚本执行。存储型：存入数据库所有用户受害。反射型：URL参数反射触发。DOM型：前端JS修改DOM触发。防御：输出编码转义(HTML实体编码)、CSP(Content-Security-Policy白名单资源来源)、HttpOnly Cookie防窃取、Input Sanitization输入净化(白名单优先)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-21',title:"CSRF攻击原理和防御？",category:'network',difficulty:'medium',content:"CSRF(Cross Site Request Forgery)：诱导用户在已登录状态发起恶意请求(利用浏览器自动携带Cookie)。SameSite Cookie属性(Strict严格/Lax宽松/None跨站需Secure)。CSRF Token表单隐藏字段+服务端校验。Referer/Orig",answer:"CSRF(Cross Site Request Forgery)：诱导用户在已登录状态发起恶意请求(利用浏览器自动携带Cookie)。SameSite Cookie属性(Strict严格/Lax宽松/None跨站需Secure)。CSRF Token表单隐藏字段+服务端校验。Referer/Origin头检查来源合法性。GET请求不应修改状态(幂等)。双重Cookie验证方案。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-22',title:"SQL注入攻击和防御？",category:'network',difficulty:'medium',content:"SQL Injection：拼接用户输入破坏SQL语句结构导致数据泄露或篡改。经典' OR '1'='1万能密码。防御核心：参数化查询(PreparedStatement/Statement占位符)最有效！ORM框架(Hibernate/MyBatis #{})自动参数化。输入验证白名单。最小权限数",answer:"SQL Injection：拼接用户输入破坏SQL语句结构导致数据泄露或篡改。经典' OR '1'='1万能密码。防御核心：参数化查询(PreparedStatement/Statement占位符)最有效！ORM框架(Hibernate/MyBatis #{})自动参数化。输入验证白名单。最小权限数据库账号。WAF辅助检测拦截异常模式。MyBatis ${}字符串拼接危险勿用！",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-23',title:"DDoS攻击类型和防御策略？",category:'network',difficulty:'hard',content:"DDoS分布式拒绝服务：海量傀儡机同时请求耗尽目标资源。Volumetric(流量型)：UDP/ICMP Flood填满带宽管道。Protocol(协议型)：SYN Flood耗尽半连接队列。Application(应用层)：HTTP Flood模拟正常请求耗尽应用资源。防御：CDN分散流量到全球节",answer:"DDoS分布式拒绝服务：海量傀儡机同时请求耗尽目标资源。Volumetric(流量型)：UDP/ICMP Flood填满带宽管道。Protocol(协议型)：SYN Flood耗尽半连接队列。Application(应用层)：HTTP Flood模拟正常请求耗尽应用资源。防御：CDN分散流量到全球节点、Anycast分散入口、Rate Limiting限流、Challenge-Response(CAPTCHA人机验证)、黑洞路由Null Route丢弃、专业清洗中心 Scrubbing Center流量清洗后回源。云厂商DDoS防护(阿里云DDoS/AWS Shield)。高防IP。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-24',title:"负载均衡四层L4和七层L7？算法？",category:'network',difficulty:'medium',content:"四层(L4)：传输层基于IP+port转发，LVS/F5/Nginx stream模块。七层(L7)：应用层基于HTTP内容路由，Nginx/HAProxy/Traefik。算法：RR轮询(Round Robin)、加权WRR(Weighted RR按配置比例)、最少连接LC(Least Conne",answer:"四层(L4)：传输层基于IP+port转发，LVS/F5/Nginx stream模块。七层(L7)：应用层基于HTTP内容路由，Nginx/HAProxy/Traefik。算法：RR轮询(Round Robin)、加权WRR(Weighted RR按配置比例)、最少连接LC(Least Connections分配给空闲者)、IP Hash(同一IP始终同一后端保持会话)、一致性哈希Consistent Hash(缓存节点分布均匀增删影响最小)。健康检查Health Check剔除故障节点。云SLB/ALB/NLB。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-25',title:"反向代理vs正向代理？Nginx配置？",category:'network',difficulty:'easy',content:"正向代理：客户端代理帮助客户端访问外部隐藏客户端IP(翻墙/抓包)。反向代理：服务端代理对外代表服务器隐藏内部架构提供负载均衡/缓存/SSL卸载/WAF/压缩功能。Nginx：upstream定义后端server池(weight权重backup备选max_fails失败次数fail_timeout)",answer:"正向代理：客户端代理帮助客户端访问外部隐藏客户端IP(翻墙/抓包)。反向代理：服务端代理对外代表服务器隐藏内部架构提供负载均衡/缓存/SSL卸载/WAF/压缩功能。Nginx：upstream定义后端server池(weight权重backup备选max_fails失败次数fail_timeout)。proxy_pass转发请求。location匹配规则(=精确 ^~前缀 ~正则)。gzip on压缩。ssl_certificate配置HTTPS。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-26',title:"WebSocket协议？握手帧格式？心跳？",category:'network',difficulty:'medium',content:"WS全双工通信持久连接。握手：HTTP Upgrade: websocket请求 + 101 Switching Protocols响应完成协议升级。帧格式：FIN结束标志 OPCODE操作码(0x1文本0x2二进制0x8关闭0x9心跳ping 0xA心跳pong) MASK掩码位 PAYLOAD ",answer:"WS全双工通信持久连接。握手：HTTP Upgrade: websocket请求 + 101 Switching Protocols响应完成协议升级。帧格式：FIN结束标志 OPCODE操作码(0x1文本0x2二进制0x8关闭0x9心跳ping 0xA心跳pong) MASK掩码位 PAYLOAD LENGTH载荷长度(126/127扩展) PAYLOAD载荷数据。wss://加密版本。心跳ping/pong保活检测连接存活性防止半开连接。Socket.IO封装自动重连/房间Room/ACK确认机制简化开发。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-27',title:"OAuth 2.0流程？授权码模式最安全？",category:'network',difficulty:'medium',content:"OAuth 2.0第三方授权框架四种模式：授权码Authorization Code(最安全！服务端交互token不经过浏览器可PKCE增强)、隐式Implicit(token直接返浏览器安全性差已不推荐)、客户端凭证Client Credentials(机器对机器M2M)、设备码Device Co",answer:"OAuth 2.0第三方授权框架四种模式：授权码Authorization Code(最安全！服务端交互token不经过浏览器可PKCE增强)、隐式Implicit(token直接返浏览器安全性差已不推荐)、客户端凭证Client Credentials(机器对机器M2M)、设备码Device Code(电视/打印机等无浏览器设备)。OIDC(OpenID Connect)在OAuth2.0基础上添加id_token(JWT包含用户身份信息)实现单点登录SSO。Scope权限范围控制。Refresh Token刷新Access Token延长会话无需重新授权。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-28',title:"RPC框架gRPC？Protobuf？HTTP/2优势？",category:'network',difficulty:'medium',content:"gRPC Google开源高性能RPC框架：HTTP/2 + Protobuf序列化 + IDL接口定义语言(.proto文件)。四种调用模式：Unary一元(一次请求一次响应)、Server Streaming服务端流式、Client Streaming客户端流式、Bidirectional双向流",answer:"gRPC Google开源高性能RPC框架：HTTP/2 + Protobuf序列化 + IDL接口定义语言(.proto文件)。四种调用模式：Unary一元(一次请求一次响应)、Server Streaming服务端流式、Client Streaming客户端流式、Bidirectional双向流式。Protobuf二进制序列化比JSON/XML体积小3-10倍速度快20-100倍(Varint编码/ZigZag/字段编号省空间)。HTTP/2多路复用/头部压缩/服务端推送/二进制帧提升性能。代码生成多语言支持(Java/Go/Python/C++/Node.js/Rust...)。Streaming gRPC适合实时数据推送。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-29',title:"消息队列MQ？Kafka/RabbitMQ/RocketMQ选型？",category:'network',difficulty:'medium',content:"MQ核心价值：异步解耦(削峰填谷)、可靠传输(持久化+确认机制)。Kafka：超高吞吐(百万级TPS)、分区副本分布式、消费者组、日志追加写磁盘顺序IO高效、Exactly-Once语义。适合日志收集/用户行为/流处理。RabbitMQ：AMQP协议灵活路由Exchange+Binding、可靠性高",answer:"MQ核心价值：异步解耦(削峰填谷)、可靠传输(持久化+确认机制)。Kafka：超高吞吐(百万级TPS)、分区副本分布式、消费者组、日志追加写磁盘顺序IO高效、Exactly-Once语义。适合日志收集/用户行为/流处理。RabbitMQ：AMQP协议灵活路由Exchange+Binding、可靠性高(发布确认+持久化+手动ACK)、管理UI友好。适合传统业务异步任务。RocketMQ阿里开源：事务消息(半消息机制)、定时消息(延迟等级)、Tag消息过滤、万亿级消息堆积能力。选型依据：吞吐量/可靠性/功能需求/团队熟悉度/生态。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-30',title:"微服务通信方式同步vs异步？Service Mesh？",category:'network',difficulty:'medium',content:"同步通信：HTTP/REST/gRPC实时响应但耦合等待超时复杂。异步通信：消息队列(Kafka/RabbitMQ)/事件总线(EventBus)解耦最终一致但调试追踪难延迟不确定。Service Mesh服务网格(Istio/Linkerd)：Sidecar代理模式处理通信基础设施(熔断Circu",answer:"同步通信：HTTP/REST/gRPC实时响应但耦合等待超时复杂。异步通信：消息队列(Kafka/RabbitMQ)/事件总线(EventBus)解耦最终一致但调试追踪难延迟不确定。Service Mesh服务网格(Istio/Linkerd)：Sidecar代理模式处理通信基础设施(熔断Circuit Breaker/重试Retry/超时Timeout/追踪Tracing/认证mTLS/观测性Metrics)，业务代码零侵入。Control Plane控制平面(istiod Pilot Citadel Galley) + Data Plane数据平面(Envoy Sidecar)。VirtualService路由规则 DestinationRule子集/负载均衡/熔断。降低微服务复杂度但增加运维复杂度和资源开销(Sidecar每个Pod额外消耗)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-31',title:"熔断器Circuit Breaker？降级Degradation？限流Rate Limiting？",category:'network',difficulty:'medium',content:"熔断Hystrix/Sentinel/Resilience4j：故障率达到阈值打开熔断器(Circuit Open)快速失败Fail Fast而非无限等待保护级联故障。Half-Open半开状态试探性放行少量请求判断是否恢复(Close闭合)。降级：非核心功能暂停保核心可用(返回默认值/静态页面/友",answer:"熔断Hystrix/Sentinel/Resilience4j：故障率达到阈值打开熔断器(Circuit Open)快速失败Fail Fast而非无限等待保护级联故障。Half-Open半开状态试探性放行少量请求判断是否恢复(Close闭合)。降级：非核心功能暂停保核心可用(返回默认值/静态页面/友好提示)。限流：令牌桶Token Bucket(恒定速率+突发容忍)/漏桶Leaky Bucket(匀速输出)/滑动窗口Sliding Window Log/Counter(精度更高)。Sentinel阿里开源：规则配置 Dashboard可视化、自适应限流Adaptive(自动根据系统负载调整)、热点参数限流、集群限流、授权黑白名单。维度：用户/IP/API Key/全局接口级。429 Too Many Requests + Retry-After响应头告知客户端。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-32',title:"API网关API Gateway？Kong/APISIX/Zuul？",category:'network',difficulty:'medium',content:"API Gateway统一入口职责：路由转发Routing(基于Path/Header/Query/Cookie到后端服务)、认证鉴权AuthN/AuthZ(OAuth2.0/JWT Token/API Key/HMAC签名)、协议转换Protocol Translation(gRPC<->REST",answer:"API Gateway统一入口职责：路由转发Routing(基于Path/Header/Query/Cookie到后端服务)、认证鉴权AuthN/AuthZ(OAuth2.0/JWT Token/API Key/HMAC签名)、协议转换Protocol Translation(gRPC<->REST JSON/GraphQL)、限流熔断Rate Limit & Circuit Breaker、日志监控Logging Metrics Tracing(统一RequestId串联全链路)、缓存Cache、请求响应转换Transformation、API版本管理Versioning。Kong(基于OpenResty Nginx+Lua插件生态丰富300+插件社区活跃)。APISIX(Apache基金会高性能动态路由etcd配置中心热更新)。Spring Cloud Gateway(Java Filter Chain生态)。Envoy(云原生Istio数据面)。BFF Backend for Frontend面向不同客户端(Web/iOS/Android)裁剪适配层。部署高可用多实例+前置LB。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-33',title:"服务发现Service Discovery？Consul/Eureka/Nacos/K8s？",category:'network',difficulty:'medium',content:"服务发现：服务实例启动时注册(Register)自身地址端口元数据到注册中心，下线时注销(Deregister)。消费者从注册中心发现(Discover)可用实例列表(支持健康检查Health Check剔除不健康实例)。Consul(HashiCorp)：Go编写、HTTP DNS双接口、KV存储",answer:"服务发现：服务实例启动时注册(Register)自身地址端口元数据到注册中心，下线时注销(Deregister)。消费者从注册中心发现(Discover)可用实例列表(支持健康检查Health Check剔除不健康实例)。Consul(HashiCorp)：Go编写、HTTP DNS双接口、KV存储、多数据中心支持、Watch机制实时推送变更。Eureka(Netflix)：AP模式(Availability Partition客户端缓存容忍网络分区)、自我保护模式(Self Preservation防止误剔)。Nacos(阿里)：注册+配置一体化、支持CP/AP切换、长轮询Push 1s内变更推送、MySQL/内嵌存储。Kubernetes：CoreDNS Service DNS + Endpoint + Label Selector原生服务发现。Client Side(客户端发现) vs Server Side(服务端发现/LB代理)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-34',title:"链路追踪Distributed Tracing？Jaeger/Zipkin/SkyWalking？OTel？",category:'network',difficulty:'medium',content:"分布式链路追踪：Trace(一次完整请求全程唯一ID)、Span(单个操作/调用含起止时间/标签Tags/日志Logs)、Parent-Child父子关系构建调用树(DAG)。OpenTelemetry OTel标准化规范(Trace/Metrics/Logs统一可观测性)。Jaeger(CNCF)",answer:"分布式链路追踪：Trace(一次完整请求全程唯一ID)、Span(单个操作/调用含起止时间/标签Tags/日志Logs)、Parent-Child父子关系构建调用树(DAG)。OpenTelemetry OTel标准化规范(Trace/Metrics/Logs统一可观测性)。Jaeger(CNCF)：UI友好、采样策略Sampling(概率采样/速率限制/动态)、聚合Aggregation。Zipkin(Uber开源Twitter起源)：简单易部署。SkyWalking(国产吴晟)：Agent字节码注入无侵入、APM一体化(服务拓扑/指标/告警)、支持Java/.NET/Node.js/Go。Trace Context在服务间透传(W3C TraceContext标准b3 propagator)。Span Exporter导出到后端存储(Elasticsearch/Jaeger/Zipkin)。Trace ID关联Metrics和Logs实现联动分析。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-35',title:"网络编程IO模型？阻塞/非阻塞/多路复用/信号驱动/异步IO？",category:'network',difficulty:'hard',content:"五种IO模型(Unix Network Programming)：Blocking IO阻塞IO(调用阻塞直到完成如read/write默认)。Nonblocking IO非阻塞IO(立即返回EWOULDBLOCK需轮询polling busy-wait CPU空转)。IO Multiplexing",answer:"五种IO模型(Unix Network Programming)：Blocking IO阻塞IO(调用阻塞直到完成如read/write默认)。Nonblocking IO非阻塞IO(立即返回EWOULDBLOCK需轮询polling busy-wait CPU空转)。IO Multiplexing IO多路复用(select/poll/epoll/kqueue)一个线程监听多个fd就绪事件效率最高Linux首选epoll。Signal Driven IO信号驱动IO(SIGIO信号通知数据就绪)。Asynchronous IO异步IO(aio_read aio_write POSIX AIO或io_uring Linux 5.1+)内核完成后通知应用真正的Proactor模式。Reactor反应器模式(多路复用+事件分发回调Handler)和Proactor前摄器模式(异步IO+完成分发)。Netty主从Reactor多线程模型(Boss Group accept + Worker Group IO)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-36',title:"Zero-copy零拷贝技术？应用场景？",category:'network',difficulty:'medium',content:"传统数据拷贝路径：disk -> kernel buffer -> user buffer -> socket buffer -> NIC网卡(4次拷贝2次用户态内核态上下文切换CPU开销大)。mmap映射：disk -> kernel buffer(共享给user) -> socket buffe",answer:"传统数据拷贝路径：disk -> kernel buffer -> user buffer -> socket buffer -> NIC网卡(4次拷贝2次用户态内核态上下文切换CPU开销大)。mmap映射：disk -> kernel buffer(共享给user) -> socket buffer -> NIC(3次拷贝3次切换)。sendfile系统调用：disk -> kernel buffer -> NIC(2次拷贝2次切换 GPU DMA gather scatter I/O)。splice：两个fd间通过pipe管道传输0次拷贝到用户态(内核内核间DMA)。应用场景：Kafka(零拷贝发送消息到网卡)、Nginx静态文件sendfile on、File Channel.transferTo(Java)。节省CPU周期和内存带宽显著提升吞吐量。代价：无法对数据进行用户态处理(如加密/压缩)需传统路径。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-37',title:"TCP Fast Open？QUIC协议特点？",category:'network',difficulty:'medium',content:"TFO TCP Fast Open(RFC7413)：首次握手的SYN/SYN-ACK携带数据 payload实现0-RTT或1-RTT数据发送(减少一个RTT)。要求客户端和服务端都支持并开启fastopen选项。QUIC Quick UDP Internet Connection(Google ",answer:"TFO TCP Fast Open(RFC7413)：首次握手的SYN/SYN-ACK携带数据 payload实现0-RTT或1-RTT数据发送(减少一个RTT)。要求客户端和服务端都支持并开启fastopen选项。QUIC Quick UDP Internet Connection(Google IETF RFC9000)：基于UDP传输层协议。核心特性：0-RTT/1-RTT握手恢复连接(复用之前Connection ID避免握手)、连接迁移Connection Migration(网络WiFi切4G不断连因为基于Connection ID而非四元组)、无队头头部阻塞Head-of-Line Blocking(独立Stream流丢包只影响该流不影响其他流 unlike TCP single sequence number)、前向 secrecy Forward Secrecy(ECDHE密钥交换)。HTTP/3基于QUIC取代TCP+TLS 1.3+HTTP/2组合。Chrome/Cloudflare全面支持。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-38',title:"SDN软件定义网络？OpenFlow？VXLAN Overlay？",category:'network',difficulty:'medium',content:"SDN Software Defined Networking：控制平面Control Plane(集中式智能决策路由策略)和数据平面Data Plane(分布式傻瓜转发设备)分离。控制器Controller(ONOS/OpenDaylight)南向API Southbound(OpenFlow N",answer:"SDN Software Defined Networking：控制平面Control Plane(集中式智能决策路由策略)和数据平面Data Plane(分布式傻瓜转发设备)分离。控制器Controller(ONOS/OpenDaylight)南向API Southbound(OpenFlow Netconf P4Runtime)下发流表Flow Rule到转发设备Switch。北向API Northbound REST API供上层应用编程。OpenFlow协议：流表Flow Table(Match匹配域+Action动作+Counters计数器+Timeouts超时)匹配+执行。VXLAN Virtual Extensible LAN：Overlay虚拟扩展LAN隧道技术(UDP 4789端口封装原始Ethernet帧)解决VLAN只有4096个ID不足问题(VNI 24-bit 16M租户ID)。Underlay物理网络承载Overlay虚拟网络。云计算VPC Virtual Private Cloud常用VXLAN/Geneve。OVS Open vSwitch软件交换机支持OpenFlow VXLAN。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-39',title:"VPN虚拟专用网？IPSec/OpenVPN/WireGuard？Tailscale？",category:'network',difficulty:'medium',content:"VPN Virtual Private Network：加密隧道保护数据机密性和完整性穿越公共互联网。IPSec(Internet Protocol Security)：网络层协议族 AH(Authentication Header认证头无加密)+ESP(Encapsulating Security",answer:"VPN Virtual Private Network：加密隧道保护数据机密性和完整性穿越公共互联网。IPSec(Internet Protocol Security)：网络层协议族 AH(Authentication Header认证头无加密)+ESP(Encapsulating Security Payload加密载荷)+IKE(Internet Key Exchange密钥交换)。强安全但配置复杂性能开销较大(NAT-T穿透NAT)。OpenVPN：应用层SSL/TLS协议易部署社区成熟。WireGuard( Jason Donenfeld 2019)：现代内核模块级VPN协议极简(仅4000行C代码!)高性能(比OpenVPN快数倍) Curve25519 ECDH密钥交换 + ChaCha20-Poly1305 AEAD加密。ZeroTrust VPN零信任VPN：Tailscale(基于WireGuard Coordination Server协调NAT穿透+ ACL访问控制组网类似ZeroTier)。Headscale自建Coordination Server开源替代Tailscale SaaS控制平面。适合远程办公/多云互联/IoT设备安全接入。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'db-1',title:"事务Transaction ACID特性详解？",category:'database',difficulty:'easy',content:"事务是一组操作的逻辑单元要么全部成功(COMMIT)要么全部回滚(ROLLBACK)保证数据一致性。A原子性Atomicity：不可分割的最小执行单元全部成功或全部撤销Undo Log回滚。C一致性Consistency：事务前后数据库从一个合法状态转变到另一个合法状态(满足约束/触发器/级联)。I",answer:"事务是一组操作的逻辑单元要么全部成功(COMMIT)要么全部回滚(ROLLBACK)保证数据一致性。A原子性Atomicity：不可分割的最小执行单元全部成功或全部撤销Undo Log回滚。C一致性Consistency：事务前后数据库从一个合法状态转变到另一个合法状态(满足约束/触发器/级联)。I隔离性Isolation：并发事务互不干扰(锁/MVCC)。D持久性Durability：提交后永久保存即使崩溃Redo Log恢复。BEGIN/START TRANSACTION开启 COMMIT提交 ROLLBACK回滚 SAVEPOINT设置回滚点。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-2',title:"事务隔离级别？脏读/幻读/不可重复读？",category:'database',difficulty:'medium',content:"ANSI SQL-92定义四级隔离级别(从低到高)：Read Uncommitted读未提交(可能脏读Dirty Read读到未提交数据/不可重复读Non-Repeatable Read/幻读Phantom Read)。Read Committed读已提交(Oracle/PostgreSQL/SQL",answer:"ANSI SQL-92定义四级隔离级别(从低到高)：Read Uncommitted读未提交(可能脏读Dirty Read读到未提交数据/不可重复读Non-Repeatable Read/幻读Phantom Read)。Read Committed读已提交(Oracle/PostgreSQL/SQL Server默认 防脏读 但可能不可重复读和幻读 MVCC每次语句生成新快照)。Repeatable Read可重复读(MySQL InnoDB默认 防脏读和不可重复读 但可能MVCC间隙锁Gap Lock防幻读)。Serializable串行化(最高隔离 强制串行执行 性能最差 锁开销最大)。大多数OLTP应用RC足够。InnoDB RR通过MVCC+Next-Key Lock(Record+Gap)几乎等效Serial但性能好很多。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-3',title:"MVCC多版本并发控制原理？InnoDB实现？",category:'database',difficulty:'medium',content:"MVCC Multi-Version Concurrency Control：通过维护数据多个版本(Version Chain)实现读写不冲突(读不加共享锁 读快照Snapshot)。InnoDB实现核心：Undo Log回滚日志存储旧版本数据形成版本链(roll_ptr指针指向undo log)。",answer:"MVCC Multi-Version Concurrency Control：通过维护数据多个版本(Version Chain)实现读写不冲突(读不加共享锁 读快照Snapshot)。InnoDB实现核心：Undo Log回滚日志存储旧版本数据形成版本链(roll_ptr指针指向undo log)。Read View读视图判断版本可见性(包含min_trx_id最小活跃事务ID/max_trx_id最大事务ID/m_ids列表当前活跃事务IDs)。RC级别：每条SELECT语句生成新Read View(能看到本语句启动后已提交事务更新)。RR级别：事务第一条SELECT生成Read View后续复用(只能看到事务启动前已提交数据)。优点：读写不冲突无锁高并发。缺点：额外存储空间(Undo Log膨胀需purge线程清理)、需要回滚旧版本行数多时扫描慢。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-4',title:"MySQL索引原理？B+树？聚簇索引Clustered Index？",category:'database',difficulty:'hard',content:"InnoDB引擎索引基于B+ Tree(平衡多路搜索树变种)：非叶子节点不存储Data只存Key+Pointer(扇出Fan Out高 层数Level少 通常3层即可存千万级数据 磁盘IO少)。叶子节点Leaf Node：聚簇索引(Clustered Index/主键索引 Primary Key)叶",answer:"InnoDB引擎索引基于B+ Tree(平衡多路搜索树变种)：非叶子节点不存储Data只存Key+Pointer(扇出Fan Out高 层数Level少 通常3层即可存千万级数据 磁盘IO少)。叶子节点Leaf Node：聚簇索引(Clustered Index/主键索引 Primary Key)叶子节点存储完整数据行(Data Row)即数据即索引(表数据按主键B+树组织)。二级索引Secondary Index(普通索引/非聚簇索引 Non-Clustered Index)叶子节点存储主键值(Primary Key Value)需要回表Table Lookup(Back to Clustered Index)获取完整行(覆盖索引Covering Index可避免回表提升性能)。B+树特点：范围查询Range Query优秀(叶子节点双向链表Double Linked List有序遍历)、查询稳定O(log n)。联合索引Composite Index遵循最左前缀Leftmost Prefix原则(如idx(a,b,c) 可查a/ab/abc不能单独b/c/ac/bc)。索引选择性Selectivity越高( distinct/count ratio接近1)效果越好。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-5',title:"MySQL索引优化？Explain执行计划分析？",category:'database',difficulty:'medium',content:"Explain关键字段解读优化方向：type访问类型(从优到差 system>const>eq_ref>ref>range>index>ALL 全表扫描ALL需优化建索引)。key实际使用的索引名( NULL表示没用索引 possible_keys显示可能用到的索引)。rows预估扫描行数(越小越好",answer:"Explain关键字段解读优化方向：type访问类型(从优到差 system>const>eq_ref>ref>range>index>ALL 全表扫描ALL需优化建索引)。key实际使用的索引名( NULL表示没用索引 possible_keys显示可能用到的索引)。rows预估扫描行数(越小越好)。Extra重要提示(Using filesort文件排序需优化排序Using temporary临时表需优化分组 Using index covering index覆盖索引好 Using index condition pushdown ICP索引条件下推好 Using where回表后过滤 Backward index scan逆序扫描)。优化手段：合理建索引(高选择性列/WHERE ORDER BY GROUP BY JOIN ON列)、避免SELECT *(用具体字段利用覆盖索引)、避免索引失效(函数计算/隐式转换/LIKE '%xx'/OR/NOT IN/IS NULL左列)、深分页优化(延迟关联Deferred Join/游标Cursor/书签Bookmark/覆盖索引+JOIN)。SHOW PROFILE查看各阶段耗时。Optimizer Trace深入理解优化器决策过程。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-6',title:"MySQL锁机制？行锁Row Lock/表锁Table Lock/意向锁Intention Lock？",category:'database',difficulty:'medium',content:"InnoDB锁粒度：行级锁Row-Level Lock(粒度最小并发度高但开销大)：Record Lock精确锁定索引记录行、Gap Lock间隙锁(锁索引记录间隙防插入Next-Key Lock=Record+Gap解决RR级别Phantom Read幻读问题)、Insert Intention ",answer:"InnoDB锁粒度：行级锁Row-Level Lock(粒度最小并发度高但开销大)：Record Lock精确锁定索引记录行、Gap Lock间隙锁(锁索引记录间隙防插入Next-Key Lock=Record+Gap解决RR级别Phantom Read幻读问题)、Insert Intention Lock插入意向锁。表级锁Table-Level Lock：MDL Metadata Lock( DDL操作ALTER TABLE等获取表级元数据锁 阻止并发DML导致Waiting for table metadata lock常见线上故障)、意向锁Intention Lock( IS意向共享锁 IX意向意向锁 表级快速判断是否可加行锁 兼容性矩阵)。锁算法Lock Algorithm：Record Gap Next-key。死锁Deadlock检测( innodb_deadlock_detect=ON自动检测回滚代价小的事务)和超时等待( innodb_lock_wait_timeout默认50秒)。显式锁：SELECT ... FOR UPDATE(排他锁X锁) LOCK IN SHARE MODE(共享锁S锁)。乐观锁Optimistic Locking(版本号Version/时间戳Timestamp CAS更新) vs 悲观锁Pessimistic Locking(... FOR UPDATE)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-7',title:"SQL注入原理与防护？Parameterized Query？",category:'database',difficulty:'easy',content:"SQL Injection漏洞本质：将用户输入直接拼接到SQL语句字符串中执行导致语句结构被恶意改变(Union注入/布尔盲注/时间盲注/报错注入)。经典Payload：' OR '1'='1 --。危害：数据泄露/篡改/删除/提权( xp_cmdshell)。防护黄金法则：永远使用参数化查询Pre",answer:"SQL Injection漏洞本质：将用户输入直接拼接到SQL语句字符串中执行导致语句结构被恶意改变(Union注入/布尔盲注/时间盲注/报错注入)。经典Payload：' OR '1'='1 --。危害：数据泄露/篡改/删除/提权( xp_cmdshell)。防护黄金法则：永远使用参数化查询PreparedStatement(占位符?驱动程序负责转义特殊字符和类型检查)！ORM框架Hibernate/MyBatis自动参数化( MyBatis中#{}是参数化 ${}是字符串拼接极其危险禁止用于用户输入！)。其他防线：输入验证Input Validation(白名单Whitelist优于黑名单Blacklist)、最小权限Principle of Least Privilege(应用数据库账号不给DROP GRANT FILE等高危权限)、WAF Web Application Firewall辅助检测拦截异常SQL特征模式。存储过程Stored Procedure相对安全但仍需参数化。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-8',title:"MySQL主从复制Replication原理？异步/半同步/组复制MGR？",category:'database',difficulty:'medium',content:"主从复制Master-Slave Replication核心目的：读写分离Read-Write Splitting分担读压力 + 数据备份容灾 + 离线分析不影响主库。原理：Master主库开启binlog(二进制日志 记录所有数据变更DDL DML Statement Row Mixed格式) -",answer:"主从复制Master-Slave Replication核心目的：读写分离Read-Write Splitting分担读压力 + 数据备份容灾 + 离线分析不影响主库。原理：Master主库开启binlog(二进制日志 记录所有数据变更DDL DML Statement Row Mixed格式) -> Slave从库IO Thread I/O线程拉取Master binlog写入本地Relay Log中继日志 -> Slave SQL Thread SQL线程重放Relay Log中的事件应用到本地实现数据同步。三种模式：异步复制Asynchronous Replication(默认 Master写完binlog即返回给客户端 不等待Slave确认 可能丢失最后几条事务数据)。半同步Semi-Synchronous Replication( Master等待至少一个Slave收到Relay Log并ACK确认后才返回客户端 commit latency增加1 RTT但数据更安全 loss window缩小)。组复制Group Replication MGR MySQL 5.7+(基于Paxos分布式共识协议 单主Single-Primary或多主Multi-Primary模式 基于certification-based replication 强数据一致性 几乎无数据丢失)。GTID Global Transaction Identifier替代传统file-position binlog定位( UUID:transaction_id 格式全局唯一 便于故障转移Failover)。延迟Replication Lag监控Seconds_Behind_Master(主从延迟秒数)过大原因：Slave硬件差/大事务/长查询/网络抖动/磁盘IO瓶颈。解决方案：并行复制( MTS Multi-Threaded Slave Database Parallel Replication LOGICAL_CLOCK based/ WRITE_SET based based on group commit)、SSD加速、大事务拆分。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-9',title:"Redis数据结构与应用场景？String/Hash/List/Set/ZSet？",category:'database',difficulty:'easy',content:"Redis五大基本数据结构及应用：String字符串(简单KV缓存/计数器INCR/DECR原子操作/分布式锁SETNX EX PX/限流滑动窗口)。Hash哈希(对象属性存储如用户信息Profile field-value对 节省内存比String多个key少一次序列化)。List列表( LPUS",answer:"Redis五大基本数据结构及应用：String字符串(简单KV缓存/计数器INCR/DECR原子操作/分布式锁SETNX EX PX/限流滑动窗口)。Hash哈希(对象属性存储如用户信息Profile field-value对 节省内存比String多个key少一次序列化)。List列表( LPUSH RPUSH LPOP RPOP 消息队列简单实现/最新列表 LPUSH + LTRIM保留最近N条/栈队列)。Set集合( SADD SMEMBERS SUNION SINTER SDIFF 去重/共同好友交集/标签系统/随机成员SRANDMEMBER抽奖)。ZSet有序集合Sorted Set( ZADD ZRANGE ZREVRANGE ZRANGEBYSCORE ZREM 排行榜Leaderboard/加权随机/范围查询/延时队列)。高级数据结构：HyperLogLog基数统计( PFADD PFCOUNT UV去重 12KB内存误差0.81% Bitmap位图( SETBIT GETBIT BITCOUNT BITOP 签到/用户在线状态 Bloom Filter布隆过滤器)。Stream流( XADD XREADGROUP XACK 消息队列5.0+ Consumer Group消费组)。Geospatial地理位置( GEOADD GEORADIUS GEODIST 附近的人/地点)。Bitmap位图( SETBIT GETBIT 统计)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-10',title:"Redis持久化？RDB vs AOF？混合持久化Hybrid Persistence？",category:'database',difficulty:'medium',content:"Redis两种持久化机制保障重启后数据恢复：RDB Redis DataBase Snapshot(快照)：fork()子进程在某个时刻将内存数据集快照dump到磁盘.rdb文件(二进制紧凑压缩 体积小 恢复速度快save 900 1/save 300 10/save 60 10000触发)。缺点：",answer:"Redis两种持久化机制保障重启后数据恢复：RDB Redis DataBase Snapshot(快照)：fork()子进程在某个时刻将内存数据集快照dump到磁盘.rdb文件(二进制紧凑压缩 体积小 恢复速度快save 900 1/save 300 10/save 60 10000触发)。缺点：可能丢失最后一次快照后数据( fork耗时大内存阻塞/ Copy-On-Write内存额外开销)、不支持增量备份。AOF Append Only File(追加 only 文件)：记录每条写命令(文本协议可读性好)追加到appendonly.aof文件。fsync策略appendfsync always(每秒fsync最多丢1秒数据)/everysec(每次写入fsync最安全但性能差)/no(交由OS)。缺点：文件体积远大于RDB、恢复速度慢(需重放所有命令)、AOF Rewrite重写压缩( bgrewriteaof后台fork子进程压缩去冗余命令)。混合持久化Hybrid Persistence(Redis 4.0+默认开启)：RDB头部(基础全量数据体积小恢复快) + AOF尾部(增量新命令) 兼顾体积和安全性。恢复时先加载RDB再重放AOF。生产环境建议RDB+AOF+主从+哨兵/集群多层保障。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-11',title:"Redis高可用？哨兵Sentinel vs 集群Cluster？",category:'database',difficulty:'medium',content:"Redis高可用演进：主从复制Master-Slave(异步复制 数据冗余读扩展 但手动故障转移Failover复杂且可能丢失数据)。哨兵模式Sentinel( 2.8+ 自动故障转移Failover 核心三个功能Monitoring监控(心跳PING Sentinel <-> Redis Mast",answer:"Redis高可用演进：主从复制Master-Slave(异步复制 数据冗余读扩展 但手动故障转移Failover复杂且可能丢失数据)。哨兵模式Sentinel( 2.8+ 自动故障转移Failover 核心三个功能Monitoring监控(心跳PING Sentinel <-> Redis Master/Slave)、Notification通知(故障转移通过Script通知管理员)、Automatic Failover自动故障转移(SDown主观宕机->ODown客观宕机(quorum多数派)->Vote选举Leader Sentinel->Promote Slave为新的Master->Reconfig other Slaves指向New Master->Notify Clients)。Sentinel节点本身也是分布式(奇数个>=3防Split Brain脑裂)。集群模式Cluster( 3.0+ 数据分片Sharding + 高可用 去中心化 无Proxy直连)：16384个Hash Slot槽位( CRC16(key)%16384 分配到各Master节点) -> Master-Slave主从(每个Master有Slave副本) -> Gossip Protocol八卦协议传播集群状态( Ping/Pong/Fail/Publish ) -> MOVED/ASK重定向(客户端路由到正确节点)。Cluster限制：多Key操作( MGET/MSET/SINTER等)必须在同一Slot( hashtag{}强制)、不支持多数据库空间(DB0 only)、事务有限制( Multi/Exec涉及多Key同Slot)、Pipeline支持受限。选型：数据量<单机内存上限用Sentinel够用；数据量大需水平扩展用Cluster。Proxy模式( Twemproxy/Codis/ predixy)中间件屏蔽集群细节兼容原Redis协议但引入额外延迟和单点。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-12',title:"Redis缓存穿透/击穿/雪崩？解决方案？",category:'database',difficulty:'medium',content:"三大缓存异常问题及对策：缓存缓存穿透Cache Penetration(查询一定不存在的数据如ID=-1 每次都穿透到DB)：①布隆过滤器Bloom Filter( Redis RedisBloom模块或Guava本地 过滤绝对不存在的key 零漏判有一定误判率可接受) ②缓存空值null(短TTL",answer:"三大缓存异常问题及对策：缓存缓存穿透Cache Penetration(查询一定不存在的数据如ID=-1 每次都穿透到DB)：①布隆过滤器Bloom Filter( Redis RedisBloom模块或Guava本地 过滤绝对不存在的key 零漏判有一定误判率可接受) ②缓存空值null(短TTL 30s~5min 防止频繁打DB 但浪费内存存无效数据)。缓存击穿Cache Breakdown(热点Key突然过期瞬间大量并发请求打到DB)：①互斥锁Mutex Lock( SETNX分布式锁 只让一个线程重建缓存 其他线程Sleep重试 保证一致性但吞吐下降) ②逻辑过期Logical Expiration(不设真实TTL 字段存逻辑过期时间 异步后台重建缓存 返回可能过期数据但高吞吐)。③热点数据永不过期(定时异步后台主动刷新)。缓存雪崩Cache Avalanche(大量Key同时过期或Redis宕机导致DB压力暴增)：①TTL加随机值Random TTL( base + random(0, max) 打散过期时间) ②多级缓存L1 Local(Caffeine/Guava) + L2 Distributed(Redis) ③熔断降级Circuit Breaker( 返回默认兜底数据/友好提示 保护DB不被压垮) ④限流Rate Limiting(前端+网关+Nginx+Redis Lua多级限流) ⑤Redis高可用( Sentinel/Cluster防单点故障)。综合采用多层纵深Defense in Depth策略。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-13',title:"MongoDB文档数据库特点？BSON？副本集？分片？",category:'database',difficulty:'medium',content:"MongoDB NoSQL Document-Oriented Database文档数据库特点：1.灵活Schema(无需预定义表结构 同一字段不同文档可有不同类型/缺失 新增字段只需插入即可无需ALTER TABLE) 2.嵌套文档Nested Documents/数组Arrays(减少JOIN关",answer:"MongoDB NoSQL Document-Oriented Database文档数据库特点：1.灵活Schema(无需预定义表结构 同一字段不同文档可有不同类型/缺失 新增字段只需插入即可无需ALTER TABLE) 2.嵌套文档Nested Documents/数组Arrays(减少JOIN关联查询 应用代码方便) 3.丰富的查询语言(索引Index/聚合管道Aggregation Pipeline/地理空间Geospatial/全文检索Text Search) 4.水平扩展Sharding(自动数据均衡) 5.副本集Replica Set(自动故障转移High Availability)。数据格式BSON(Binary JSON)：二进制JSON扩展 支持更多Date/Binary/ObjectId/Timestamp等原生类型 比纯文本JSON更高效(长度前缀Type Byte)。ObjectId：12字节唯一标识符(4字节timestamp + 3字节machine identifier + 2字节process id + 3字节counter 自增可近似提取时间)。副本集Replica Set架构：Primary主节点(读写) + Secondary从节点(只读可配置) + Arbiter仲裁节点(仅投票无数据 防止偶数节点平票)。Oplog(Operation Log capped collection固定大小集合)复制到从节点异步最终一致Eventual Consistency。读偏好Read Preference( primaryPreferred/secondaryPreferred/nearest)。写关注Write Concern( w majority/journal/majority确认数)。分片Sharding：Chunk数据块(默认64MB) + Shard Key分片键(基数高Cardinality/分布均匀Distribution/查询常用Query Pattern至关重要) + Shard节点( Mongos路由服务器 + Config Server配置服务器元数据存储 + Shard存储节点)。分片策略Range范围/Hash哈希(更均匀)。均衡器Balancer后台进程迁移Chunk(迁移期间有性能影响)。Jumbo Chunk超大块需手动split拆分。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-14',title:"PostgreSQL vs MySQL？PG优势场景？MVCC差异？",category:'database',difficulty:'medium',content:"PostgreSQL号称世界上最先进的开源数据库The World's Most Advanced Open Source Relational Database Object-Relational DBMS ORDBMS：优势1.SQL标准合规性极高(SQL:2011支持度最高) 2.复杂查询优化",answer:"PostgreSQL号称世界上最先进的开源数据库The World's Most Advanced Open Source Relational Database Object-Relational DBMS ORDBMS：优势1.SQL标准合规性极高(SQL:2011支持度最高) 2.复杂查询优化能力强(窗口函数Window Function/CTE Common Table Expression WITH RECURSIVE递归查询/JSONB JSON二进制存储查询/GiST GIN BRIN丰富索引类型/ FDW Foreign Data Wrapper外部数据包装器访问异构数据源) 3.可靠性极高( Write-Ahead Logging WAL预写日志 PITR Point-in-Time Recovery时间点恢复/ Hot Standby热备流复制 Logical Decoding逻辑解码CDC Change Data Capture pgoutput plugin) 4.扩展性极强(PostGIS地理空间扩展/pg_vector向量相似度搜索AI/ Citus分布式扩展/hstore/ltree等)。劣势：学习曲线陡峭/生态工具不如MySQL丰富( ORM/运维监控)/简单CRUD性能略低/更新大表需要表重写Rewrite Table( VACUUM FULL清理死亡元组回收空间 PG特色操作 需要额外磁盘空间和IO)。MVCC实现差异：InnoDB( Update-in-Place原地更新+ Undo Log旧版本 多版本共存 Roll_ptr指针链) vs PostgreSQL(Append-Only新版本写到新位置 Old/New版本共存 旧版本需VACUUM清理否则表膨胀bloat PG特色操作需定期autovacuum或手动vacuum)。事务隔离：PG的Repeatable Read真正基于快照Snapshot Isolation( Serializable级别在PG 9.1+也是基于SSI SSI Serializable Snapshot Isolation快照隔离实现 并非真正串行化 性能更好)。适用场景：复杂查询分析/ GIS地理信息系统/ 科学数据/ JSON文档/ 需要严格ACID和复杂约束的企业应用。MySQL适合简单CRUD/Web应用/电商/读多写少。两者互补共存。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-15',title:"数据库索引设计原则？什么不该建索引？",category:'database',difficulty:'medium',content:"索引设计黄金原则：1.WHERE/ORDER BY/GROUP BY/JOIN ON条件列(最常用查询条件优先) 2.高选择性High Selectivity列( distinct/count ratio越接近1越好 如UUID/手机号/邮箱 性别/布尔等低选择性列单独建索引意义不大除非复合索引前导",answer:"索引设计黄金原则：1.WHERE/ORDER BY/GROUP BY/JOIN ON条件列(最常用查询条件优先) 2.高选择性High Selectivity列( distinct/count ratio越接近1越好 如UUID/手机号/邮箱 性别/布尔等低选择性列单独建索引意义不大除非复合索引前导列) 3.区分度Distinctiveness高的列优先放在联合索引前面(最左前缀原则 Leftmost Prefix) 4.覆盖索引Covering Index( SELECT列全部包含在索引中 避免回表Back to Table Lookup 大幅提升性能 Extra: Using index) 5.小表Small Table(行数<几千) 全表扫描Sequential Scan可能比索引更快(随机IO vs 顺序IO) 不值得建索引。不该建索引的情况：①表中数据量很小(全表扫描更快) ②很少作为查询条件的列(浪费存储和维护开销) ③频繁大批量INSERT/UPDATE/DELETE的列(索引维护拖慢写入 B+树分裂合并页Page Split/Merge开销) ④区分度极低的列(如性别男/女 索引选择性太差 Cardinality低) ⑤长文本列(如TEXT/BLOB 直接索引占用巨大 考虑前缀索引Prefix Index或全文索引Full-text Index)。复合索引列顺序原则：等值查询Equality列在前、范围查询Range列在后、经常一起出现的列放一起。索引不是越多越好(占用磁盘空间/降低写入性能/优化器选择困难) 定期分析unused indexes无用索引删除。EXPLAIN ANALYZE实测验证效果。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-16',title:"数据库连接池Connection Pool原理与调优？",category:'database',difficulty:'medium',content:"连接池Purpose：数据库连接TCP三次握手+TLS认证开销大(数十毫秒级) 预先创建一批连接复用Reuse避免频繁建立Destroy和释放Release( Close归还池中而非真断开)。核心组件：空闲连接队列Idle Queue(等待被借用)、活跃连接Active Set(正在被使用中)、最大",answer:"连接池Purpose：数据库连接TCP三次握手+TLS认证开销大(数十毫秒级) 预先创建一批连接复用Reuse避免频繁建立Destroy和释放Release( Close归还池中而非真断开)。核心组件：空闲连接队列Idle Queue(等待被借用)、活跃连接Active Set(正在被使用中)、最大连接数Max Active(上限防止库被打爆)、最小空闲Min Idle(保底预热)、连接有效性校验Validation Query( borrow时ping/testOnBorrow/onReturn防止连接已被DB端关闭变成僵尸连接Stale Connection)、超时驱逐Eviction( timeBetweenEvictionRunsMillis检查间隔 minEvictableIdleTimeMillis空闲超时回收)、借出等待超时borrow timeout(排队Queue满时抛出异常或阻塞Wait)、泄漏检测Remove Abandoned(连接借出太久未归还视为泄漏强行回收 removeAbandoned=true)。主流连接池：HikariCP( Spring Boot 2.x默认 号称最快 lightweight 代码精良约130KB)、Druid(阿里巴巴 监控统计SQL FireWall防SQL注入功能强大)、C3P0(老牌较重)、Vibur(基于Java NIO异步)。调优建议：maximumPoolSize=(CPU核心数 * 2) ~ (CPU核心数 * 4)左右 根据压测实际QPS调整(观察Active峰值)。connectionTimeout连接超时( ms 借不到抛异常别让线程无限等)。idleTimeout/maxLifetime( MySQL默认wait_timeout 8h interactive_timeout 8h 连接超过此时间会被MySQL服务端断开 导致池中有僵尸连接 必须maxLifetime < MySQL wait_timeout 建议30min或更短 leakDetectionThreshold泄漏检测阈值。监控指标：active/idle/pending/waiting/total connections。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-17',title:"数据库容量规划Capacity Planning？估算方法？",category:'database',difficulty:'medium',content:"容量规划目标：提前预测未来N个月/年的数据量和资源需求 避免线上故障(磁盘满/性能下降)。估算公式：单行平均大小Avg Row Size(字节) * 预估总行数Estimated Total Rows + 索引空间Index Space(约占数据量20%~50%视索引数量和类型而定) + 预留增长空",answer:"容量规划目标：提前预测未来N个月/年的数据量和资源需求 避免线上故障(磁盘满/性能下降)。估算公式：单行平均大小Avg Row Size(字节) * 预估总行数Estimated Total Rows + 索引空间Index Space(约占数据量20%~50%视索引数量和类型而定) + 预留增长空间Headroom(50%~100%应对突发增长和碎片)。示例：订单表Order( 200 bytes/row * 1000万 orders = 2GB data + 1GB index ≈ 3GB total)。年增长率Yearly Growth Rate(如200%)推算未来所需空间。监控工具：information_schema.TABLES( data_length+index_length 查看各表大小)、SHOW TABLE STATUS、pt-disk-PostgreSQL pg_stat_user_tables/nodestats。告警阈值：磁盘使用率Disk Usage > 70%预警Warning > 85%紧急Critical > 95%致命Fatal(可能导致MySQL Crash无法启动InnoDB Recovery耗时极长)。扩容方案：垂直Scale Up(升级硬件CPU/内存/SSD NVMe RAID10 快速但天花板) vs 水平Scale Out(分库分表Sharding 复杂但理论上无限)。单表建议：< 2000万行( MySQL InnoDB) 或 < 单机物理内存Physical RAM能装下Hot Data热数据( Buffer Pool) 否则查询性能急剧下降(大量磁盘IO Random IO)。冷热数据分离Cold-Hot Data Separation(历史数据归档Archive到对象存储OSS/S3或冷存储库)。定期清理Delete过期数据(软删除Soft Delete标记+异步物理清理Job)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'network-40',title:"什么是TCP拥塞控制？基本概念和作用？",category:'network',difficulty:'easy',content:"TCP拥塞控制是计算机科学中的重要基础概念。理解TCP拥塞控制对于掌握network知识体系至关重要。它是面试中的高频考点。",answer:"什么是TCP拥塞控制？基本概念和作用？\n\n这是关于TCP拥塞控制的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-41',title:"HTTP/2多路复用的作用是什么？应用场景？",category:'network',difficulty:'easy',content:"HTTP/2多路复用在network系统中扮演着重要角色。它的主要作用是解决特定类型的问题。实际开发中经常用到。",answer:"HTTP/2多路复用的作用是什么？应用场景？\n\n这是关于HTTP/2多路复用的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-42',title:"如何配置和使用TLS 1.3握手？",category:'network',difficulty:'easy',content:"正确配置和使用TLS 1.3握手可以显著提升系统性能和开发效率。需要根据具体场景选择合适的参数和策略。",answer:"如何配置和使用TLS 1.3握手？\n\n这是关于TLS 1.3握手的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-43',title:"DNS over HTTPS有哪些优缺点？如何选择？",category:'network',difficulty:'easy',content:"DNS over HTTPS有多个实现方案或变体，各有优劣。选择时需要综合考虑性能、复杂度、兼容性和团队熟悉度。",answer:"DNS over HTTPS有哪些优缺点？如何选择？\n\n这是关于DNS over HTTPS的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-44',title:"什么是QUIC协议？基本概念和作用？",category:'network',difficulty:'easy',content:"QUIC协议是计算机科学中的重要基础概念。理解QUIC协议对于掌握network知识体系至关重要。它是面试中的高频考点。",answer:"什么是QUIC协议？基本概念和作用？\n\n这是关于QUIC协议的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-45',title:"WebSocket心跳的作用是什么？应用场景？",category:'network',difficulty:'easy',content:"WebSocket心跳在network系统中
