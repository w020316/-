器。降低成本、提高灵活性。与SDN互补。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-29',title:"什么是Service Mesh？",category:'network',difficulty:'medium',content:"Service Mesh是微服务通信基础设施层。数据面：Sidecar代理(Envoy)拦截流量。控制面：管理代理配置(Istiod)。功能：流量管理、安全(mTLS)、可观测性。",answer:"Service Mesh是微服务通信基础设施层。数据面：Sidecar代理(Envoy)拦截流量。控制面：管理代理配置(Istiod)。功能：流量管理、安全(mTLS)、可观测性。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-30',title:"什么是gRPC？",category:'network',difficulty:'medium',content:"gRPC是Google的高性能RPC框架，基于HTTP/2和Protocol Buffers。支持四种模式：一元、服务端流、客户端流、双向流。优点：强类型、高效、多语言支持。",answer:"gRPC是Google的高性能RPC框架，基于HTTP/2和Protocol Buffers。支持四种模式：一元、服务端流、客户端流、双向流。优点：强类型、高效、多语言支持。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-31',title:"什么是消息队列？常见产品？",category:'network',difficulty:'medium',content:"消息队列实现异步通信和解耦。模型：点对点、发布订阅。产品：Kafka(高吞吐)、RabbitMQ(可靠)、RocketMQ(事务)、Pulsar(存储计算分离)。",answer:"消息队列实现异步通信和解耦。模型：点对点、发布订阅。产品：Kafka(高吞吐)、RabbitMQ(可靠)、RocketMQ(事务)、Pulsar(存储计算分离)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-32',title:"什么是API网关？",category:'network',difficulty:'medium',content:"API网关是微服务的统一入口。功能：1.路由转发 2.认证授权 3.限流熔断 4.日志监控 5.协议转换。产品：Kong、Nginx、Spring Cloud Gateway。",answer:"API网关是微服务的统一入口。功能：1.路由转发 2.认证授权 3.限流熔断 4.日志监控 5.协议转换。产品：Kong、Nginx、Spring Cloud Gateway。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-33',title:"什么是OAuth 2.0？",category:'network',difficulty:'medium',content:"OAuth 2.0是授权框架，允许第三方应用访问用户资源。四种模式：1.授权码(最安全) 2.隐式(不推荐) 3.密码(信任应用) 4.客户端凭证(服务间)。",answer:"OAuth 2.0是授权框架，允许第三方应用访问用户资源。四种模式：1.授权码(最安全) 2.隐式(不推荐) 3.密码(信任应用) 4.客户端凭证(服务间)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-34',title:"什么是JWT？结构？",category:'network',difficulty:'easy',content:"JWT(JSON Web Token)由三部分组成：Header(算法类型).Payload(数据).Signature(签名)。优点：无状态、跨域。缺点：无法撤销、payload明文。",answer:"JWT(JSON Web Token)由三部分组成：Header(算法类型).Payload(数据).Signature(签名)。优点：无状态、跨域。缺点：无法撤销、payload明文。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-35',title:"什么是CORS预检请求？",category:'network',difficulty:'medium',content:"非简单请求(PUT/DELETE、自定义头等)会先发送OPTIONS预检请求。服务端返回允许的方法和头。预检结果可缓存(Access-Control-Max-Age)。",answer:"非简单请求(PUT/DELETE、自定义头等)会先发送OPTIONS预检请求。服务端返回允许的方法和头。预检结果可缓存(Access-Control-Max-Age)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-36',title:"什么是HTTP缓存？",category:'network',difficulty:'medium',content:"强缓存：Cache-Control(max-age)、Expires，直接使用缓存。协商缓存：ETag/If-None-Match、Last-Modified/If-Modified-Since，需要验证。304 Not Modified表示缓存有效。",answer:"强缓存：Cache-Control(max-age)、Expires，直接使用缓存。协商缓存：ETag/If-None-Match、Last-Modified/If-Modified-Since，需要验证。304 Not Modified表示缓存有效。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-37',title:"什么是长连接和短连接？",category:'network',difficulty:'easy',content:"短连接：每次请求建立新TCP连接。长连接(Connection: keep-alive)：一个连接处理多个请求。HTTP/1.1默认长连接。长连接减少握手开销，但需要心跳保活。",answer:"短连接：每次请求建立新TCP连接。长连接(Connection: keep-alive)：一个连接处理多个请求。HTTP/1.1默认长连接。长连接减少握手开销，但需要心跳保活。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-38',title:"什么是IP分片？",category:'network',difficulty:'medium',content:"IP数据报超过MTU(通常1500字节)时需要分片。每个分片独立路由，到达后重组。DF标志位禁止分片，用于PMTU发现。TCP会避免IP分片(MSS协商)。",answer:"IP数据报超过MTU(通常1500字节)时需要分片。每个分片独立路由，到达后重组。DF标志位禁止分片，用于PMTU发现。TCP会避免IP分片(MSS协商)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-39',title:"什么是NAT？类型？",category:'network',difficulty:'medium',content:"NAT(网络地址转换)将私有IP转换为公网IP。类型：1.SNAT(源地址转换，出站) 2.DNAT(目的地址转换，入站) 3.PAT(端口地址转换，多对一)。NAT穿透问题影响P2P。",answer:"NAT(网络地址转换)将私有IP转换为公网IP。类型：1.SNAT(源地址转换，出站) 2.DNAT(目的地址转换，入站) 3.PAT(端口地址转换，多对一)。NAT穿透问题影响P2P。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-40',title:"什么是IPv6？与IPv4的区别？",category:'network',difficulty:'medium',content:"IPv6地址128位(vs IPv4 32位)，地址空间2^128。改进：1.简化头部 2.无NAT 3.内置IPsec 4.自动配置(SLAAC) 5.无广播(用组播替代)。",answer:"IPv6地址128位(vs IPv4 32位)，地址空间2^128。改进：1.简化头部 2.无NAT 3.内置IPsec 4.自动配置(SLAAC) 5.无广播(用组播替代)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-41',title:"什么是组播(Multicast)？",category:'network',difficulty:'medium',content:"组播是一对多通信，数据发送到一组接收者。IGMP管理组播组成员，组播路由协议(PIM)构建分发树。适用于视频会议、直播。",answer:"组播是一对多通信，数据发送到一组接收者。IGMP管理组播组成员，组播路由协议(PIM)构建分发树。适用于视频会议、直播。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-42',title:"什么是Anycast？",category:'network',difficulty:'medium',content:"Anycast将相同IP分配给多台服务器，路由到最近的一台。用于DNS根服务器和CDN。BGP Anycast通过路由协议选择最近节点。",answer:"Anycast将相同IP分配给多台服务器，路由到最近的一台。用于DNS根服务器和CDN。BGP Anycast通过路由协议选择最近节点。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-43',title:"什么是网络命名空间(netns)？",category:'network',difficulty:'easy',content:"netns隔离网络栈：网卡、IP、路由、iptables。每个容器有独立的netns。veth pair连接不同netns。ip netns命令管理。",answer:"netns隔离网络栈：网卡、IP、路由、iptables。每个容器有独立的netns。veth pair连接不同netns。ip netns命令管理。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-44',title:"什么是veth pair？",category:'network',difficulty:'easy',content:"veth pair是虚拟网线，一端连接一个netns，另一端连接另一个netns或网桥。类似管道，一端发送的数据从另一端接收。容器网络的基础。",answer:"veth pair是虚拟网线，一端连接一个netns，另一端连接另一个netns或网桥。类似管道，一端发送的数据从另一端接收。容器网络的基础。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-45',title:"什么是Linux网桥(bridge)？",category:'network',difficulty:'medium',content:"Linux网桥是虚拟交换机，连接多个网络接口。学习MAC地址，转发帧。docker0是Docker默认网桥。brctl或ip link管理网桥。",answer:"Linux网桥是虚拟交换机，连接多个网络接口。学习MAC地址，转发帧。docker0是Docker默认网桥。brctl或ip link管理网桥。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-46',title:"什么是iptables？五条链？",category:'network',difficulty:'medium',content:"iptables是Linux防火墙工具。五条链：PREROUTING、INPUT、FORWARD、OUTPUT、POSTROUTING。四张表：filter(过滤)、nat(地址转换)、mangle(修改)、raw(连接跟踪)。",answer:"iptables是Linux防火墙工具。五条链：PREROUTING、INPUT、FORWARD、OUTPUT、POSTROUTING。四张表：filter(过滤)、nat(地址转换)、mangle(修改)、raw(连接跟踪)。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-47',title:"什么是nftables？",category:'network',difficulty:'medium',content:"nftables是iptables的替代品，统一了IPv4/IPv6/ARP/bridge。改进：1.更简单的语法 2.更高效的规则集 3.原子更新 4.更好的性能。Linux内核推荐使用。",answer:"nftables是iptables的替代品，统一了IPv4/IPv6/ARP/bridge。改进：1.更简单的语法 2.更高效的规则集 3.原子更新 4.更好的性能。Linux内核推荐使用。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-48',title:"什么是TCP Fast Open？",category:'network',difficulty:'medium',content:"TFO允许在SYN包中携带数据，减少一个RTT。首次连接获取Cookie，后续连接SYN携带Cookie和数据。适用于短连接场景。",answer:"TFO允许在SYN包中携带数据，减少一个RTT。首次连接获取Cookie，后续连接SYN携带Cookie和数据。适用于短连接场景。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-49',title:"什么是MPTCP？",category:'network',difficulty:'hard',content:"MPTCP(多路径TCP)允许一个TCP连接使用多个子流(如WiFi和4G同时)。提高吞吐量和可靠性。Linux 5.6+支持。适用于移动设备网络切换。",answer:"MPTCP(多路径TCP)允许一个TCP连接使用多个子流(如WiFi和4G同时)。提高吞吐量和可靠性。Linux 5.6+支持。适用于移动设备网络切换。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-50',title:"什么是QUIC协议？",category:'network',difficulty:'hard',content:"QUIC是Google设计的传输协议，基于UDP。特点：1.0-RTT连接 2.无队头阻塞 3.连接迁移 4.内置加密 5.用户态实现。是HTTP/3的基础。",answer:"QUIC是Google设计的传输协议，基于UDP。特点：1.0-RTT连接 2.无队头阻塞 3.连接迁移 4.内置加密 5.用户态实现。是HTTP/3的基础。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-51',title:"什么是网络拓扑？常见类型？",category:'network',difficulty:'easy',content:"网络拓扑是网络设备的连接方式。类型：1.星型(中心交换机) 2.环型 3.总线型 4.网状(全连接) 5.树型 6.混合型。数据中心常用叶脊(Spine-Leaf)拓扑。",answer:"网络拓扑是网络设备的连接方式。类型：1.星型(中心交换机) 2.环型 3.总线型 4.网状(全连接) 5.树型 6.混合型。数据中心常用叶脊(Spine-Leaf)拓扑。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-52',title:"什么是BGP Anycast？",category:'network',difficulty:'medium',content:"BGP Anycast将相同IP通告到多个位置，BGP选择最短路径。用于DNS(8.8.8.8)和CDN。优点：就近访问、负载均衡、高可用。",answer:"BGP Anycast将相同IP通告到多个位置，BGP选择最短路径。用于DNS(8.8.8.8)和CDN。优点：就近访问、负载均衡、高可用。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-53',title:"什么是网络切片？",category:'network',difficulty:'hard',content:"5G网络切片在同一物理网络上创建多个虚拟网络，每个切片有不同的SLA(带宽、延迟、可靠性)。使用SDN和NFV技术实现。",answer:"5G网络切片在同一物理网络上创建多个虚拟网络，每个切片有不同的SLA(带宽、延迟、可靠性)。使用SDN和NFV技术实现。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-54',title:"什么是零信任网络？",category:'network',difficulty:'medium',content:"零信任原则：不信任任何内部或外部网络。核心：1.身份验证 2.最小权限 3.微隔离 4.持续验证 5.设备健康检查。BeyondCorp是Google的零信任实现。",answer:"零信任原则：不信任任何内部或外部网络。核心：1.身份验证 2.最小权限 3.微隔离 4.持续验证 5.设备健康检查。BeyondCorp是Google的零信任实现。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-55',title:"什么是SNI？ESNI？",category:'network',difficulty:'medium',content:"SNI(Server Name Indication)在TLS握手时发送域名，支持同一IP多证书。ESNI加密SNI，防止监听。需要DNS HTTPS记录发布公钥。",answer:"SNI(Server Name Indication)在TLS握手时发送域名，支持同一IP多证书。ESNI加密SNI，防止监听。需要DNS HTTPS记录发布公钥。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-56',title:"什么是证书透明度(CT)？",category:'network',difficulty:'medium',content:"CT要求CA将签发的证书记录到公开日志中，可审计。浏览器验证证书是否在CT日志中。防止CA误发或恶意签发证书。",answer:"CT要求CA将签发的证书记录到公开日志中，可审计。浏览器验证证书是否在CT日志中。防止CA误发或恶意签发证书。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-57',title:"什么是DNS over HTTPS(DoH)？",category:'network',difficulty:'easy',content:"DoH将DNS查询通过HTTPS加密传输，防止DNS监听和篡改。端口443，与普通HTTPS流量混合。DoT(DNS over TLS)使用端口853。",answer:"DoH将DNS查询通过HTTPS加密传输，防止DNS监听和篡改。端口443，与普通HTTPS流量混合。DoT(DNS over TLS)使用端口853。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-58',title:"什么是DNSSEC？",category:'network',difficulty:'medium',content:"DNSSEC为DNS响应添加数字签名，验证数据来源和完整性。使用KSK和ZSK两对密钥。不加密DNS数据，只验证真实性。",answer:"DNSSEC为DNS响应添加数字签名，验证数据来源和完整性。使用KSK和ZSK两对密钥。不加密DNS数据，只验证真实性。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-59',title:"什么是mDNS？",category:'network',difficulty:'easy',content:"mDNS(组播DNS)在局域网内解析域名，无需DNS服务器。使用组播地址224.0.0.251。.local域。Bonjour和Avahi使用mDNS。用于设备发现。",answer:"mDNS(组播DNS)在局域网内解析域名，无需DNS服务器。使用组播地址224.0.0.251。.local域。Bonjour和Avahi使用mDNS。用于设备发现。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'net-custom-60',title:"什么是SRV记录？",category:'network',difficulty:'medium',content:"SRV记录指定服务的服务器和端口。格式：_service._proto.name TTL SRV priority weight port target。用于SIP、XMPP、LDAP等服务发现。",answer:"SRV记录指定服务的服务器和端口。格式：_service._proto.name TTL SRV priority weight port target。用于SIP、XMPP、LDAP等服务发现。",sourceType:'builtin',source:"面试高频题",tags:["计算机网络"]},{id:'db-custom-1',title:"什么是ACID？",category:'database',difficulty:'easy',content:"ACID是事务的四个特性：原子性(Atomicity，全部成功或全部失败)、一致性(Consistency，数据从一个一致状态到另一个)、隔离性(Isolation，事务间不干扰)、持久性(Durability，提交后永久保存)。",answer:"ACID是事务的四个特性：原子性(Atomicity，全部成功或全部失败)、一致性(Consistency，数据从一个一致状态到另一个)、隔离性(Isolation，事务间不干扰)、持久性(Durability，提交后永久保存)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-2',title:"MySQL的索引类型？B+树索引原理？",category:'database',difficulty:'medium',content:"索引类型：主键索引、唯一索引、普通索引、组合索引、全文索引。B+树索引：非叶子节点只存键值，叶子节点存数据并链表连接。优点：范围查询快、磁盘IO少。",answer:"索引类型：主键索引、唯一索引、普通索引、组合索引、全文索引。B+树索引：非叶子节点只存键值，叶子节点存数据并链表连接。优点：范围查询快、磁盘IO少。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-3',title:"什么是事务隔离级别？",category:'database',difficulty:'medium',content:"四种隔离级别：1.读未提交(脏读) 2.读已提交(不可重复读) 3.可重复读(幻读，MySQL默认) 4.串行化(无并发问题)。MySQL通过MVCC和间隙锁解决幻读。",answer:"四种隔离级别：1.读未提交(脏读) 2.读已提交(不可重复读) 3.可重复读(幻读，MySQL默认) 4.串行化(无并发问题)。MySQL通过MVCC和间隙锁解决幻读。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-4',title:"什么是MVCC？",category:'database',difficulty:'hard',content:"MVCC(多版本并发控制)通过保存数据的多个版本实现无锁读。每行有创建版本号和删除版本号。读操作只看已提交且在事务开始前的版本。写操作加锁。",answer:"MVCC(多版本并发控制)通过保存数据的多个版本实现无锁读。每行有创建版本号和删除版本号。读操作只看已提交且在事务开始前的版本。写操作加锁。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-5',title:"什么是锁？乐观锁和悲观锁？",category:'database',difficulty:'medium',content:"悲观锁：先加锁再操作(SELECT FOR UPDATE)。乐观锁：先操作再检查(版本号/CAS)。MySQL行锁、表锁、间隙锁、意向锁。InnoDB支持行锁，MyISAM只有表锁。",answer:"悲观锁：先加锁再操作(SELECT FOR UPDATE)。乐观锁：先操作再检查(版本号/CAS)。MySQL行锁、表锁、间隙锁、意向锁。InnoDB支持行锁，MyISAM只有表锁。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-6',title:"什么是分库分表？",category:'database',difficulty:'hard',content:"分库分表解决单库单表数据量过大问题。水平分表：按规则拆分到多个表。垂直分库：按业务拆分到不同库。常用中间件：ShardingSphere、MyCat。需要考虑分布式事务和跨库查询。",answer:"分库分表解决单库单表数据量过大问题。水平分表：按规则拆分到多个表。垂直分库：按业务拆分到不同库。常用中间件：ShardingSphere、MyCat。需要考虑分布式事务和跨库查询。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-7',title:"Redis的数据类型？",category:'database',difficulty:'easy',content:"五种基本类型：String(字符串)、Hash(哈希)、List(列表)、Set(集合)、ZSet(有序集合)。扩展类型：Bitmap、HyperLogLog、Geo、Stream。",answer:"五种基本类型：String(字符串)、Hash(哈希)、List(列表)、Set(集合)、ZSet(有序集合)。扩展类型：Bitmap、HyperLogLog、Geo、Stream。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-8',title:"Redis的持久化方式？",category:'database',difficulty:'medium',content:"RDB：定时快照，文件小恢复快，可能丢数据。AOF：追加写日志，数据安全，文件大。混合持久化(RDB+AOF)：RDB间隔用AOF。Redis 4.0+支持。",answer:"RDB：定时快照，文件小恢复快，可能丢数据。AOF：追加写日志，数据安全，文件大。混合持久化(RDB+AOF)：RDB间隔用AOF。Redis 4.0+支持。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-9',title:"什么是缓存穿透、击穿、雪崩？",category:'database',difficulty:'medium',content:"穿透：查询不存在的数据(布隆过滤器/空值缓存)。击穿：热点key过期(互斥锁/永不过期)。雪崩：大量key同时过期(随机过期时间/多级缓存)。",answer:"穿透：查询不存在的数据(布隆过滤器/空值缓存)。击穿：热点key过期(互斥锁/永不过期)。雪崩：大量key同时过期(随机过期时间/多级缓存)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-10',title:"MySQL的主从复制原理？",category:'database',difficulty:'medium',content:"1.Master写binlog 2.Slave的IO线程拉取binlog写入relay log 3.Slave的SQL线程重放relay log。模式：异步(默认)、半同步、全同步。延迟问题可通过并行复制优化。",answer:"1.Master写binlog 2.Slave的IO线程拉取binlog写入relay log 3.Slave的SQL线程重放relay log。模式：异步(默认)、半同步、全同步。延迟问题可通过并行复制优化。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-11',title:"什么是CAP定理？",category:'database',difficulty:'medium',content:"CAP：一致性(Consistency)、可用性(Availability)、分区容错性(Partition tolerance)。分布式系统最多同时满足两个。CP系统：ZooKeeper。AP系统：Eureka。",answer:"CAP：一致性(Consistency)、可用性(Availability)、分区容错性(Partition tolerance)。分布式系统最多同时满足两个。CP系统：ZooKeeper。AP系统：Eureka。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-12',title:"什么是BASE理论？",category:'database',difficulty:'easy',content:"BASE：基本可用(Basically Available)、软状态(Soft State)、最终一致性(Eventually Consistent)。是CAP中AP的延伸，适用于大型分布式系统。",answer:"BASE：基本可用(Basically Available)、软状态(Soft State)、最终一致性(Eventually Consistent)。是CAP中AP的延伸，适用于大型分布式系统。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-13',title:"什么是Raft协议？",category:'database',difficulty:'hard',content:"Raft是分布式一致性协议。角色：Leader、Follower、Candidate。选举：超时后Candidate请求投票，获多数票成为Leader。日志复制：Leader将日志复制到Follower，多数确认后提交。",answer:"Raft是分布式一致性协议。角色：Leader、Follower、Candidate。选举：超时后Candidate请求投票，获多数票成为Leader。日志复制：Leader将日志复制到Follower，多数确认后提交。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-14',title:"什么是Paxos协议？",category:'database',difficulty:'hard',content:"Paxos是分布式一致性协议，比Raft更难理解但更早提出。Basic Paxos：Proposer提出值，Acceptor接受值，Learner学习值。Multi-Paxos优化连续提案。",answer:"Paxos是分布式一致性协议，比Raft更难理解但更早提出。Basic Paxos：Proposer提出值，Acceptor接受值，Learner学习值。Multi-Paxos优化连续提案。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-15',title:"什么是ZooKeeper？用途？",category:'database',difficulty:'medium',content:"ZooKeeper是分布式协调服务，提供：1.配置管理 2.命名服务 3.分布式锁 4.集群管理。基于ZAB协议。数据模型是树形结构，每个节点叫znode。",answer:"ZooKeeper是分布式协调服务，提供：1.配置管理 2.命名服务 3.分布式锁 4.集群管理。基于ZAB协议。数据模型是树形结构，每个节点叫znode。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-16',title:"什么是ETCD？与ZooKeeper的区别？",category:'database',difficulty:'medium',content:"etcd是分布式KV存储，基于Raft协议。与ZK区别：1.更简单的数据模型(KV) 2.HTTP+gRPC接口 3.更轻量 4.Kubernetes默认使用。ZK使用自定义协议。",answer:"etcd是分布式KV存储，基于Raft协议。与ZK区别：1.更简单的数据模型(KV) 2.HTTP+gRPC接口 3.更轻量 4.Kubernetes默认使用。ZK使用自定义协议。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-17',title:"MongoDB和MySQL的区别？",category:'database',difficulty:'medium',content:"MongoDB是文档数据库，MySQL是关系数据库。MongoDB：无模式、JSON文档、水平扩展、适合非结构化数据。MySQL：强模式、SQL、ACID事务、适合结构化数据。",answer:"MongoDB是文档数据库，MySQL是关系数据库。MongoDB：无模式、JSON文档、水平扩展、适合非结构化数据。MySQL：强模式、SQL、ACID事务、适合结构化数据。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-18',title:"什么是Elasticsearch？",category:'database',difficulty:'medium',content:"ES是分布式搜索和分析引擎，基于Lucene。特点：1.全文搜索 2.近实时 3.分布式 4.RESTful API 5.倒排索引。用于日志分析(ELK)和搜索。",answer:"ES是分布式搜索和分析引擎，基于Lucene。特点：1.全文搜索 2.近实时 3.分布式 4.RESTful API 5.倒排索引。用于日志分析(ELK)和搜索。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-19',title:"什么是ClickHouse？",category:'database',difficulty:'medium',content:"ClickHouse是列式OLAP数据库，适合大数据分析。特点：1.列式存储 2.向量化执行 3.高性能聚合 4.支持SQL。不适合OLTP(点查和更新)。",answer:"ClickHouse是列式OLAP数据库，适合大数据分析。特点：1.列式存储 2.向量化执行 3.高性能聚合 4.支持SQL。不适合OLTP(点查和更新)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-20',title:"什么是时序数据库？",category:'database',difficulty:'medium',content:"时序数据库(TSDB)专门存储时间序列数据。特点：1.高写入吞吐 2.数据压缩 3.时间范围查询 4.自动过期。产品：InfluxDB、TimescaleDB、Prometheus。",answer:"时序数据库(TSDB)专门存储时间序列数据。特点：1.高写入吞吐 2.数据压缩 3.时间范围查询 4.自动过期。产品：InfluxDB、TimescaleDB、Prometheus。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-21',title:"什么是图数据库？",category:'database',difficulty:'medium',content:"图数据库以节点和边存储数据，擅长关系查询。产品：Neo4j、JanusGraph。适用场景：社交网络、推荐系统、知识图谱、欺诈检测。",answer:"图数据库以节点和边存储数据，擅长关系查询。产品：Neo4j、JanusGraph。适用场景：社交网络、推荐系统、知识图谱、欺诈检测。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-22',title:"SQL和NoSQL的区别？",category:'database',difficulty:'easy',content:"SQL：关系型、强模式、ACID、SQL查询、垂直扩展。NoSQL：非关系型、灵活模式、BASE、多种查询方式、水平扩展。NoSQL类型：文档、键值、列族、图。",answer:"SQL：关系型、强模式、ACID、SQL查询、垂直扩展。NoSQL：非关系型、灵活模式、BASE、多种查询方式、水平扩展。NoSQL类型：文档、键值、列族、图。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-23',title:"什么是数据库连接池？",category:'database',difficulty:'easy',content:"连接池预先创建数据库连接，复用连接减少开销。参数：最小/最大连接数、超时时间、空闲检测。HikariCP是Java最流行的连接池。",answer:"连接池预先创建数据库连接，复用连接减少开销。参数：最小/最大连接数、超时时间、空闲检测。HikariCP是Java最流行的连接池。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-24',title:"什么是慢查询？如何优化？",category:'database',difficulty:'medium',content:"慢查询是执行时间超过阈值的SQL。优化：1.EXPLAIN分析执行计划 2.添加合适索引 3.避免SELECT * 4.优化JOIN 5.分页优化 6.读写分离。",answer:"慢查询是执行时间超过阈值的SQL。优化：1.EXPLAIN分析执行计划 2.添加合适索引 3.避免SELECT * 4.优化JOIN 5.分页优化 6.读写分离。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-25',title:"什么是数据库范式？",category:'database',difficulty:'easy',content:"1NF：属性不可分割。2NF：消除部分依赖。3NF：消除传递依赖。BCNF：每个决定因素都是候选键。实际中常在性能和范式间权衡，适度反范式。",answer:"1NF：属性不可分割。2NF：消除部分依赖。3NF：消除传递依赖。BCNF：每个决定因素都是候选键。实际中常在性能和范式间权衡，适度反范式。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-26',title:"什么是SQL注入？如何防止？",category:'database',difficulty:'easy',content:"SQL注入是通过输入恶意SQL代码攻击数据库。防止：1.参数化查询(预编译) 2.输入验证 3.ORM框架 4.最小权限 5.WAF。永远不要拼接SQL字符串。",answer:"SQL注入是通过输入恶意SQL代码攻击数据库。防止：1.参数化查询(预编译) 2.输入验证 3.ORM框架 4.最小权限 5.WAF。永远不要拼接SQL字符串。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-27',title:"什么是数据库死锁？如何处理？",category:'database',difficulty:'medium',content:"死锁是两个事务互相等待对方持有的锁。处理：1.超时回滚 2.死锁检测(等待图) 3.固定加锁顺序 4.减少事务粒度。InnoDB自动检测死锁并回滚代价小的事务。",answer:"死锁是两个事务互相等待对方持有的锁。处理：1.超时回滚 2.死锁检测(等待图) 3.固定加锁顺序 4.减少事务粒度。InnoDB自动检测死锁并回滚代价小的事务。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-28',title:"什么是数据库触发器？",category:'database',difficulty:'easy',content:"触发器是表上特定事件(INSERT/UPDATE/DELETE)自动执行的SQL。类型：BEFORE/AFTER触发器。用途：数据验证、审计日志、级联更新。过多触发器影响性能。",answer:"触发器是表上特定事件(INSERT/UPDATE/DELETE)自动执行的SQL。类型：BEFORE/AFTER触发器。用途：数据验证、审计日志、级联更新。过多触发器影响性能。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-29',title:"什么是存储过程？",category:'database',difficulty:'easy',content:"存储过程是预编译的SQL语句集合，存储在数据库中。优点：减少网络传输、复用、安全。缺点：调试困难、不可移植、业务逻辑混入数据库。",answer:"存储过程是预编译的SQL语句集合，存储在数据库中。优点：减少网络传输、复用、安全。缺点：调试困难、不可移植、业务逻辑混入数据库。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-30',title:"什么是视图？物化视图？",category:'database',difficulty:'easy',content:"视图是虚拟表，基于查询定义。物化视图实际存储查询结果，需要刷新。视图简化查询，物化视图提高查询性能。MySQL不支持物化视图，可用定时任务模拟。",answer:"视图是虚拟表，基于查询定义。物化视图实际存储查询结果，需要刷新。视图简化查询，物化视图提高查询性能。MySQL不支持物化视图，可用定时任务模拟。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-31',title:"什么是数据库分区？",category:'database',difficulty:'medium',content:"分区将大表分为多个小表，对应用透明。类型：RANGE(范围)、LIST(列表)、HASH(哈希)、KEY。优点：查询只扫描相关分区、维护方便。缺点：跨分区查询性能差。",answer:"分区将大表分为多个小表，对应用透明。类型：RANGE(范围)、LIST(列表)、HASH(哈希)、KEY。优点：查询只扫描相关分区、维护方便。缺点：跨分区查询性能差。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-32',title:"什么是数据库分片(Sharding)？",category:'database',difficulty:'hard',content:"分片将数据分布到多个数据库实例。策略：1.范围分片 2.哈希分片 3.目录分片。需要考虑：分片键选择、跨分片查询、分布式事务、数据迁移。",answer:"分片将数据分布到多个数据库实例。策略：1.范围分片 2.哈希分片 3.目录分片。需要考虑：分片键选择、跨分片查询、分布式事务、数据迁移。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-33',title:"什么是NewSQL？",category:'database',difficulty:'medium',content:"NewSQL结合了NoSQL的扩展性和SQL的ACID。产品：TiDB、CockroachDB、Spanner。特点：1.分布式架构 2.SQL接口 3.强一致性 4.水平扩展。",answer:"NewSQL结合了NoSQL的扩展性和SQL的ACID。产品：TiDB、CockroachDB、Spanner。特点：1.分布式架构 2.SQL接口 3.强一致性 4.水平扩展。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-34',title:"什么是TiDB？",category:'database',difficulty:'medium',content:"TiDB是开源NewSQL数据库，兼容MySQL协议。架构：TiDB(SQL层)+TiKV(存储层)+PD(调度)。特点：1.HTAP 2.水平扩展 3.强一致性 4.MySQL兼容。",answer:"TiDB是开源NewSQL数据库，兼容MySQL协议。架构：TiDB(SQL层)+TiKV(存储层)+PD(调度)。特点：1.HTAP 2.水平扩展 3.强一致性 4.MySQL兼容。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-35',title:"什么是HTAP？",category:'database',difficulty:'hard',content:"HTAP(混合事务/分析处理)同时支持OLTP和OLAP。传统方案需要ETL从TP库同步到AP库。HTAP在一个系统中同时处理，减少延迟和复杂度。TiDB和OceanBase支持。",answer:"HTAP(混合事务/分析处理)同时支持OLTP和OLAP。传统方案需要ETL从TP库同步到AP库。HTAP在一个系统中同时处理，减少延迟和复杂度。TiDB和OceanBase支持。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-36',title:"什么是WAL(Write-Ahead Logging)？",category:'database',difficulty:'medium',content:"WAL先写日志再写数据，保证崩溃恢复。MySQL的redo log、PostgreSQL的WAL都是这个原理。日志顺序写性能高，数据随机写性能低。",answer:"WAL先写日志再写数据，保证崩溃恢复。MySQL的redo log、PostgreSQL的WAL都是这个原理。日志顺序写性能高，数据随机写性能低。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-37',title:"什么是LSM树？",category:'database',difficulty:'hard',content:"LSM(Log-Structured Merge)树是写优化数据结构。写入：先到MemTable(内存)，满了刷到SSTable(磁盘)。读取：MemTable->SSTable(从新到旧)。需要compaction合并。LevelDB/RocksDB使用。",answer:"LSM(Log-Structured Merge)树是写优化数据结构。写入：先到MemTable(内存)，满了刷到SSTable(磁盘)。读取：MemTable->SSTable(从新到旧)。需要compaction合并。LevelDB/RocksDB使用。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-38',title:"什么是B树和B+树？区别？",category:'database',difficulty:'medium',content:"B树每个节点存键值和数据。B+树只在叶子节点存数据，非叶子节点只存键值。B+树优点：1.叶子链表便于范围查询 2.非叶子节点更小，树更矮 3.查询稳定(O(log n))。",answer:"B树每个节点存键值和数据。B+树只在叶子节点存数据，非叶子节点只存键值。B+树优点：1.叶子链表便于范围查询 2.非叶子节点更小，树更矮 3.查询稳定(O(log n))。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-39',title:"什么是数据库索引下推(ICP)？",category:'database',difficulty:'hard',content:"ICP(Index Condition Pushdown)将部分WHERE条件下推到存储引擎层过滤，减少回表次数。MySQL 5.6+支持。适用于联合索引中无法使用最左前缀的列。",answer:"ICP(Index Condition Pushdown)将部分WHERE条件下推到存储引擎层过滤，减少回表次数。MySQL 5.6+支持。适用于联合索引中无法使用最左前缀的列。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-40',title:"什么是覆盖索引？",category:'database',difficulty:'medium',content:"覆盖索引包含查询所需的所有列，不需要回表。EXPLAIN中Extra显示Using index。设计查询时尽量使用覆盖索引，减少IO。",answer:"覆盖索引包含查询所需的所有列，不需要回表。EXPLAIN中Extra显示Using index。设计查询时尽量使用覆盖索引，减少IO。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-41',title:"什么是最左前缀原则？",category:'database',difficulty:'medium',content:"联合索引(a,b,c)生效规则：查询条件必须从最左列开始，不能跳过。a、ab、abc可以用索引，b、bc、c不能。范围查询(>、<)后的列无法使用索引。",answer:"联合索引(a,b,c)生效规则：查询条件必须从最左列开始，不能跳过。a、ab、abc可以用索引，b、bc、c不能。范围查询(>、<)后的列无法使用索引。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-42',title:"什么是数据库事务传播行为？",category:'database',difficulty:'medium',content:"Spring定义7种传播行为：REQUIRED(默认，加入当前事务)、REQUIRES_NEW(新建事务)、NESTED(嵌套事务)等。决定方法调用时事务的行为。",answer:"Spring定义7种传播行为：REQUIRED(默认，加入当前事务)、REQUIRES_NEW(新建事务)、NESTED(嵌套事务)等。决定方法调用时事务的行为。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-43',title:"什么是分布式事务？",category:'database',difficulty:'hard',content:"分布式事务跨多个服务/数据库。2PC：协调者通知参与者prepare，全部OK则commit。3PC增加CanCommit阶段减少阻塞。TCC：Try-Confirm-Cancel。Saga：补偿事务链。",answer:"分布式事务跨多个服务/数据库。2PC：协调者通知参与者prepare，全部OK则commit。3PC增加CanCommit阶段减少阻塞。TCC：Try-Confirm-Cancel。Saga：补偿事务链。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-44',title:"什么是Saga模式？",category:'database',difficulty:'hard',content:"Saga将长事务拆分为多个本地事务，每个事务有补偿操作。两种模式：1.编排(中心协调器) 2.协作(事件驱动)。失败时执行补偿事务回滚。适用于微服务。",answer:"Saga将长事务拆分为多个本地事务，每个事务有补偿操作。两种模式：1.编排(中心协调器) 2.协作(事件驱动)。失败时执行补偿事务回滚。适用于微服务。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-45',title:"什么是Seata？",category:'database',difficulty:'medium',content:"Seata是阿里开源的分布式事务框架。四种模式：1.AT(自动补偿，推荐) 2.TCC(手动补偿) 3.Saga(长事务) 4.XA(强一致)。AT模式通过undo log实现自动回滚。",answer:"Seata是阿里开源的分布式事务框架。四种模式：1.AT(自动补偿，推荐) 2.TCC(手动补偿) 3.Saga(长事务) 4.XA(强一致)。AT模式通过undo log实现自动回滚。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-46',title:"什么是数据库读写分离？",category:'database',difficulty:'medium',content:"写操作走主库，读操作走从库。实现：1.代码层(数据源路由) 2.中间件(ShardingSphere、ProxySQL) 3.MySQL Router。需要处理主从延迟问题。",answer:"写操作走主库，读操作走从库。实现：1.代码层(数据源路由) 2.中间件(ShardingSphere、ProxySQL) 3.MySQL Router。需要处理主从延迟问题。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-47',title:"什么是数据库中间件？",category:'database',difficulty:'medium',content:"数据库中间件代理SQL请求。功能：1.读写分离 2.分库分表 3.连接池 4.SQL审计。产品：ShardingSphere、MyCat、ProxySQL。ShardingSphere最活跃。",answer:"数据库中间件代理SQL请求。功能：1.读写分离 2.分库分表 3.连接池 4.SQL审计。产品：ShardingSphere、MyCat、ProxySQL。ShardingSphere最活跃。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-48',title:"什么是数据湖？",category:'database',difficulty:'medium',content:"数据湖存储原始数据(结构化+非结构化)，以原始格式保存。技术：HDFS、S3、Delta Lake、Iceberg、Hudi。数据仓库存储处理后的结构化数据。",answer:"数据湖存储原始数据(结构化+非结构化)，以原始格式保存。技术：HDFS、S3、Delta Lake、Iceberg、Hudi。数据仓库存储处理后的结构化数据。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-49',title:"什么是数据仓库？",category:'database',difficulty:'medium',content:"数据仓库是面向分析的数据存储。特点：1.面向主题 2.集成 3.不可变 4.随时间变化。架构：ODS->DWD->DWS->ADS。产品：Hive、Snowflake、Redshift。",answer:"数据仓库是面向分析的数据存储。特点：1.面向主题 2.集成 3.不可变 4.随时间变化。架构：ODS->DWD->DWS->ADS。产品：Hive、Snowflake、Redshift。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-50',title:"什么是CDC(Change Data Capture)？",category:'database',difficulty:'medium',content:"CDC捕获数据库变更事件。实现：1.基于查询(定时轮询) 2.基于日志(binlog/WAL)。产品：Canal(MySQL)、Debezium(多数据库)、Flink CDC。用于数据同步。",answer:"CDC捕获数据库变更事件。实现：1.基于查询(定时轮询) 2.基于日志(binlog/WAL)。产品：Canal(MySQL)、Debezium(多数据库)、Flink CDC。用于数据同步。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-51',title:"什么是数据库审计？",category:'database',difficulty:'easy',content:"数据库审计记录所有SQL操作。内容：谁、何时、从哪里、执行了什么SQL。用途：1.安全合规 2.问题排查 3.性能分析。MySQL Enterprise Audit、MariaDB Audit Plugin。",answer:"数据库审计记录所有SQL操作。内容：谁、何时、从哪里、执行了什么SQL。用途：1.安全合规 2.问题排查 3.性能分析。MySQL Enterprise Audit、MariaDB Audit Plugin。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-52',title:"什么是数据库高可用方案？",category:'database',difficulty:'hard',content:"MySQL高可用：1.MHA(主从切换) 2.MGR(MySQL Group Replication) 3.InnoDB Cluster 4.Oracle MHA。云方案：RDS多可用区。关键指标：RPO(数据丢失)和RTO(恢复时间)。",answer:"MySQL高可用：1.MHA(主从切换) 2.MGR(MySQL Group Replication) 3.InnoDB Cluster 4.Oracle MHA。云方案：RDS多可用区。关键指标：RPO(数据丢失)和RTO(恢复时间)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-53',title:"什么是数据库备份策略？",category:'database',difficulty:'easy',content:"备份类型：全量、增量、差异。策略：每周全量+每日增量。工具：mysqldump、xtrabackup、mysqlbackup。需要定期验证备份可恢复。3-2-1原则：3份备份、2种介质、1份异地。",answer:"备份类型：全量、增量、差异。策略：每周全量+每日增量。工具：mysqldump、xtrabackup、mysqlbackup。需要定期验证备份可恢复。3-2-1原则：3份备份、2种介质、1份异地。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-54',title:"什么是Redis Cluster？",category:'database',difficulty:'medium',content:"Redis Cluster是Redis的分布式方案。16384个哈希槽分配到节点。客户端重定向(MOVED/ASK)。支持节点动态扩缩容。至少6个节点(3主3从)。",answer:"Redis Cluster是Redis的分布式方案。16384个哈希槽分配到节点。客户端重定向(MOVED/ASK)。支持节点动态扩缩容。至少6个节点(3主3从)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-55',title:"什么是Redis Sentinel？",category:'database',difficulty:'medium',content:"Sentinel是Redis高可用方案。功能：1.监控 2.通知 3.自动故障转移。至少3个Sentinel节点。选举新Master：优先级->复制偏移量->RunID。",answer:"Sentinel是Redis高可用方案。功能：1.监控 2.通知 3.自动故障转移。至少3个Sentinel节点。选举新Master：优先级->复制偏移量->RunID。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-56',title:"什么是Redis的LRU淘汰？",category:'database',difficulty:'medium',content:"LRU(最近最少使用)淘汰策略：1.allkeys-lru(所有key) 2.volatile-lru(有过期时间的key) 3.allkeys-lfu(最不经常使用) 4.volatile-lfu。Redis使用近似LRU(采样)。",answer:"LRU(最近最少使用)淘汰策略：1.allkeys-lru(所有key) 2.volatile-lru(有过期时间的key) 3.allkeys-lfu(最不经常使用) 4.volatile-lfu。Redis使用近似LRU(采样)。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-57',title:"什么是Redis的发布订阅？",category:'database',difficulty:'medium',content:"Pub/Sub模式：发布者发送消息到频道，订阅者接收频道消息。不支持持久化和消息确认。Redis 5.0+的Stream类型支持消费者组和消息确认，更适合消息队列。",answer:"Pub/Sub模式：发布者发送消息到频道，订阅者接收频道消息。不支持持久化和消息确认。Redis 5.0+的Stream类型支持消费者组和消息确认，更适合消息队列。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'db-custom-58',title:"什么是Redis的Lua脚本？",category:'database',difficulty:'medium',content:"Redis执行Lua脚本保证原子性(单线程执行)。EVAL命令执行脚本，EVALSHA缓存脚本。KEYS和ARGV数组传参。注意：脚本不能长时间阻塞，否则影响其他命令。",answer:"Redis执行Lua脚本保证原子性(单线程执行)。EVAL命令执行脚本，EVALSHA缓存脚本。KEYS和ARGV数组传参。注意：脚本不能长时间阻塞，否则影响其他命令。",sourceType:'builtin',source:"面试高频题",tags:["数据库"]},{id:'sd-custom-1',title:"如何设计一个短链接系统？",category:'system-design',difficulty:'medium',content:"核心：长URL映射短URL。方案：1.自增ID+Base62编码 2.MD5哈希取前6-8位 3.预生成短码。需要：布隆过滤器去重、缓存加速、301/302重定向。",answer:"核心：长URL映射短URL。方案：1.自增ID+Base62编码 2.MD5哈希取前6-8位 3.预生成短码。需要：布隆过滤器去重、缓存加速、301/302重定向。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-2',title:"如何设计一个秒杀系统？",category:'system-design',difficulty:'hard',content:"核心：高并发、防超卖。方案：1.前端限流(验证码、倒计时) 2.CDN静态化 3.Redis预减库存 4.消息队列异步下单 5.数据库乐观锁。关键：库存不在数据库扣减。",answer:"核心：高并发、防超卖。方案：1.前端限流(验证码、倒计时) 2.CDN静态化 3.Redis预减库存 4.消息队列异步下单 5.数据库乐观锁。关键：库存不在数据库扣减。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-3',title:"如何设计一个消息队列？",category:'system-design',difficulty:'hard',content:"核心组件：Producer、Broker、Consumer。设计：1.存储(顺序写+索引) 2.分区和副本 3.消费者组 4.消息确认和重试 5.消息顺序性 6. Exactly-Once语义。",answer:"核心组件：Producer、Broker、Consumer。设计：1.存储(顺序写+索引) 2.分区和副本 3.消费者组 4.消息确认和重试 5.消息顺序性 6. Exactly-Once语义。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-4',title:"如何设计一个搜索引擎？",category:'system-design',difficulty:'hard',content:"核心：倒排索引。流程：1.爬虫采集 2.分词 3.建立倒排索引 4.查询解析 5.相关性排序(TF-IDF/BM25) 6.结果返回。优化：分片、缓存、实时索引。",answer:"核心：倒排索引。流程：1.爬虫采集 2.分词 3.建立倒排索引 4.查询解析 5.相关性排序(TF-IDF/BM25) 6.结果返回。优化：分片、缓存、实时索引。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-5',title:"如何设计一个推荐系统？",category:'system-design',difficulty:'hard',content:"两类算法：1.协同过滤(用户/物品相似度) 2.内容推荐(特征匹配)。架构：1.离线计算(批处理) 2.近线计算(流处理) 3.在线计算(实时)。AB测试评估效果。",answer:"两类算法：1.协同过滤(用户/物品相似度) 2.内容推荐(特征匹配)。架构：1.离线计算(批处理) 2.近线计算(流处理) 3.在线计算(实时)。AB测试评估效果。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-6',title:"如何设计一个限流系统？",category:'system-design',difficulty:'medium',content:"算法：1.固定窗口(临界突刺) 2.滑动窗口 3.漏桶(匀速) 4.令牌桶(允许突发)。分布式限流：Redis+Lua、Sentinel。限流维度：IP、用户、接口。",answer:"算法：1.固定窗口(临界突刺) 2.滑动窗口 3.漏桶(匀速) 4.令牌桶(允许突发)。分布式限流：Redis+Lua、Sentinel。限流维度：IP、用户、接口。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-7',title:"如何设计一个分布式ID生成器？",category:'system-design',difficulty:'medium',content:"方案：1.UUID(无序、长) 2.数据库自增(单点) 3.号段模式(批量获取) 4.Redis自增 5.Snowflake雪花算法(时间戳+机器ID+序列号)。Snowflake最常用。",answer:"方案：1.UUID(无序、长) 2.数据库自增(单点) 3.号段模式(批量获取) 4.Redis自增 5.Snowflake雪花算法(时间戳+机器ID+序列号)。Snowflake最常用。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-8',title:"如何设计一个分布式锁？",category:'system-design',difficulty:'hard',content:"方案：1.Redis SETNX+过期时间+Lua释放 2.Redisson(看门狗续期) 3.ZooKeeper临时节点 4.etcd租约。关键：互斥、可重入、防死锁、高可用。",answer:"方案：1.Redis SETNX+过期时间+Lua释放 2.Redisson(看门狗续期) 3.ZooKeeper临时节点 4.etcd租约。关键：互斥、可重入、防死锁、高可用。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-9',title:"如何设计一个爬虫系统？",category:'system-design',difficulty:'medium',content:"架构：1.URL管理器(去重-布隆过滤器) 2.下载器(异步HTTP) 3.解析器(HTML解析) 4.存储。难点：反爬(IP代理池、验证码)、去重、增量爬取、分布式。",answer:"架构：1.URL管理器(去重-布隆过滤器) 2.下载器(异步HTTP) 3.解析器(HTML解析) 4.存储。难点：反爬(IP代理池、验证码)、去重、增量爬取、分布式。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-10',title:"如何设计一个社交信息流？",category:'system-design',difficulty:'hard',content:"两种模式：1.推模式(写时推送到粉丝收件箱) 2.拉模式(读时从关注列表拉取)。大V用拉模式，普通用户用推模式(推拉结合)。缓存三层：Redis->SSD->DB。",answer:"两种模式：1.推模式(写时推送到粉丝收件箱) 2.拉模式(读时从关注列表拉取)。大V用拉模式，普通用户用推模式(推拉结合)。缓存三层：Redis->SSD->DB。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-11',title:"如何设计一个键值存储？",category:'system-design',difficulty:'hard',content:"参考Dynamo论文。1.一致性哈希(虚拟节点) 2.向量时钟(版本冲突) 3.Merkle树(反熵) 4.读修复 5.提示移交。可调一致性(NWR模型)。",answer:"参考Dynamo论文。1.一致性哈希(虚拟节点) 2.向量时钟(版本冲突) 3.Merkle树(反熵) 4.读修复 5.提示移交。可调一致性(NWR模型)。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-12',title:"如何设计一个文件存储系统？",category:'system-design',difficulty:'hard',content:"参考GFS/HDFS。架构：NameNode(元数据)+DataNode(数据块)。小文件合并、副本策略、数据校验、负载均衡。对象存储(S3)更适合小文件。",answer:"参考GFS/HDFS。架构：NameNode(元数据)+DataNode(数据块)。小文件合并、副本策略、数据校验、负载均衡。对象存储(S3)更适合小文件。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-13',title:"如何设计一个即时通讯系统？",category:'system-design',difficulty:'hard',content:"协议：XMPP/WebSocket/MQTT。架构：1.接入层(长连接网关) 2.逻辑层(消息路由) 3.存储层(消息持久化)。消息投递：在线推送、离线拉取。群消息用写扩散。",answer:"协议：XMPP/WebSocket/MQTT。架构：1.接入层(长连接网关) 2.逻辑层(消息路由) 3.存储层(消息持久化)。消息投递：在线推送、离线拉取。群消息用写扩散。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-14',title:"如何设计一个支付系统？",category:'system-design',difficulty:'hard',content:"核心：一致性、幂等性。流程：1.创建订单 2.扣减库存 3.调用支付渠道 4.回调通知 5.更新状态。关键：TCC分布式事务、对账系统、防重复支付。",answer:"核心：一致性、幂等性。流程：1.创建订单 2.扣减库存 3.调用支付渠道 4.回调通知 5.更新状态。关键：TCC分布式事务、对账系统、防重复支付。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-15',title:"如何设计一个配置中心？",category:'system-design',difficulty:'medium',content:"功能：1.配置存储和版本管理 2.长轮询实时推送 3.灰度发布 4.回滚 5.权限管理。Apollo/Nacos是成熟方案。客户端缓存+长轮询保证实时性和可用性。",answer:"功能：1.配置存储和版本管理 2.长轮询实时推送 3.灰度发布 4.回滚 5.权限管理。Apollo/Nacos是成熟方案。客户端缓存+长轮询保证实时性和可用性。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-16',title:"如何设计一个网关系统？",category:'system-design',difficulty:'medium',content:"功能：1.路由 2.认证 3.限流 4.熔断 5.日志 6.协议转换。架构：1.接入层(Nginx/OpenResty) 2.逻辑层(插件化) 3.数据层(配置存储)。Kong/APISIX。",answer:"功能：1.路由 2.认证 3.限流 4.熔断 5.日志 6.协议转换。架构：1.接入层(Nginx/OpenResty) 2.逻辑层(插件化) 3.数据层(配置存储)。Kong/APISIX。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-17',title:"如何设计一个任务调度系统？",category:'system-design',difficulty:'medium',content:"功能：1.定时触发 2.分布式执行 3.失败重试 4.任务依赖 5.监控告警。方案：1.时间轮 2.数据库轮询 3.Redis ZSET 4.XXL-Job/ElasticJob。",answer:"功能：1.定时触发 2.分布式执行 3.失败重试 4.任务依赖 5.监控告警。方案：1.时间轮 2.数据库轮询 3.Redis ZSET 4.XXL-Job/ElasticJob。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-18',title:"如何设计一个日志系统？",category:'system-design',difficulty:'medium',content:"ELK架构：1.Filebeat采集 2.Logstash处理 3.Elasticsearch存储 4.Kibana展示。进阶：Kafka缓冲、Fluentd替代Logstash。日志格式标准化。",answer:"ELK架构：1.Filebeat采集 2.Logstash处理 3.Elasticsearch存储 4.Kibana展示。进阶：Kafka缓冲、Fluentd替代Logstash。日志格式标准化。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-19',title:"如何设计一个监控告警系统？",category:'system-design',difficulty:'medium',content:"架构：1.数据采集(Exporter) 2.数据存储(TSDB) 3.查询和可视化 4.告警规则和通知。Prometheus+Grafana+Alertmanager是标准方案。",answer:"架构：1.数据采集(Exporter) 2.数据存储(TSDB) 3.查询和可视化 4.告警规则和通知。Prometheus+Grafana+Alertmanager是标准方案。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-20',title:"如何设计一个分布式追踪系统？",category:'system-design',difficulty:'hard',content:"OpenTelemetry标准。概念：Trace(一次请求)、Span(一次操作)。架构：1.SDK埋点 2.Collector收集 3.存储(Jaeger/Zipkin) 4.查询展示。采样策略减少开销。",answer:"OpenTelemetry标准。概念：Trace(一次请求)、Span(一次操作)。架构：1.SDK埋点 2.Collector收集 3.存储(Jaeger/Zipkin) 4.查询展示。采样策略减少开销。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-21',title:"如何设计一个对象存储系统？",category:'system-design',difficulty:'hard',content:"参考S3/MinIO。架构：1.元数据服务 2.数据节点 3.网关。数据分片+副本。纠删码节省存储。支持S3 API。小文件合并减少元数据。",answer:"参考S3/MinIO。架构：1.元数据服务 2.数据节点 3.网关。数据分片+副本。纠删码节省存储。支持S3 API。小文件合并减少元数据。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-22',title:"如何设计一个CDN系统？",category:'system-design',difficulty:'hard',content:"架构：1.源站 2.边缘节点 3.DNS调度 4.缓存层。缓存策略：LRU、TTL。回源策略：合并回源、分层回源。安全：防盗链、WAF。",answer:"架构：1.源站 2.边缘节点 3.DNS调度 4.缓存层。缓存策略：LRU、TTL。回源策略：合并回源、分层回源。安全：防盗链、WAF。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-23',title:"如何设计一个弹幕系统？",category:'system-design',difficulty:'hard',content:"架构：1.WebSocket长连接 2.消息广播 3.Redis Pub/Sub 4.消息聚合(批量发送)。难点：高并发、消息有序、弹幕防刷、历史弹幕回放。",answer:"架构：1.WebSocket长连接 2.消息广播 3.Redis Pub/Sub 4.消息聚合(批量发送)。难点：高并发、消息有序、弹幕防刷、历史弹幕回放。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-24',title:"如何设计一个Feed流系统？",category:'system-design',difficulty:'hard',content:"三种模式：1.推模式(写扩散) 2.拉模式(读扩散) 3.推拉结合。微博方案：大V拉模式，普通用户推模式。Redis ZSET存储时间线，score为时间戳。",answer:"三种模式：1.推模式(写扩散) 2.拉模式(读扩散) 3.推拉结合。微博方案：大V拉模式，普通用户推模式。Redis ZSET存储时间线，score为时间戳。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-25',title:"如何设计一个排行榜系统？",category:'system-design',difficulty:'medium',content:"方案：1.Redis ZSET(score为分数) 2.定时更新 3.分页查询。优化：1.只缓存Top N 2.分段排行榜 3.合并相同分数。实时排行榜用Redis，历史排行榜用DB。",answer:"方案：1.Redis ZSET(score为分数) 2.定时更新 3.分页查询。优化：1.只缓存Top N 2.分段排行榜 3.合并相同分数。实时排行榜用Redis，历史排行榜用DB。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-26',title:"如何设计一个预约系统？",category:'system-design',difficulty:'medium',content:"核心：并发防超卖。方案：1.库存预扣减(Redis DECR) 2.数据库乐观锁 3.消息队列削峰。需要：取消释放库存、超时自动取消、幂等性保证。",answer:"核心：并发防超卖。方案：1.库存预扣减(Redis DECR) 2.数据库乐观锁 3.消息队列削峰。需要：取消释放库存、超时自动取消、幂等性保证。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-27',title:"如何设计一个地图服务？",category:'system-design',difficulty:'hard',content:"核心：空间索引。方案：1.Geohash(编码经纬度) 2.R树(空间范围查询) 3.Google S2。附近的人：Geohash前缀匹配+距离计算。路线规划：Dijkstra/A*。",answer:"核心：空间索引。方案：1.Geohash(编码经纬度) 2.R树(空间范围查询) 3.Google S2。附近的人：Geohash前缀匹配+距离计算。路线规划：Dijkstra/A*。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-28',title:"如何设计一个验证码系统？",category:'system-design',difficulty:'medium',content:"类型：1.图形验证码 2.短信验证码 3.滑块验证码 4.行为验证。防刷：1.频率限制 2.IP限制 3.设备指纹 4.风控规则。验证码存储用Redis+过期时间。",answer:"类型：1.图形验证码 2.短信验证码 3.滑块验证码 4.行为验证。防刷：1.频率限制 2.IP限制 3.设备指纹 4.风控规则。验证码存储用Redis+过期时间。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-29',title:"如何设计一个单点登录系统(SSO)？",category:'system-design',difficulty:'medium',content:"方案：1.Cookie+Session(同域) 2.CAS协议(中央认证) 3.OAuth 2.0 4.SAML 5.JWT。核心：认证中心颁发Token，各子系统验证Token。",answer:"方案：1.Cookie+Session(同域) 2.CAS协议(中央认证) 3.OAuth 2.0 4.SAML 5.JWT。核心：认证中心颁发Token，各子系统验证Token。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-30',title:"如何设计一个权限系统(RBAC)？",category:'system-design',difficulty:'medium',content:"RBAC(基于角色的访问控制)：用户->角色->权限。扩展：RBAC1(角色继承)、RBAC2(约束)、RBAC3(1+2)。数据权限：行级和列级。ABAC(属性)更灵活。",answer:"RBAC(基于角色的访问控制)：用户->角色->权限。扩展：RBAC1(角色继承)、RBAC2(约束)、RBAC3(1+2)。数据权限：行级和列级。ABAC(属性)更灵活。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-31',title:"如何设计一个多租户系统？",category:'system-design',difficulty:'medium',content:"三种隔离级别：1.共享数据库共享表(字段隔离) 2.共享数据库独立表(Schema隔离) 3.独立数据库。权衡：成本、隔离性、运维复杂度。SaaS常用方案2。",answer:"三种隔离级别：1.共享数据库共享表(字段隔离) 2.共享数据库独立表(Schema隔离) 3.独立数据库。权衡：成本、隔离性、运维复杂度。SaaS常用方案2。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-32',title:"如何设计一个审计日志系统？",category:'system-design',difficulty:'medium',content:"记录：谁(用户)、何时(时间)、做了什么(操作)、对什么(资源)、结果如何(状态)。实现：1.AOP拦截 2.数据库触发器 3.Canal监听binlog。日志不可修改。",answer:"记录：谁(用户)、何时(时间)、做了什么(操作)、对什么(资源)、结果如何(状态)。实现：1.AOP拦截 2.数据库触发器 3.Canal监听binlog。日志不可修改。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-33',title:"如何设计一个灰度发布系统？",category:'system-design',difficulty:'medium',content:"策略：1.按用户ID 2.按百分比 3.按地域 4.按设备类型。实现：1.网关路由规则 2.特性开关(Feature Flag) 3.服务网格(Istio)。需要快速回滚能力。",answer:"策略：1.按用户ID 2.按百分比 3.按地域 4.按设备类型。实现：1.网关路由规则 2.特性开关(Feature Flag) 3.服务网格(Istio)。需要快速回滚能力。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-34',title:"如何设计一个数据同步系统？",category:'system-design',difficulty:'medium',content:"场景：1.数据库间同步(Canal/Debezium) 2.缓存同步(双写/Canal) 3.搜索引擎同步。策略：同步双写、异步消息、binlog监听。需要处理数据一致性。",answer:"场景：1.数据库间同步(Canal/Debezium) 2.缓存同步(双写/Canal) 3.搜索引擎同步。策略：同步双写、异步消息、binlog监听。需要处理数据一致性。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-35',title:"如何设计一个工作流引擎？",category:'system-design',difficulty:'hard',content:"参考Activiti/Camunda。核心：1.流程定义(BPMN) 2.流程实例 3.任务分配 4.网关(排他/并行/包含) 5.事件(定时/信号)。状态机驱动。",answer:"参考Activiti/Camunda。核心：1.流程定义(BPMN) 2.流程实例 3.任务分配 4.网关(排他/并行/包含) 5.事件(定时/信号)。状态机驱动。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-36',title:"如何设计一个规则引擎？",category:'system-design',difficulty:'medium',content:"方案：1.Drools( rete算法) 2.Easy Rules 3.Aviator表达式 4.自研。设计：1.规则定义DSL 2.规则存储 3.规则编译 4.规则执行 5.版本管理。",answer:"方案：1.Drools( rete算法) 2.Easy Rules 3.Aviator表达式 4.自研。设计：1.规则定义DSL 2.规则存储 3.规则编译 4.规则执行 5.版本管理。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-37',title:"如何设计一个分布式存储系统？",category:'system-design',difficulty:'hard',content:"参考Ceph/GlusterFS。核心：1.数据分片(CRUSH算法) 2.副本策略 3.数据恢复 4.一致性模型 5.元数据管理。Ceph支持对象、块、文件三种接口。",answer:"参考Ceph/GlusterFS。核心：1.数据分片(CRUSH算法) 2.副本策略 3.数据恢复 4.一致性模型 5.元数据管理。Ceph支持对象、块、文件三种接口。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-38',title:"如何设计一个实时计算系统？",category:'system-design',difficulty:'hard',content:"架构：1.数据采集(Flume/Kafka) 2.流计算(Flink/Spark Streaming) 3.结果存储(Redis/ClickHouse) 4.可视化。Flink支持Exactly-Once和窗口计算。",answer:"架构：1.数据采集(Flume/Kafka) 2.流计算(Flink/Spark Streaming) 3.结果存储(Redis/ClickHouse) 4.可视化。Flink支持Exactly-Once和窗口计算。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-39',title:"如何设计一个批处理系统？",category:'system-design',difficulty:'medium',content:"架构：1.数据输入(HDFS/S3) 2.计算(Spark/Hive) 3.输出(数据库/文件)。Spark比Hive快(内存计算)。调度：Airflow/DolphinScheduler。",answer:"架构：1.数据输入(HDFS/S3) 2.计算(Spark/Hive) 3.输出(数据库/文件)。Spark比Hive快(内存计算)。调度：Airflow/DolphinScheduler。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'sd-custom-40',title:"如何设计一个数据管道？",category:'system-design',difficulty:'medium',content:"ETL流程：Extract(抽取)->Transform(转换)->Load(加载)。工具：DataX、SeaTunnel、Flink CDC。需要：数据质量检查、错误处理、断点续传。",answer:"ETL流程：Extract(抽取)->Transform(转换)->Load(加载)。工具：DataX、SeaTunnel、Flink CDC。需要：数据质量检查、错误处理、断点续传。",sourceType:'builtin',source:"面试高频题",tags:["系统设计"]},{id:'fe-custom-1',title:"什么是闭包？应用场景？",category:'frontend',difficulty:'medium',content:"闭包是函数和其词法作用域的组合。内部函数可以访问外部函数的变量。应用：1.数据私有化 2.柯里化 3.防抖节流 4.模块模式。注意内存泄漏。",answer:"闭包是函数和其词法作用域的组合。内部函数可以访问外部函数的变量。应用：1.数据私有化 2.柯里化 3.防抖节流 4.模块模式。注意内存泄漏。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-2',title:"什么是事件循环(Event Loop)？",category:'frontend',difficulty:'medium',content:"事件循环是JS的异步执行机制。宏任务：setTimeout、setInterval、I/O。微任务：Promise.then、MutationObserver。执行顺序：同步代码->微任务->下一个宏任务。",answer:"事件循环是JS的异步执行机制。宏任务：setTimeout、setInterval、I/O。微任务：Promise.then、MutationObserver。执行顺序：同步代码->微任务->下一个宏任务。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-3',title:"什么是原型链？",category:'frontend',difficulty:'medium',content:"每个对象有__proto__指向其构造函数的prototype。属性查找沿原型链向上直到null。Object.create()创建指定原型的对象。class是prototype的语法糖。",answer:"每个对象有__proto__指向其构造函数的prototype。属性查找沿原型链向上直到null。Object.create()创建指定原型的对象。class是prototype的语法糖。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-4',title:"什么是Promise？",category:'frontend',difficulty:'easy',content:"Promise是异步编程的解决方案。三种状态：pending、fulfilled、rejected。链式调用.then().catch()。Promise.all并行执行，Promise.race取最快。",answer:"Promise是异步编程的解决方案。三种状态：pending、fulfilled、rejected。链式调用.then().catch()。Promise.all并行执行，Promise.race取最快。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-5',title:"什么是async/await？",category:'frontend',difficulty:'easy',content:"async/await是Promise的语法糖，让异步代码看起来像同步。async函数返回Promise，await等待Promise解决。错误处理用try/catch。",answer:"async/await是Promise的语法糖，让异步代码看起来像同步。async函数返回Promise，await等待Promise解决。错误处理用try/catch。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-6',title:"什么是Vue的响应式原理？",category:'frontend',difficulty:'hard',content:"Vue 2：Object.defineProperty劫持getter/setter，收集依赖(Dep)，触发更新(Watcher)。Vue 3：Proxy代理整个对象，支持动态属性和数组。虚拟DOM+Diff算法高效更新。",answer:"Vue 2：Object.defineProperty劫持getter/setter，收集依赖(Dep)，触发更新(Watcher)。Vue 3：Proxy代理整个对象，支持动态属性和数组。虚拟DOM+Diff算法高效更新。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-7',title:"什么是Virtual DOM？",category:'frontend',difficulty:'medium',content:"虚拟DOM是JS对象表示的DOM树。更新时先比较新旧虚拟DOM(Diff算法)，只更新变化的部分(最小化DOM操作)。React和Vue都使用虚拟DOM。",answer:"虚拟DOM是JS对象表示的DOM树。更新时先比较新旧虚拟DOM(Diff算法)，只更新变化的部分(最小化DOM操作)。React和Vue都使用虚拟DOM。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-8',title:"什么是React Hooks？",category:'frontend',difficulty:'medium',content:"Hooks让函数组件使用状态和副作用。常用：1.useState(状态) 2.useEffect(副作用) 3.useContext(上下文) 4.useMemo(缓存) 5.useCallback(缓存函数) 6.useRef(引用)。",answer:"Hooks让函数组件使用状态和副作用。常用：1.useState(状态) 2.useEffect(副作用) 3.useContext(上下文) 4.useMemo(缓存) 5.useCallback(缓存函数) 6.useRef(引用)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-9',title:"什么是Redux？",category:'frontend',difficulty:'medium',content:"Redux是状态管理库。三大原则：1.单一数据源 2.State只读 3.纯函数修改。流程：dispatch(action)->reducer->new state->re-render。中间件处理异步。",answer:"Redux是状态管理库。三大原则：1.单一数据源 2.State只读 3.纯函数修改。流程：dispatch(action)->reducer->new state->re-render。中间件处理异步。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-10',title:"什么是Webpack？核心概念？",category:'frontend',difficulty:'medium',content:"Webpack是模块打包工具。核心：1.Entry(入口) 2.Output(输出) 3.Loader(转换) 4.Plugin(插件) 5.Mode(模式)。Vite是替代方案，开发时用ESM。",answer:"Webpack是模块打包工具。核心：1.Entry(入口) 2.Output(输出) 3.Loader(转换) 4.Plugin(插件) 5.Mode(模式)。Vite是替代方案，开发时用ESM。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-11',title:"什么是浏览器渲染流程？",category:'frontend',difficulty:'hard',content:"1.解析HTML生成DOM树 2.解析CSS生成CSSOM 3.合并生成渲染树 4.布局(计算位置大小) 5.绘制(填充像素) 6.合成(图层合并)。JS阻塞DOM解析。",answer:"1.解析HTML生成DOM树 2.解析CSS生成CSSOM 3.合并生成渲染树 4.布局(计算位置大小) 5.绘制(填充像素) 6.合成(图层合并)。JS阻塞DOM解析。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-12',title:"什么是重排和重绘？",category:'frontend',difficulty:'medium',content:"重排(回流)：元素几何属性变化(大小、位置)，重新布局。重绘：外观变化(颜色、背景)，不影响布局。重排一定重绘。优化：批量修改、使用transform、避免频繁读取布局属性。",answer:"重排(回流)：元素几何属性变化(大小、位置)，重新布局。重绘：外观变化(颜色、背景)，不影响布局。重排一定重绘。优化：批量修改、使用transform、避免频繁读取布局属性。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-13',title:"什么是CSS BFC？",category:'frontend',difficulty:'medium',content:"BFC(块格式化上下文)是独立的渲染区域。触发：overflow:hidden、display:flex/grid、position:absolute/fixed。用途：1.清除浮动 2.防止margin重叠 3.阻止元素被浮动覆盖。",answer:"BFC(块格式化上下文)是独立的渲染区域。触发：overflow:hidden、display:flex/grid、position:absolute/fixed。用途：1.清除浮动 2.防止margin重叠 3.阻止元素被浮动覆盖。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-14',title:"什么是跨域？解决方案？",category:'frontend',difficulty:'medium',content:"同源策略限制：协议+域名+端口必须相同。解决方案：1.CORS(服务端设置头) 2.JSONP(GET) 3.代理 4.postMessage 5.WebSocket。CORS最常用。",answer:"同源策略限制：协议+域名+端口必须相同。解决方案：1.CORS(服务端设置头) 2.JSONP(GET) 3.代理 4.postMessage 5.WebSocket。CORS最常用。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-15',title:"什么是XSS攻击？如何防御？",category:'frontend',difficulty:'medium',content:"XSS(跨站脚本)注入恶意脚本。类型：存储型、反射型、DOM型。防御：1.输入过滤 2.输出编码(转义HTML) 3.CSP(Content-Security-Policy) 4.HttpOnly Cookie。",answer:"XSS(跨站脚本)注入恶意脚本。类型：存储型、反射型、DOM型。防御：1.输入过滤 2.输出编码(转义HTML) 3.CSP(Content-Security-Policy) 4.HttpOnly Cookie。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-16',title:"什么是CSRF攻击？如何防御？",category:'frontend',difficulty:'medium',content:"CSRF(跨站请求伪造)利用已登录状态发起请求。防御：1.CSRF Token 2.SameSite Cookie 3.验证Referer/Origin 4.关键操作二次确认。",answer:"CSRF(跨站请求伪造)利用已登录状态发起请求。防御：1.CSRF Token 2.SameSite Cookie 3.验证Referer/Origin 4.关键操作二次确认。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-17',title:"什么是SSR？与CSR的区别？",category:'frontend',difficulty:'medium',content:"SSR(服务端渲染)：HTML在服务端生成，首屏快、SEO友好。CSR(客户端渲染)：JS在浏览器渲染，交互快、服务器压力小。Next.js(SSR)和Nuxt.js是常用框架。",answer:"SSR(服务端渲染)：HTML在服务端生成，首屏快、SEO友好。CSR(客户端渲染)：JS在浏览器渲染，交互快、服务器压力小。Next.js(SSR)和Nuxt.js是常用框架。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-18',title:"什么是PWA？",category:'frontend',difficulty:'medium',content:"PWA(渐进式Web应用)让网页像原生应用。核心：1.Service Worker(离线缓存) 2.Manifest(安装到桌面) 3.Push Notification(推送)。Lighthouse评分。",answer:"PWA(渐进式Web应用)让网页像原生应用。核心：1.Service Worker(离线缓存) 2.Manifest(安装到桌面) 3.Push Notification(推送)。Lighthouse评分。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-19',title:"什么是TypeScript？为什么使用？",category:'frontend',difficulty:'easy',content:"TypeScript是JavaScript的超集，添加了类型系统。优点：1.类型安全(编译时检查) 2.更好的IDE支持 3.代码可维护性 4.团队协作。缺点：学习成本、编译时间。",answer:"TypeScript是JavaScript的超集，添加了类型系统。优点：1.类型安全(编译时检查) 2.更好的IDE支持 3.代码可维护性 4.团队协作。缺点：学习成本、编译时间。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-20',title:"什么是Flex布局？",category:'frontend',difficulty:'easy',content:"Flex是弹性盒布局。容器属性：flex-direction、justify-content、align-items、flex-wrap。项目属性：flex-grow、flex-shrink、flex-basis。适用于一维布局。",answer:"Flex是弹性盒布局。容器属性：flex-direction、justify-content、align-items、flex-wrap。项目属性：flex-grow、flex-shrink、flex-basis。适用于一维布局。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-21',title:"什么是Grid布局？",category:'frontend',difficulty:'medium',content:"Grid是二维网格布局。容器属性：grid-template-columns/rows、gap、grid-template-areas。项目属性：grid-column/row。比Flex更适合复杂二维布局。",answer:"Grid是二维网格布局。容器属性：grid-template-columns/rows、gap、grid-template-areas。项目属性：grid-column/row。比Flex更适合复杂二维布局。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-22',title:"什么是响应式设计？",category:'frontend',difficulty:'easy',content:"响应式设计让网页适配不同屏幕。方法：1.媒体查询(@media) 2.弹性布局(Flex/Grid) 3.相对单位(rem/vw) 4.图片自适应(srcset) 5.移动优先。",answer:"响应式设计让网页适配不同屏幕。方法：1.媒体查询(@media) 2.弹性布局(Flex/Grid) 3.相对单位(rem/vw) 4.图片自适应(srcset) 5.移动优先。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-23',title:"什么是Web Components？",category:'frontend',difficulty:'medium',content:"Web Components是浏览器原生组件化方案。三个API：1.Custom Elements(自定义元素) 2.Shadow DOM(样式隔离) 3.HTML Templates(模板)。跨框架使用。",answer:"Web Components是浏览器原生组件化方案。三个API：1.Custom Elements(自定义元素) 2.Shadow DOM(样式隔离) 3.HTML Templates(模板)。跨框架使用。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-24',title:"什么是性能优化？常见手段？",category:'frontend',difficulty:'medium',content:"加载优化：1.代码分割 2.懒加载 3.压缩(Gzip/Brotli) 4.CDN 5.缓存。运行时优化：1.虚拟列表 2.防抖节流 3.Web Worker 4.requestAnimationFrame。",answer:"加载优化：1.代码分割 2.懒加载 3.压缩(Gzip/Brotli) 4.CDN 5.缓存。运行时优化：1.虚拟列表 2.防抖节流 3.Web Worker 4.requestAnimationFrame。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-25',title:"什么是防抖和节流？",category:'frontend',difficulty:'easy',content:"防抖：事件停止触发n秒后执行(搜索框)。节流：每n秒最多执行一次(滚动事件)。防抖适合连续触发只需最后一次，节流适合限制执行频率。",answer:"防抖：事件停止触发n秒后执行(搜索框)。节流：每n秒最多执行一次(滚动事件)。防抖适合连续触发只需最后一次，节流适合限制执行频率。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-26',title:"什么是深拷贝和浅拷贝？",category:'frontend',difficulty:'easy',content:"浅拷贝：只复制一层(Object.assign、展开运算符)。深拷贝：递归复制所有层(JSON.parse/stringify不能处理函数和循环引用)。structuredClone是原生深拷贝API。",answer:"浅拷贝：只复制一层(Object.assign、展开运算符)。深拷贝：递归复制所有层(JSON.parse/stringify不能处理函数和循环引用)。structuredClone是原生深拷贝API。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-27',title:"什么是函数式编程？",category:'frontend',difficulty:'medium',content:"核心概念：1.纯函数(相同输入相同输出，无副作用) 2.不可变数据 3.高阶函数 4.函数组合 5.柯里化。优点：可测试、可预测、可并行。",answer:"核心概念：1.纯函数(相同输入相同输出，无副作用) 2.不可变数据 3.高阶函数 4.函数组合 5.柯里化。优点：可测试、可预测、可并行。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-28',title:"什么是设计模式？常见前端模式？",category:'frontend',difficulty:'medium',content:"常见模式：1.单例(Vuex/Redux store) 2.观察者(EventEmitter) 3.发布订阅(EventBus) 4.策略(表单验证) 5.代理(Vue响应式) 6.装饰器(HOC) 7.工厂(React.createElement)。",answer:"常见模式：1.单例(Vuex/Redux store) 2.观察者(EventEmitter) 3.发布订阅(EventBus) 4.策略(表单验证) 5.代理(Vue响应式) 6.装饰器(HOC) 7.工厂(React.createElement)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-29',title:"什么是微前端？",category:'frontend',difficulty:'hard',content:"微前端将前端应用拆分为独立部署的子应用。方案：1.qiankun(基于single-spa) 2.Module Federation(Webpack 5) 3.iframe 4.Web Components。需要处理样式隔离和通信。",answer:"微前端将前端应用拆分为独立部署的子应用。方案：1.qiankun(基于single-spa) 2.Module Federation(Webpack 5) 3.iframe 4.Web Components。需要处理样式隔离和通信。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-30',title:"什么是WebAssembly？",category:'frontend',difficulty:'hard',content:"WASM是二进制指令格式，可以在浏览器中以接近原生的速度运行。适用于：1.图像/视频处理 2.游戏 3.加密计算 4.C/C++/Rust编译目标。与JS互操作。",answer:"WASM是二进制指令格式，可以在浏览器中以接近原生的速度运行。适用于：1.图像/视频处理 2.游戏 3.加密计算 4.C/C++/Rust编译目标。与JS互操作。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-31',title:"什么是Service Worker？",category:'frontend',difficulty:'medium',content:"Service Worker是浏览器后台运行的脚本，独立于网页。功能：1.离线缓存(Cache API) 2.推送通知 3.后台同步 4.请求拦截。生命周期：install->activate->fetch。",answer:"Service Worker是浏览器后台运行的脚本，独立于网页。功能：1.离线缓存(Cache API) 2.推送通知 3.后台同步 4.请求拦截。生命周期：install->activate->fetch。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-32',title:"什么是HTTP缓存策略？",category:'frontend',difficulty:'medium',content:"强缓存：Cache-Control(max-age)、Expires，不发请求。协商缓存：ETag/If-None-Match、Last-Modified/If-Modified-Since，发请求验证。304使用缓存。",answer:"强缓存：Cache-Control(max-age)、Expires，不发请求。协商缓存：ETag/If-None-Match、Last-Modified/If-Modified-Since，发请求验证。304使用缓存。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-33',title:"什么是前端安全？",category:'frontend',difficulty:'medium',content:"主要威胁：1.XSS(注入脚本) 2.CSRF(伪造请求) 3.点击劫持(iframe透明层) 4.中间人攻击(HTTPS) 5.开放重定向。防御：CSP、HttpOnly、SameSite、CORS。",answer:"主要威胁：1.XSS(注入脚本) 2.CSRF(伪造请求) 3.点击劫持(iframe透明层) 4.中间人攻击(HTTPS) 5.开放重定向。防御：CSP、HttpOnly、SameSite、CORS。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-34',title:"什么是前端工程化？",category:'frontend',difficulty:'medium',content:"前端工程化包括：1.构建工具(Webpack/Vite) 2.代码规范(ESLint/Prettier) 3.类型检查(TypeScript) 4.测试(Jest/Cypress) 5.CI/CD 6.文档(Storybook)。",answer:"前端工程化包括：1.构建工具(Webpack/Vite) 2.代码规范(ESLint/Prettier) 3.类型检查(TypeScript) 4.测试(Jest/Cypress) 5.CI/CD 6.文档(Storybook)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-35',title:"什么是DOM Diff算法？",category:'frontend',difficulty:'hard',content:"React Diff策略：1.树级别：只比较同层节点 2.组件级别：同类型组件才比较 3.元素级别：同key复用节点。Vue类似。key的作用：标识节点身份，帮助Diff识别移动。",answer:"React Diff策略：1.树级别：只比较同层节点 2.组件级别：同类型组件才比较 3.元素级别：同key复用节点。Vue类似。key的作用：标识节点身份，帮助Diff识别移动。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-36',title:"什么是Fiber架构？",category:'frontend',difficulty:'hard',content:"React Fiber是新的协调引擎。将渲染工作拆分为小单元(fiber)，可中断和恢复。优先级调度：高优先级(用户交互)先执行。实现：链表结构、时间切片(requestIdleCallback)。",answer:"React Fiber是新的协调引擎。将渲染工作拆分为小单元(fiber)，可中断和恢复。优先级调度：高优先级(用户交互)先执行。实现：链表结构、时间切片(requestIdleCallback)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-37',title:"什么是Concurrent Mode？",category:'frontend',difficulty:'hard',content:"Concurrent Mode是React的并发渲染模式。特性：1.可中断渲染 2.优先级调度 3.Suspense 4.useTransition 5.useDeferredValue。React 18默认启用。",answer:"Concurrent Mode是React的并发渲染模式。特性：1.可中断渲染 2.优先级调度 3.Suspense 4.useTransition 5.useDeferredValue。React 18默认启用。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-38',title:"什么是Server Components？",category:'frontend',difficulty:'hard',content:"React Server Components在服务端渲染，减少客户端JS体积。特点：1.零客户端JS 2.直接访问后端资源 3.与Client Components混合使用。Next.js App Router基于此。",answer:"React Server Components在服务端渲染，减少客户端JS体积。特点：1.零客户端JS 2.直接访问后端资源 3.与Client Components混合使用。Next.js App Router基于此。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-39',title:"什么是CSS-in-JS？",category:'frontend',difficulty:'medium',content:"CSS-in-JS在JS中写CSS。方案：1.styled-components(模板字符串) 2.Emotion 3.CSS Modules(编译时)。优点：作用域隔离、动态样式。缺点：运行时开销。",answer:"CSS-in-JS在JS中写CSS。方案：1.styled-components(模板字符串) 2.Emotion 3.CSS Modules(编译时)。优点：作用域隔离、动态样式。缺点：运行时开销。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-40',title:"什么是Tailwind CSS？",category:'frontend',difficulty:'easy',content:"Tailwind是原子化CSS框架，通过类名组合样式。优点：1.不需要命名 2.一致的设计系统 3.按需生成 4.响应式方便。缺点：类名长、HTML臃肿。",answer:"Tailwind是原子化CSS框架，通过类名组合样式。优点：1.不需要命名 2.一致的设计系统 3.按需生成 4.响应式方便。缺点：类名长、HTML臃肿。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-41',title:"什么是状态机？前端应用？",category:'frontend',difficulty:'medium',content:"状态机定义有限状态和转换规则。前端应用：1.表单状态(编辑/提交/成功/失败) 2.登录流程 3.游戏状态。XState是JS状态机库，可视化状态图。",answer:"状态机定义有限状态和转换规则。前端应用：1.表单状态(编辑/提交/成功/失败) 2.登录流程 3.游戏状态。XState是JS状态机库，可视化状态图。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-42',title:"什么是Web Worker？",category:'frontend',difficulty:'medium',content:"Web Worker在后台线程运行JS，不阻塞UI。类型：1.Dedicated Worker(一对一) 2.Shared Worker(多标签共享) 3.Service Worker(网络代理)。通过postMessage通信。",answer:"Web Worker在后台线程运行JS，不阻塞UI。类型：1.Dedicated Worker(一对一) 2.Shared Worker(多标签共享) 3.Service Worker(网络代理)。通过postMessage通信。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-43',title:"什么是Intersection Observer？",category:'frontend',difficulty:'easy',content:"Intersection Observer异步观察元素与视口的交叉状态。用途：1.懒加载图片 2.无限滚动 3.曝光统计 4.动画触发。比scroll事件性能好。",answer:"Intersection Observer异步观察元素与视口的交叉状态。用途：1.懒加载图片 2.无限滚动 3.曝光统计 4.动画触发。比scroll事件性能好。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-44',title:"什么是Mutation Observer？",category:'frontend',difficulty:'medium',content:"Mutation Observer监听DOM变化。可观察：1.子节点变化 2.属性变化 3.文本内容变化。比MutationEvent性能好(异步批处理)。用于框架响应式和DevTools。",answer:"Mutation Observer监听DOM变化。可观察：1.子节点变化 2.属性变化 3.文本内容变化。比MutationEvent性能好(异步批处理)。用于框架响应式和DevTools。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-45',title:"什么是Resize Observer？",category:'frontend',difficulty:'easy',content:"Resize Observer监听元素尺寸变化。用途：1.响应式组件 2.图表自适应 3.布局计算。比window.resize精确(元素级别)。",answer:"Resize Observer监听元素尺寸变化。用途：1.响应式组件 2.图表自适应 3.布局计算。比window.resize精确(元素级别)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-46',title:"什么是Performance API？",category:'frontend',difficulty:'medium',content:"Performance API测量页面性能。关键指标：1.FCP(首次内容绘制) 2.LCP(最大内容绘制) 3.FID(首次输入延迟) 4.CLS(累积布局偏移)。Web Vitals标准。",answer:"Performance API测量页面性能。关键指标：1.FCP(首次内容绘制) 2.LCP(最大内容绘制) 3.FID(首次输入延迟) 4.CLS(累积布局偏移)。Web Vitals标准。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-47',title:"什么是WebRTC？",category:'frontend',difficulty:'hard',content:"WebRTC实现浏览器间实时通信。核心API：1.getUserMedia(获取媒体) 2.RTCPeerConnection(P2P连接) 3.RTCDataChannel(数据通道)。NAT穿透(STUN/TURN)。",answer:"WebRTC实现浏览器间实时通信。核心API：1.getUserMedia(获取媒体) 2.RTCPeerConnection(P2P连接) 3.RTCDataChannel(数据通道)。NAT穿透(STUN/TURN)。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-48',title:"什么是WebGL/WebGPU？",category:'frontend',difficulty:'hard',content:"WebGL在浏览器中渲染3D图形(基于OpenGL ES)。WebGPU是下一代API(基于Vulkan/Metal)，更底层、更高效。Three.js是WebGL框架。适用于游戏和数据可视化。",answer:"WebGL在浏览器中渲染3D图形(基于OpenGL ES)。WebGPU是下一代API(基于Vulkan/Metal)，更底层、更高效。Three.js是WebGL框架。适用于游戏和数据可视化。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-49',title:"什么是SSE(Server-Sent Events)？",category:'frontend',difficulty:'medium',content:"SSE是服务器向客户端单向推送的协议。基于HTTP长连接，文本格式，自动重连。比WebSocket简单，但只能服务器到客户端。适用于通知、实时日志。",answer:"SSE是服务器向客户端单向推送的协议。基于HTTP长连接，文本格式，自动重连。比WebSocket简单，但只能服务器到客户端。适用于通知、实时日志。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-50',title:"什么是前端监控？",category:'frontend',difficulty:'medium',content:"前端监控三类：1.性能监控(加载时间、Web Vitals) 2.错误监控(JS错误、资源加载失败) 3.行为监控(PV/UV、点击、路径)。Sentry是错误监控工具。",answer:"前端监控三类：1.性能监控(加载时间、Web Vitals) 2.错误监控(JS错误、资源加载失败) 3.行为监控(PV/UV、点击、路径)。Sentry是错误监控工具。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-51',title:"什么是AB测试？",category:'frontend',difficulty:'medium',content:"AB测试将用户随机分组，比较不同方案的效果。流程：1.确定假设 2.设计实验 3.分流(Feature Flag) 4.收集数据 5.统计分析。需要足够样本量和实验时间。",answer:"AB测试将用户随机分组，比较不同方案的效果。流程：1.确定假设 2.设计实验 3.分流(Feature Flag) 4.收集数据 5.统计分析。需要足够样本量和实验时间。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-52',title:"什么是前端国际化(i18n)？",category:'frontend',difficulty:'medium',content:"i18n让应用支持多语言。要点：1.文本外置(JSON文件) 2.日期/数字格式化(Intl API) 3.布局方向(RTL) 4.图片本地化 5.动态切换。库：i18next、vue-i18n。",answer:"i18n让应用支持多语言。要点：1.文本外置(JSON文件) 2.日期/数字格式化(Intl API) 3.布局方向(RTL) 4.图片本地化 5.动态切换。库：i18next、vue-i18n。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'fe-custom-53',title:"什么是无障碍(a11y)？",category:'frontend',difficulty:'medium',content:"a11y让残障人士也能使用网页。要点：1.语义化HTML 2.ARIA属性 3.键盘导航 4.颜色对比度 5.焦点管理 6.屏幕阅读器测试。WCAG 2.1标准。",answer:"a11y让残障人士也能使用网页。要点：1.语义化HTML 2.ARIA属性 3.键盘导航 4.颜色对比度 5.焦点管理 6.屏幕阅读器测试。WCAG 2.1标准。",sourceType:'builtin',source:"面试高频题",tags:["前端"]},{id:'lang-custom-1',title:"Java中==和equals的区别？",category:'language',difficulty:'easy',content:"==比较引用(地址)，equals比较内容。String重写了equals方法比较字符串内容。基本类型用==比较值。建议重写equals时也重写hashCode。",answer:"==比较引用(地址)，equals比较内容。String重写了equals方法比较字符串内容。基本类型用==比较值。建议重写equals时也重写hashCode。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-2',title:"Java的垃圾回收机制？",category:'language',difficulty:'hard',content:"GC自动回收不再引用的对象。算法：1.标记-清除 2.复制(新生代) 3.标记-整理(老年代)。分代收集：新生代(Eden+S0+S1)、老年代。收集器：CMS、G1、ZGC。",answer:"GC自动回收不再引用的对象。算法：1.标记-清除 2.复制(新生代) 3.标记-整理(老年代)。分代收集：新生代(Eden+S0+S1)、老年代。收集器：CMS、G1、ZGC。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-3',title:"Java的HashMap原理？",category:'language',difficulty:'hard',content:"JDK1.8：数组+链表+红黑树。put：计算hash定位桶，链表尾插，长度>=8转红黑树。扩容：容量翻倍，重新hash。线程不安全，用ConcurrentHashMap。",answer:"JDK1.8：数组+链表+红黑树。put：计算hash定位桶，链表尾插，长度>=8转红黑树。扩容：容量翻倍，重新hash。线程不安全，用ConcurrentHashMap。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-4',title:"Java的线程池？核心参数？",category:'language',difficulty:'medium',content:"7个参数：corePoolSize、maximumPoolSize、keepAliveTime、unit、workQueue、threadFactory、handler。执行流程：核心线程->队列->最大线程->拒绝策略。",answer:"7个参数：corePoolSize、maximumPoolSize、keepAliveTime、unit、workQueue、threadFactory、handler。执行流程：核心线程->队列->最大线程->拒绝策略。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-5',title:"Java的synchronized和ReentrantLock？",category:'language',difficulty:'medium',content:"synchronized：JVM层面、自动释放、非公平。ReentrantLock：API层面、手动释放、可公平/非公平、可中断、可超时。都是可重入锁。",answer:"synchronized：JVM层面、自动释放、非公平。ReentrantLock：API层面、手动释放、可公平/非公平、可中断、可超时。都是可重入锁。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-6',title:"Java的JVM内存模型？",category:'language',difficulty:'hard',content:"运行时数据区：1.堆(对象实例，GC管理) 2.方法区(类信息、常量) 3.栈(局部变量、操作栈) 4.本地方法栈 5.程序计数器。堆是线程共享，栈是线程私有。",answer:"运行时数据区：1.堆(对象实例，GC管理) 2.方法区(类信息、常量) 3.栈(局部变量、操作栈) 4.本地方法栈 5.程序计数器。堆是线程共享，栈是线程私有。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-7',title:"Java的volatile关键字？",category:'language',difficulty:'medium',content:"volatile保证：1.可见性(修改立即刷新到主内存) 2.有序性(禁止指令重排)。不保证原子性(i++不是原子操作)。适用于状态标志和双检锁单例。",answer:"volatile保证：1.可见性(修改立即刷新到主内存) 2.有序性(禁止指令重排)。不保证原子性(i++不是原子操作)。适用于状态标志和双检锁单例。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-8',title:"Java的Spring IOC和AOP？",category:'language',difficulty:'medium',content:"IOC(控制反转)：将对象创建和依赖管理交给Spring容器。DI(依赖注入)是IOC的实现方式。AOP(面向切面)：将横切关注点(日志、事务)模块化。通过动态代理实现。",answer:"IOC(控制反转)：将对象创建和依赖管理交给Spring容器。DI(依赖注入)是IOC的实现方式。AOP(面向切面)：将横切关注点(日志、事务)模块化。通过动态代理实现。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-9',title:"C++的智能指针？",category:'language',difficulty:'medium',content:"三种智能指针：1.unique_ptr(独占，不可复制) 2.shared_ptr(共享，引用计数) 3.weak_ptr(弱引用，不增加计数)。解决内存泄漏问题。RAII原则。",answer:"三种智能指针：1.unique_ptr(独占，不可复制) 2.shared_ptr(共享，引用计数) 3.weak_ptr(弱引用，不增加计数)。解决内存泄漏问题。RAII原则。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-10',title:"C++的虚函数和多态？",category:'language',difficulty:'medium',content:"虚函数通过vtable(虚函数表)实现运行时多态。派生类重写虚函数，基类指针调用时执行派生类版本。纯虚函数(=0)定义抽象类。override关键字确保重写。",answer:"虚函数通过vtable(虚函数表)实现运行时多态。派生类重写虚函数，基类指针调用时执行派生类版本。纯虚函数(=0)定义抽象类。override关键字确保重写。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-11',title:"C++的移动语义？",category:'language',difficulty:'hard',content:"移动语义避免不必要的拷贝。右值引用(&&)绑定临时对象。move()将左值转为右值。移动构造和移动赋值转移资源而非拷贝。适用于大对象(如vector、string)。",answer:"移动语义避免不必要的拷贝。右值引用(&&)绑定临时对象。move()将左值转为右值。移动构造和移动赋值转移资源而非拷贝。适用于大对象(如vector、string)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-12',title:"Python的GIL？",category:'language',difficulty:'medium',content:"GIL(全局解释器锁)同一时刻只允许一个线程执行Python字节码。影响CPU密集型多线程。解决方案：1.multiprocessing多进程 2.C扩展释放GIL 3.异步IO。",answer:"GIL(全局解释器锁)同一时刻只允许一个线程执行Python字节码。影响CPU密集型多线程。解决方案：1.multiprocessing多进程 2.C扩展释放GIL 3.异步IO。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-13',title:"Python的装饰器？",category:'language',difficulty:'medium',content:"装饰器是修改函数行为的高阶函数。@decorator语法糖。带参数装饰器需要三层嵌套。functools.wraps保留原函数元信息。类装饰器实现__call__。",answer:"装饰器是修改函数行为的高阶函数。@decorator语法糖。带参数装饰器需要三层嵌套。functools.wraps保留原函数元信息。类装饰器实现__call__。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-14',title:"Python的生成器？",category:'language',difficulty:'medium',content:"生成器用yield返回值，暂停函数执行。next()恢复执行。惰性求值，节省内存。生成器表达式(g = (x**2 for x in range(10)))。send()向生成器传值。",answer:"生成器用yield返回值，暂停函数执行。next()恢复执行。惰性求值，节省内存。生成器表达式(g = (x**2 for x in range(10)))。send()向生成器传值。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-15',title:"Go的goroutine和channel？",category:'language',difficulty:'medium',content:"goroutine是轻量级线程(2KB初始栈)，go关键字启动。channel是goroutine间通信管道。无缓冲channel同步，有缓冲channel异步。select处理多个channel。",answer:"goroutine是轻量级线程(2KB初始栈)，go关键字启动。channel是goroutine间通信管道。无缓冲channel同步，有缓冲channel异步。select处理多个channel。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-16',title:"Go的接口？",category:'language',difficulty:'easy',content:"Go接口是隐式实现(鸭子类型)。类型只要实现了接口的所有方法就自动实现该接口。空接口interface{}可以接收任何类型。接口组合优于继承。",answer:"Go接口是隐式实现(鸭子类型)。类型只要实现了接口的所有方法就自动实现该接口。空接口interface{}可以接收任何类型。接口组合优于继承。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-17',title:"Go的defer？",category:'language',difficulty:'easy',content:"defer延迟执行函数，在函数返回前执行。多个defer按LIFO顺序执行。用途：1.关闭文件 2.释放锁 3.错误处理。defer的参数在声明时求值。",answer:"defer延迟执行函数，在函数返回前执行。多个defer按LIFO顺序执行。用途：1.关闭文件 2.释放锁 3.错误处理。defer的参数在声明时求值。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-18',title:"Go的slice和array区别？",category:'language',difficulty:'easy',content:"array是固定长度，slice是动态长度。slice底层是array的引用，包含指针、长度、容量。append可能触发扩容(2倍或1.25倍)。slice传参是引用语义。",answer:"array是固定长度，slice是动态长度。slice底层是array的引用，包含指针、长度、容量。append可能触发扩容(2倍或1.25倍)。slice传参是引用语义。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-19',title:"Go的map是并发安全的吗？",category:'language',difficulty:'medium',content:"标准map不是并发安全的，并发读写会panic。sync.Map是并发安全的。或者用sync.RWMutex保护map。Go 1.9+的sync.Map适合读多写少场景。",answer:"标准map不是并发安全的，并发读写会panic。sync.Map是并发安全的。或者用sync.RWMutex保护map。Go 1.9+的sync.Map适合读多写少场景。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-20',title:"Go的垃圾回收？",category:'language',difficulty:'medium',content:"Go使用三色标记法+混合写屏障。STW(Stop The World)时间很短。GC触发条件：1.堆大小达到上次2倍 2.2分钟未触发 3.手动runtime.GC()。GOGC控制阈值。",answer:"Go使用三色标记法+混合写屏障。STW(Stop The World)时间很短。GC触发条件：1.堆大小达到上次2倍 2.2分钟未触发 3.手动runtime.GC()。GOGC控制阈值。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-21',title:"Rust的所有权系统？",category:'language',difficulty:'hard',content:"Rust所有权规则：1.每个值有唯一所有者 2.同一时刻只能有一个所有者 3.所有者离开作用域值被释放。借用(&)不转移所有权。可变借用(&mut)独占。编译时检查。",answer:"Rust所有权规则：1.每个值有唯一所有者 2.同一时刻只能有一个所有者 3.所有者离开作用域值被释放。借用(&)不转移所有权。可变借用(&mut)独占。编译时检查。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-22',title:"Rust的生命周期？",category:'language',difficulty:'hard',content:"生命周期确保引用在使用期间有效。标注：'a。函数签名中标注生命周期帮助编译器推断。省略规则：输入生命周期从参数推导，输出从输入推导。static生命周期贯穿整个程序。",answer:"生命周期确保引用在使用期间有效。标注：'a。函数签名中标注生命周期帮助编译器推断。省略规则：输入生命周期从参数推导，输出从输入推导。static生命周期贯穿整个程序。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-23',title:"什么是函数式编程语言？",category:'language',difficulty:'medium',content:"函数式编程强调：1.纯函数 2.不可变数据 3.高阶函数 4.递归 5.模式匹配。Haskell是纯函数式语言。Scala/Clojure是JVM上的函数式语言。",answer:"函数式编程强调：1.纯函数 2.不可变数据 3.高阶函数 4.递归 5.模式匹配。Haskell是纯函数式语言。Scala/Clojure是JVM上的函数式语言。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-24',title:"什么是编译型和解释型语言？",category:'language',difficulty:'easy',content:"编译型：源代码编译为机器码再执行(C/C++/Go)，运行快。解释型：逐行解释执行(Python/JavaScript)，跨平台。Java是混合型(编译为字节码+JIT)。",answer:"编译型：源代码编译为机器码再执行(C/C++/Go)，运行快。解释型：逐行解释执行(Python/JavaScript)，跨平台。Java是混合型(编译为字节码+JIT)。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'lang-custom-25',title:"什么是动态类型和静态类型？",category:'language',difficulty:'easy',content:"静态类型：编译时确定类型(Java/C++/Go)，IDE支持好。动态类型：运行时确定类型(Python/JS)，灵活但容易出错。TypeScript是JS的静态类型超集。",answer:"静态类型：编译时确定类型(Java/C++/Go)，IDE支持好。动态类型：运行时确定类型(Python/JS)，灵活但容易出错。TypeScript是JS的静态类型超集。",sourceType:'builtin',source:"面试高频题",tags:["编程语言"]},{id:'sc-custom-1',title:"如何处理线上OOM问题？",category:'scenario',difficulty:'hard',content:"1.查看OOM日志和堆转储 2.jmap -histo查看对象分布 3.MAT分析堆转储 4.定位大对象或内存泄漏 5.修复并验证。预防：设置-XX:+HeapDumpOnOutOfMemoryError。",answer:"1.查看OOM日志和堆转储 2.jmap -histo查看对象分布 3.MAT分析堆转储 4.定位大对象或内存泄漏 5.修复并验证。预防：设置-XX:+HeapDumpOnOutOfMemoryError。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-2',title:"如何处理数据库慢查询？",category:'scenario',difficulty:'medium',content:"1.开启慢查询日志 2.EXPLAIN分析执行计划 3.检查是否使用索引 4.优化SQL(避免SELECT *、合理JOIN) 5.添加索引 6.考虑读写分离或缓存。",answer:"1.开启慢查询日志 2.EXPLAIN分析执行计划 3.检查是否使用索引 4.优化SQL(避免SELECT *、合理JOIN) 5.添加索引 6.考虑读写分离或缓存。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-3',title:"如何处理缓存与数据库不一致？",category:'scenario',difficulty:'hard',content:"策略：1.Cache Aside(先更新DB再删缓存) 2.延迟双删(更新DB->删缓存->延迟再删) 3.监听binlog更新缓存 4.设置合理过期时间。最终一致性。",answer:"策略：1.Cache Aside(先更新DB再删缓存) 2.延迟双删(更新DB->删缓存->延迟再删) 3.监听binlog更新缓存 4.设置合理过期时间。最终一致性。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-4',title:"如何设计高可用系统？",category:'scenario',difficulty:'hard',content:"原则：1.消除单点(冗余) 2.故障检测(心跳) 3.快速故障转移 4.降级和熔断 5.限流 6.灰度发布。指标：99.99%可用性=年停机53分钟。",answer:"原则：1.消除单点(冗余) 2.故障检测(心跳) 3.快速故障转移 4.降级和熔断 5.限流 6.灰度发布。指标：99.99%可用性=年停机53分钟。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-5',title:"如何进行容量规划？",category:'scenario',difficulty:'medium',content:"1.评估当前资源使用率 2.预测增长趋势 3.压测确定单机极限 4.计算所需机器数(含冗余) 5.制定扩容计划。关注：CPU、内存、磁盘IO、网络带宽、QPS。",answer:"1.评估当前资源使用率 2.预测增长趋势 3.压测确定单机极限 4.计算所需机器数(含冗余) 5.制定扩容计划。关注：CPU、内存、磁盘IO、网络带宽、QPS。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-6',title:"如何处理分布式事务？",category:'scenario',difficulty:'hard',content:"方案：1.2PC(强一致但阻塞) 2.TCC(柔性事务) 3.Saga(长事务) 4.本地消息表 5.可靠消息最终一致性。根据业务选择：强一致用2PC，最终一致用消息。",answer:"方案：1.2PC(强一致但阻塞) 2.TCC(柔性事务) 3.Saga(长事务) 4.本地消息表 5.可靠消息最终一致性。根据业务选择：强一致用2PC，最终一致用消息。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-7',title:"如何设计灰度发布策略？",category:'scenario',difficulty:'medium',content:"步骤：1.定义灰度规则(用户ID百分比) 2.网关层路由 3.监控核心指标 4.逐步扩大范围 5.全量发布或回滚。需要：Feature Flag、监控告警、快速回滚。",answer:"步骤：1.定义灰度规则(用户ID百分比) 2.网关层路由 3.监控核心指标 4.逐步扩大范围 5.全量发布或回滚。需要：Feature Flag、监控告警、快速回滚。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-8',title:"如何处理消息队列积压？",category:'scenario',difficulty:'hard',content:"1.紧急扩容消费者 2.检查消费者是否异常 3.临时丢弃非核心消息 4.增加分区/队列 5.批量消费提高吞吐。预防：监控积压量、设置告警、容量规划。",answer:"1.紧急扩容消费者 2.检查消费者是否异常 3.临时丢弃非核心消息 4.增加分区/队列 5.批量消费提高吞吐。预防：监控积压量、设置告警、容量规划。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-9',title:"如何排查CPU 100%问题？",category:'scenario',difficulty:'medium',content:"1.top找到高CPU进程 2.top -Hp找到高CPU线程 3.jstack导出线程栈 4.将线程ID转为16进制 5.在栈中查找对应线程。常见：死循环、频繁GC、正则回溯。",answer:"1.top找到高CPU进程 2.top -Hp找到高CPU线程 3.jstack导出线程栈 4.将线程ID转为16进制 5.在栈中查找对应线程。常见：死循环、频繁GC、正则回溯。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-10',title:"如何排查内存泄漏？",category:'scenario',difficulty:'hard',content:"1.监控内存使用趋势(持续增长) 2.jmap导出堆转储 3.MAT分析支配树 4.找到GC Root引用链 5.定位泄漏对象。常见：集合未清理、ThreadLocal、监听器未注销。",answer:"1.监控内存使用趋势(持续增长) 2.jmap导出堆转储 3.MAT分析支配树 4.找到GC Root引用链 5.定位泄漏对象。常见：集合未清理、ThreadLocal、监听器未注销。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-11',title:"如何设计异地多活？",category:'scenario',difficulty:'hard',content:"架构：1.单元化(用户路由到固定单元) 2.数据同步(异步复制) 3.全局唯一ID 4.分布式事务 5.流量调度。挑战：数据一致性、冲突解决、运维复杂度。",answer:"架构：1.单元化(用户路由到固定单元) 2.数据同步(异步复制) 3.全局唯一ID 4.分布式事务 5.流量调度。挑战：数据一致性、冲突解决、运维复杂度。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-12',title:"如何处理突发流量？",category:'scenario',difficulty:'medium',content:"1.自动扩容(K8s HPA) 2.限流(令牌桶) 3.降级(关闭非核心功能) 4.熔断(防止级联故障) 5.排队(消息队列缓冲) 6.CDN分流。预案和演练很重要。",answer:"1.自动扩容(K8s HPA) 2.限流(令牌桶) 3.降级(关闭非核心功能) 4.熔断(防止级联故障) 5.排队(消息队列缓冲) 6.CDN分流。预案和演练很重要。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-13',title:"如何设计数据迁移方案？",category:'scenario',difficulty:'hard',content:"步骤：1.评估数据量和影响 2.双写(新旧库同时写) 3.历史数据迁移 4.数据校验(对比) 5.灰度切读 6.全量切读 7.停止双写。回滚方案：切回旧库。",answer:"步骤：1.评估数据量和影响 2.双写(新旧库同时写) 3.历史数据迁移 4.数据校验(对比) 5.灰度切读 6.全量切读 7.停止双写。回滚方案：切回旧库。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-14',title:"如何保证接口幂等性？",category:'scenario',difficulty:'medium',content:"方案：1.唯一请求ID+去重表 2.数据库唯一约束 3.乐观锁(版本号) 4.状态机(只允许特定状态转换) 5.Token机制(预获取+验证)。支付和下单必须幂等。",answer:"方案：1.唯一请求ID+去重表 2.数据库唯一约束 3.乐观锁(版本号) 4.状态机(只允许特定状态转换) 5.Token机制(预获取+验证)。支付和下单必须幂等。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-15',title:"如何设计服务降级？",category:'scenario',difficulty:'medium',content:"策略：1.关闭非核心功能(推荐、评论) 2.返回缓存数据 3.简化逻辑(不查DB) 4.限流排队 5.熔断(快速失败)。降级分级：一级(核心)、二级(重要)、三级(一般)。",answer:"策略：1.关闭非核心功能(推荐、评论) 2.返回缓存数据 3.简化逻辑(不查DB) 4.限流排队 5.熔断(快速失败)。降级分级：一级(核心)、二级(重要)、三级(一般)。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-16',title:"如何设计服务熔断？",category:'scenario',difficulty:'medium',content:"熔断器模式：1.关闭(正常请求) 2.打开(失败率超阈值，快速失败) 3.半开(放少量请求测试)。Hystrix/Resilience4j/Sentinel实现。防止级联故障。",answer:"熔断器模式：1.关闭(正常请求) 2.打开(失败率超阈值，快速失败) 3.半开(放少量请求测试)。Hystrix/Resilience4j/Sentinel实现。防止级联故障。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-17',title:"如何排查网络延迟问题？",category:'scenario',difficulty:'medium',content:"1.ping/traceroute检查连通性 2.mtr持续监测 3.tcpdump抓包分析 4.检查DNS解析时间 5.检查服务端处理时间 6.检查CDN缓存命中率。",answer:"1.ping/traceroute检查连通性 2.mtr持续监测 3.tcpdump抓包分析 4.检查DNS解析时间 5.检查服务端处理时间 6.检查CDN缓存命中率。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-18',title:"如何设计零停机部署？",category:'scenario',difficulty:'medium',content:"方案：1.蓝绿部署(两套环境切换) 2.滚动更新(逐个替换) 3.金丝雀发布(先小范围) 4.特性开关(代码已部署但未启用)。K8s RollingUpdate默认零停机。",answer:"方案：1.蓝绿部署(两套环境切换) 2.滚动更新(逐个替换) 3.金丝雀发布(先小范围) 4.特性开关(代码已部署但未启用)。K8s RollingUpdate默认零停机。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-19',title:"如何处理数据热点问题？",category:'scenario',difficulty:'medium',content:"1.本地缓存(Guava/Caffeine) 2.读写分离 3.分片打散热点Key 4.热点探测+提前预热 5.请求合并。监控：Redis hotkey检测、QPS分布。",answer:"1.本地缓存(Guava/Caffeine) 2.读写分离 3.分片打散热点Key 4.热点探测+提前预热 5.请求合并。监控：Redis hotkey检测、QPS分布。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-20',title:"如何设计数据归档方案？",category:'scenario',difficulty:'medium',content:"1.定义归档规则(时间、状态) 2.归档存储(冷存储、对象存储) 3.在线数据只保留近期 4.归档数据可查询但慢 5.定期清理过期归档。减少在线库数据量。",answer:"1.定义归档规则(时间、状态) 2.归档存储(冷存储、对象存储) 3.在线数据只保留近期 4.归档数据可查询但慢 5.定期清理过期归档。减少在线库数据量。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-21',title:"如何排查死锁问题？",category:'scenario',difficulty:'medium',content:"1.show engine innodb status查看死锁信息 2.分析涉及SQL和锁 3.检查加锁顺序 4.优化事务(缩短持锁时间) 5.统一加锁顺序。预防：按固定顺序访问资源。",answer:"1.show engine innodb status查看死锁信息 2.分析涉及SQL和锁 3.检查加锁顺序 4.优化事务(缩短持锁时间) 5.统一加锁顺序。预防：按固定顺序访问资源。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-22',title:"如何设计全链路压测？",category:'scenario',difficulty:'hard',content:"步骤：1.梳理核心链路 2.构造测试数据(脱敏) 3.隔离压测流量(影子库) 4.逐步加压 5.监控各环节瓶颈 6.优化后复测。需要：流量录制回放、全链路标记。",answer:"步骤：1.梳理核心链路 2.构造测试数据(脱敏) 3.隔离压测流量(影子库) 4.逐步加压 5.监控各环节瓶颈 6.优化后复测。需要：流量录制回放、全链路标记。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-23',title:"如何处理Redis大Key问题？",category:'scenario',difficulty:'medium',content:"大Key：value>10KB或集合元素>5000。危害：阻塞Redis、网络拥塞。处理：1.拆分(按字段/分片) 2.压缩 3.本地缓存 4.异步删除(UNLINK)。redis-rdb-tools扫描。",answer:"大Key：value>10KB或集合元素>5000。危害：阻塞Redis、网络拥塞。处理：1.拆分(按字段/分片) 2.压缩 3.本地缓存 4.异步删除(UNLINK)。redis-rdb-tools扫描。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-24',title:"如何设计服务健康检查？",category:'scenario',difficulty:'easy',content:"两种探针：1.存活探针(Liveness，失败重启) 2.就绪探针(Readiness，失败摘除流量)。K8s配置：httpGet、tcpSocket、exec。需要：超时、重试、阈值。",answer:"两种探针：1.存活探针(Liveness，失败重启) 2.就绪探针(Readiness，失败摘除流量)。K8s配置：httpGet、tcpSocket、exec。需要：超时、重试、阈值。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-25',title:"如何设计日志规范？",category:'scenario',difficulty:'medium',content:"规范：1.统一格式(JSON) 2.必填字段(时间、级别、traceId、服务名) 3.敏感信息脱敏 4.合理级别(ERROR/WARN/INFO/DEBUG) 5.异步日志 6.日志轮转。",answer:"规范：1.统一格式(JSON) 2.必填字段(时间、级别、traceId、服务名) 3.敏感信息脱敏 4.合理级别(ERROR/WARN/INFO/DEBUG) 5.异步日志 6.日志轮转。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-26',title:"如何设计监控告警体系？",category:'scenario',difficulty:'medium',content:"分层：1.基础设施(CPU/内存/磁盘) 2.应用(JVM/QPS/延迟) 3.业务(订单量/成功率)。告警原则：1.可操作性 2.分级(P0-P3) 3.避免告警风暴 4.定期Review。",answer:"分层：1.基础设施(CPU/内存/磁盘) 2.应用(JVM/QPS/延迟) 3.业务(订单量/成功率)。告警原则：1.可操作性 2.分级(P0-P3) 3.避免告警风暴 4.定期Review。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-27',title:"如何处理跨域问题？",category:'scenario',difficulty:'easy',content:"方案：1.CORS(服务端设置Access-Control-Allow-Origin) 2.Nginx代理 3.JSONP(GET) 4.WebSocket不受限。CORS最常用，需要处理预检请求(OPTIONS)。",answer:"方案：1.CORS(服务端设置Access-Control-Allow-Origin) 2.Nginx代理 3.JSONP(GET) 4.WebSocket不受限。CORS最常用，需要处理预检请求(OPTIONS)。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-28',title:"如何设计API版本管理？",category:'scenario',difficulty:'medium',content:"方案：1.URL路径(/v1/api) 2.请求头(Api-Version: 1) 3.查询参数(?version=1)。推荐URL路径，直观且易于路由。废弃版本需要过渡期和通知。",answer:"方案：1.URL路径(/v1/api) 2.请求头(Api-Version: 1) 3.查询参数(?version=1)。推荐URL路径，直观且易于路由。废弃版本需要过渡期和通知。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-29',title:"如何设计错误码体系？",category:'scenario',difficulty:'medium',content:"规范：1.全局唯一 2.分层(系统+模块+错误) 3.有含义(不是纯数字) 4.文档化。示例：SYS_AUTH_TOKEN_EXPIRED。包含：错误码、错误消息、文档链接。",answer:"规范：1.全局唯一 2.分层(系统+模块+错误) 3.有含义(不是纯数字) 4.文档化。示例：SYS_AUTH_TOKEN_EXPIRED。包含：错误码、错误消息、文档链接。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-30',title:"如何设计配置管理？",category:'scenario',difficulty:'medium',content:"原则：1.配置与代码分离 2.环境区分(dev/staging/prod) 3.敏感信息加密 4.版本管理 5.热更新。方案：Apollo、Nacos、Spring Cloud Config。",answer:"原则：1.配置与代码分离 2.环境区分(dev/staging/prod) 3.敏感信息加密 4.版本管理 5.热更新。方案：Apollo、Nacos、Spring Cloud Config。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-31',title:"如何处理时区问题？",category:'scenario',difficulty:'medium',content:"原则：1.存储用UTC 2.显示用本地时间 3.API传ISO 8601格式 4.数据库TIMESTAMP自动转UTC。Java用ZonedDateTime，JS用Intl API。",answer:"原则：1.存储用UTC 2.显示用本地时间 3.API传ISO 8601格式 4.数据库TIMESTAMP自动转UTC。Java用ZonedDateTime，JS用Intl API。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-32',title:"如何设计数据权限？",category:'scenario',difficulty:'hard',content:"方案：1.行级权限(数据范围过滤) 2.列级权限(字段脱敏) 3.数据权限与角色关联 4.SQL拦截自动拼接条件。MyBatis Plus的DataPermissionInterceptor。",answer:"方案：1.行级权限(数据范围过滤) 2.列级权限(字段脱敏) 3.数据权限与角色关联 4.SQL拦截自动拼接条件。MyBatis Plus的DataPermissionInterceptor。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-33',title:"如何设计审计追踪？",category:'scenario',difficulty:'medium',content:"记录：操作人、时间、操作类型、变更前后数据。实现：1.AOP拦截 2.数据库触发器 3.binlog监听。数据不可修改，可查询。满足合规要求。",answer:"记录：操作人、时间、操作类型、变更前后数据。实现：1.AOP拦截 2.数据库触发器 3.binlog监听。数据不可修改，可查询。满足合规要求。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-34',title:"如何处理并发更新冲突？",category:'scenario',difficulty:'medium',content:"方案：1.乐观锁(版本号/CAS) 2.悲观锁(SELECT FOR UPDATE) 3.分布式锁 4.事件溯源。乐观锁适合低冲突，悲观锁适合高冲突。",answer:"方案：1.乐观锁(版本号/CAS) 2.悲观锁(SELECT FOR UPDATE) 3.分布式锁 4.事件溯源。乐观锁适合低冲突，悲观锁适合高冲突。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-35',title:"如何设计数据备份策略？",category:'scenario',difficulty:'easy',content:"3-2-1原则：3份备份、2种介质、1份异地。MySQL：xtrabackup全量+增量。Redis：RDB+AOF。验证：定期恢复测试。自动化：crontab+脚本+告警。",answer:"3-2-1原则：3份备份、2种介质、1份异地。MySQL：xtrabackup全量+增量。Redis：RDB+AOF。验证：定期恢复测试。自动化：crontab+脚本+告警。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-36',title:"如何设计限流策略？",category:'scenario',difficulty:'medium',content:"维度：1.IP限流 2.用户限流 3.接口限流 4.服务限流。算法：1.固定窗口 2.滑动窗口 3.漏桶 4.令牌桶。分布式：Redis+Lua、Sentinel。",answer:"维度：1.IP限流 2.用户限流 3.接口限流 4.服务限流。算法：1.固定窗口 2.滑动窗口 3.漏桶 4.令牌桶。分布式：Redis+Lua、Sentinel。",sourceType:'builtin',source:"面试高频题",tags:["场景题"]},{id:'sc-custom-37',title:"如何设计熔断策略？",category:'scenario',difficulty:'medium',content:"指标：1.异常比例 2.慢
