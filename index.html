ent:"TCP/IP四层：应用层(HTTP/FTP/DNS)、传输层(TCP/UDP)、网络层(IP/ICMP/ARP)、网络接口层(以太网/WiFi)。OSI七层多了表示层和会话层。每一层封装本层头部为上层提供服务。",answer:"TCP/IP四层：应用层(HTTP/FTP/DNS)、传输层(TCP/UDP)、网络层(IP/ICMP/ARP)、网络接口层(以太网/WiFi)。OSI七层多了表示层和会话层。每一层封装本层头部为上层提供服务。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-2',title:"TCP和UDP的区别？适用场景？",category:'network',difficulty:'easy',content:"TCP：面向连接、可靠(ACK重传)、流量控制(滑动窗口)、拥塞控制、字节流。适用HTTP/HTTPS/FTP/SMTP/SSH。UDP：无连接、不可靠、数据报、速度快。适用DNS/DHCP/视频通话/游戏/QUIC。QUIC基于UDP实现可靠传输。",answer:"TCP：面向连接、可靠(ACK重传)、流量控制(滑动窗口)、拥塞控制、字节流。适用HTTP/HTTPS/FTP/SMTP/SSH。UDP：无连接、不可靠、数据报、速度快。适用DNS/DHCP/视频通话/游戏/QUIC。QUIC基于UDP实现可靠传输。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-3',title:"TCP三次握手详细过程？SYN攻击？",category:'network',difficulty:'medium',content:"1.客户端发SYN(seq=x) 2.服务器回SYN+ACK(seq=y ack=x+1) 3.客户端发ACK(ack=y+1)。SYN Flood：大量伪造SYN不完成握手耗尽半连接队列(SYN_RECV)。防御：SYN Cookie、增大backlog、防火墙过滤。",answer:"1.客户端发SYN(seq=x) 2.服务器回SYN+ACK(seq=y ack=x+1) 3.客户端发ACK(ack=y+1)。SYN Flood：大量伪造SYN不完成握手耗尽半连接队列(SYN_RECV)。防御：SYN Cookie、增大backlog、防火墙过滤。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-4',title:"TCP四次挥手？TIME_WAIT作用？",category:'network',difficulty:'medium',content:"主动方FIN->被动方ACK->被动方FIN->主动方ACK。TIME_WAIT(2MSL)：1.确保最后ACK到达 2.等待迟到的报文消散。过多TIME_WAIT：启用reuseaddr/recycle端口复用、调整tcp_tw_reuse。",answer:"主动方FIN->被动方ACK->被动方FIN->主动方ACK。TIME_WAIT(2MSL)：1.确保最后ACK到达 2.等待迟到的报文消散。过多TIME_WAIT：启用reuseaddr/recycle端口复用、调整tcp_tw_reuse。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-5',title:"TCP滑动窗口？流量控制？",category:'network',difficulty:'medium',content:"窗口：接收方告知发送方可接收的数据量(rwnd)。发送方根据窗口大小控制发送速率。零窗口探测：接收方窗口0时定期发送探测。Nagle算法合并小包减少网络小分组。糊涂窗口综合征需避免。",answer:"窗口：接收方告知发送方可接收的数据量(rwnd)。发送方根据窗口大小控制发送速率。零窗口探测：接收方窗口0时定期发送探测。Nagle算法合并小包减少网络小分组。糊涂窗口综合征需避免。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-6',title:"TCP拥塞控制？慢启动/拥塞避免/快重传/快恢复？",category:'network',difficulty:'hard',content:"慢启动：cwnd指数增长至ssthresh。拥塞避免：cwnd线性增长。快重传：3个重复ACK立即重传不等超时。快恢复：cwnd减半+3而非降为1。BBR/CUBIC是现代算法。ECN显式拥塞通知。",answer:"慢启动：cwnd指数增长至ssthresh。拥塞避免：cwnd线性增长。快重传：3个重复ACK立即重传不等超时。快恢复：cwnd减半+3而非降为1。BBR/CUBIC是现代算法。ECN显式拥塞通知。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-7',title:"TCP粘包/拆包？如何解决？",category:'network',difficulty:'medium',content:"TCP字节流无消息边界。粘包多条消息合并，拆包一条消息分多包。解决：1.定长消息 2.分隔符(\\n/r\\n) 3.长度字段(Length Field) 4.应用层协议设计。Netty的DelimiterBasedFrameDecoder/LengthFieldBasedFrameDecoder解决。",answer:"TCP字节流无消息边界。粘包多条消息合并，拆包一条消息分多包。解决：1.定长消息 2.分隔符(\\n/r\\n) 3.长度字段(Length Field) 4.应用层协议设计。Netty的DelimiterBasedFrameDecoder/LengthFieldBasedFrameDecoder解决。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-8',title:"什么是MTU和MSS？关系？",category:'network',difficulty:'easy',content:"MTU(Maximum Transmission Unit)：数据链路层最大传输单元，以太网1500字节。MSS(Maximum Segment Size)：TCP层数据最大大小=MTU-40(IP+TCP头)=1460。Path MTU Discovery发现路径最小MTU。DF(Don't Fr",answer:"MTU(Maximum Transmission Unit)：数据链路层最大传输单元，以太网1500字节。MSS(Maximum Segment Size)：TCP层数据最大大小=MTU-40(IP+TCP头)=1460。Path MTU Discovery发现路径最小MTU。DF(Don't Fragment)标志。IP分片影响性能应避免。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-9',title:"ARP协议工作原理？ARP欺骗攻击？",category:'network',difficulty:'medium',content:"ARP(Address Resolution Protocol)：IP->MAC映射。请求广播响应单播。ARP缓存表有老化时间。ARP欺骗：伪造ARP响应欺骗网关或受害者实现MITM中间人攻击。防御：静态ARP绑定、DAI(Dynamic ARP Inspection)、802.1x认证。",answer:"ARP(Address Resolution Protocol)：IP->MAC映射。请求广播响应单播。ARP缓存表有老化时间。ARP欺骗：伪造ARP响应欺骗网关或受害者实现MITM中间人攻击。防御：静态ARP绑定、DAI(Dynamic ARP Inspection)、802.1x认证。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-10',title:"ICMP协议？ping和traceroute原理？",category:'network',difficulty:'medium',content:"ICMP(Internet Control Message Protocol)：网络层差错报告和控制。Echo Request/Reply(ping连通性测试)。Time Exceeded(traceroute TTL递增路由追踪)。Destination Unreachable(目标不可达)。IC",answer:"ICMP(Internet Control Message Protocol)：网络层差错报告和控制。Echo Request/Reply(ping连通性测试)。Time Exceeded(traceroute TTL递增路由追踪)。Destination Unreachable(目标不可达)。ICMP Rate Limiting防洪水。防火墙常禁ping但ICMP Path MTU Discovery需放行。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-11',title:"DNS解析过程？递归查询vs迭代查询？",category:'network',difficulty:'medium',content:"域名->IP：浏览器缓存->OS缓存->hosts文件->本地DNS服务器(递归)->根域(.)->顶级域(.com/.cn)->权威域NS。递归：DNS服务器代查全部。迭代：客户端逐步查询。DNS预取、HTTP/2连接合并减少DNS查询次数提升速度。",answer:"域名->IP：浏览器缓存->OS缓存->hosts文件->本地DNS服务器(递归)->根域(.)->顶级域(.com/.cn)->权威域NS。递归：DNS服务器代查全部。迭代：客户端逐步查询。DNS预取、HTTP/2连接合并减少DNS查询次数提升速度。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-12',title:"DNS记录类型？A/AAAA/CNAME/MX/TXT/NS/SOA/PTR？",category:'network',difficulty:'easy',content:"A：IPv4地址。AAAA：IPv6地址。CNAME：别名域名。MX：邮件交换服务器。TXT：文本记录(SPF DKIM验证)。NS：名称服务器。SOA：授权起始(主服务器信息)。PTR：反向解析(IP->域名)。SRV：服务定位。CAA：证书颁发机构授权。",answer:"A：IPv4地址。AAAA：IPv6地址。CNAME：别名域名。MX：邮件交换服务器。TXT：文本记录(SPF DKIM验证)。NS：名称服务器。SOA：授权起始(主服务器信息)。PTR：反向解析(IP->域名)。SRV：服务定位。CAA：证书颁发机构授权。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-13',title:"DNS劫持和DNS污染？区别与防护？",category:'network',difficulty:'medium',content:"DNS劫持：篡改DNS服务器返回结果(运营商劫持广告)。DNS污染：在查询路径上注入假响应(防火墙GFW)。防护：DoH(DNS over HTTPS加密查询443端口)、DoT(DNS over TLS 853端口)、可信DNS(8.8.8.8/1.1.1.1)、本地hosts文件。",answer:"DNS劫持：篡改DNS服务器返回结果(运营商劫持广告)。DNS污染：在查询路径上注入假响应(防火墙GFW)。防护：DoH(DNS over HTTPS加密查询443端口)、DoT(DNS over TLS 853端口)、可信DNS(8.8.8.8/1.1.1.1)、本地hosts文件。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-14',title:"HTTP/1.0 vs HTTP/1.1 vs HTTP/2 vs HTTP/3对比？",category:'network',difficulty:'medium',content:"HTTP/1.0：短连接。HTTP/1.1：长连接Keep-Alive、管线化(难部署)、Host头。HTTP/2：二进制帧、多路复用(无队头阻塞)、HPACK头部压缩、服务端推送。HTTP/3：基于QUIC(UDP)、0-RTT快速握手、连接迁移(网络切换不断连)。性能逐代大幅提升。",answer:"HTTP/1.0：短连接。HTTP/1.1：长连接Keep-Alive、管线化(难部署)、Host头。HTTP/2：二进制帧、多路复用(无队头阻塞)、HPACK头部压缩、服务端推送。HTTP/3：基于QUIC(UDP)、0-RTT快速握手、连接迁移(网络切换不断连)。性能逐代大幅提升。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-15',title:"HTTP状态码分类？常见状态码含义？",category:'network',difficulty:'easy',content:"1xx信息(100 Continue继续发送体)。2xx成功(200 OK / 201 Created / 204 No Content)。3xx重定向(301永久 / 302临时 / 304未修改)。4xx客户端错误(400参数错 / 401未认证 / 403禁止 / 404不存在)。5xx服务端",answer:"1xx信息(100 Continue继续发送体)。2xx成功(200 OK / 201 Created / 204 No Content)。3xx重定向(301永久 / 302临时 / 304未修改)。4xx客户端错误(400参数错 / 401未认证 / 403禁止 / 404不存在)。5xx服务端错误(500内部错 / 502网关错 / 503不可用 / 504超时)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-16',title:"HTTP请求方法？GET POST PUT DELETE PATCH RESTful？",category:'network',difficulty:'easy',content:"GET获取资源(幂等可缓存)。POST创建资源(非幂等)。PUT整体更新(幂等)。PATCH部分更新(非幂等)。DELETE删除(幂等)。HEAD获取头元数据。OPTIONS预检(CORS)。CONNECT建立隧道。TRACE调试回环。RESTful：名词URI+动词HTTP方法+状态码+JSON。",answer:"GET获取资源(幂等可缓存)。POST创建资源(非幂等)。PUT整体更新(幂等)。PATCH部分更新(非幂等)。DELETE删除(幂等)。HEAD获取头元数据。OPTIONS预检(CORS)。CONNECT建立隧道。TRACE调试回环。RESTful：名词URI+动词HTTP方法+状态码+JSON。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-17',title:"Cookie和Session？Token(JWT)？区别与选择？",category:'network',difficulty:'medium',content:"Cookie：客户端存储，每次请求自动携带，4KB限制，可设HttpOnly/Secure/SameSite安全属性。Session：服务端存储，Cookie存Session ID，服务端可控销毁。JWT(Json Web Token)：自包含签名令牌三段header.payload.signatu",answer:"Cookie：客户端存储，每次请求自动携带，4KB限制，可设HttpOnly/Secure/SameSite安全属性。Session：服务端存储，Cookie存Session ID，服务端可控销毁。JWT(Json Web Token)：自包含签名令牌三段header.payload.signature，无状态但payload Base64不加密勿存敏感信息。现代Web API倾向JWT Stateless。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-18',title:"HTTPS？TLS/SSL握手过程？版本？",category:'network',difficulty:'medium',content:"TLS握手：1.ClientHello(版本密码套件随机数) 2.ServerHello(选择套件证书随机数) 3.客户端验证证书链 4.密钥交换(ECDHE前向保密或RSA) 5.双方生成会话密钥 6.Finished加密通信开始。TLS 1.3(2018)：仅需1-RTT握手，强制前向保密，移除",answer:"TLS握手：1.ClientHello(版本密码套件随机数) 2.ServerHello(选择套件证书随机数) 3.客户端验证证书链 4.密钥交换(ECDHE前向保密或RSA) 5.双方生成会话密钥 6.Finished加密通信开始。TLS 1.3(2018)：仅需1-RTT握手，强制前向保密，移除不安全算法。0-RTT恢复先前连接更快但有重放风险需防范。Session Ticket/PSK复用。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-19',title:"对称加密和非对称加密？RSA/ECC/AES/ChaCha20？",category:'network',difficulty:'medium',content:"对称加密：加解密相同密钥。AES-256-GCM( Intel AES-NI硬件加速推荐)、ChaCha20-Poly1305( ARM移动端无AES指令集时更快)。非对称：公钥加密私钥解密/私钥签名公钥验签。RSA-2048+/ECDSA(secp256r1/secp384r1椭圆曲线)。混合加密",answer:"对称加密：加解密相同密钥。AES-256-GCM( Intel AES-NI硬件加速推荐)、ChaCha20-Poly1305( ARM移动端无AES指令集时更快)。非对称：公钥加密私钥解密/私钥签名公钥验签。RSA-2048+/ECDSA(secp256r1/secp384r1椭圆曲线)。混合加密：非对称交换对称密钥+对称加密数据体。TLS使用此模式。ECC同安全级别密钥远短于RSA。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-20',title:"XSS攻击类型和防御措施？",category:'network',difficulty:'medium',content:"XSS(Cross Site Scripting)：注入恶意JS脚本执行。存储型：存入数据库所有用户受害。反射型：URL参数反射触发。DOM型：前端JS修改DOM触发。防御：输出编码转义(HTML实体编码)、CSP(Content-Security-Policy白名单资源来源)、HttpOnly C",answer:"XSS(Cross Site Scripting)：注入恶意JS脚本执行。存储型：存入数据库所有用户受害。反射型：URL参数反射触发。DOM型：前端JS修改DOM触发。防御：输出编码转义(HTML实体编码)、CSP(Content-Security-Policy白名单资源来源)、HttpOnly Cookie防窃取、Input Sanitization输入净化(白名单优先)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-21',title:"CSRF攻击原理和防御？",category:'network',difficulty:'medium',content:"CSRF(Cross Site Request Forgery)：诱导用户在已登录状态发起恶意请求(利用浏览器自动携带Cookie)。SameSite Cookie属性(Strict严格/Lax宽松/None跨站需Secure)。CSRF Token表单隐藏字段+服务端校验。Referer/Orig",answer:"CSRF(Cross Site Request Forgery)：诱导用户在已登录状态发起恶意请求(利用浏览器自动携带Cookie)。SameSite Cookie属性(Strict严格/Lax宽松/None跨站需Secure)。CSRF Token表单隐藏字段+服务端校验。Referer/Origin头检查来源合法性。GET请求不应修改状态(幂等)。双重Cookie验证方案。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-22',title:"SQL注入攻击和防御？",category:'network',difficulty:'medium',content:"SQL Injection：拼接用户输入破坏SQL语句结构导致数据泄露或篡改。经典' OR '1'='1万能密码。防御核心：参数化查询(PreparedStatement/Statement占位符)最有效！ORM框架(Hibernate/MyBatis #{})自动参数化。输入验证白名单。最小权限数",answer:"SQL Injection：拼接用户输入破坏SQL语句结构导致数据泄露或篡改。经典' OR '1'='1万能密码。防御核心：参数化查询(PreparedStatement/Statement占位符)最有效！ORM框架(Hibernate/MyBatis #{})自动参数化。输入验证白名单。最小权限数据库账号。WAF辅助检测拦截异常模式。MyBatis ${}字符串拼接危险勿用！",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-23',title:"DDoS攻击类型和防御策略？",category:'network',difficulty:'hard',content:"DDoS分布式拒绝服务：海量傀儡机同时请求耗尽目标资源。Volumetric(流量型)：UDP/ICMP Flood填满带宽管道。Protocol(协议型)：SYN Flood耗尽半连接队列。Application(应用层)：HTTP Flood模拟正常请求耗尽应用资源。防御：CDN分散流量到全球节",answer:"DDoS分布式拒绝服务：海量傀儡机同时请求耗尽目标资源。Volumetric(流量型)：UDP/ICMP Flood填满带宽管道。Protocol(协议型)：SYN Flood耗尽半连接队列。Application(应用层)：HTTP Flood模拟正常请求耗尽应用资源。防御：CDN分散流量到全球节点、Anycast分散入口、Rate Limiting限流、Challenge-Response(CAPTCHA人机验证)、黑洞路由Null Route丢弃、专业清洗中心 Scrubbing Center流量清洗后回源。云厂商DDoS防护(阿里云DDoS/AWS Shield)。高防IP。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-24',title:"负载均衡四层L4和七层L7？算法？",category:'network',difficulty:'medium',content:"四层(L4)：传输层基于IP+port转发，LVS/F5/Nginx stream模块。七层(L7)：应用层基于HTTP内容路由，Nginx/HAProxy/Traefik。算法：RR轮询(Round Robin)、加权WRR(Weighted RR按配置比例)、最少连接LC(Least Conne",answer:"四层(L4)：传输层基于IP+port转发，LVS/F5/Nginx stream模块。七层(L7)：应用层基于HTTP内容路由，Nginx/HAProxy/Traefik。算法：RR轮询(Round Robin)、加权WRR(Weighted RR按配置比例)、最少连接LC(Least Connections分配给空闲者)、IP Hash(同一IP始终同一后端保持会话)、一致性哈希Consistent Hash(缓存节点分布均匀增删影响最小)。健康检查Health Check剔除故障节点。云SLB/ALB/NLB。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-25',title:"反向代理vs正向代理？Nginx配置？",category:'network',difficulty:'easy',content:"正向代理：客户端代理帮助客户端访问外部隐藏客户端IP(翻墙/抓包)。反向代理：服务端代理对外代表服务器隐藏内部架构提供负载均衡/缓存/SSL卸载/WAF/压缩功能。Nginx：upstream定义后端server池(weight权重backup备选max_fails失败次数fail_timeout)",answer:"正向代理：客户端代理帮助客户端访问外部隐藏客户端IP(翻墙/抓包)。反向代理：服务端代理对外代表服务器隐藏内部架构提供负载均衡/缓存/SSL卸载/WAF/压缩功能。Nginx：upstream定义后端server池(weight权重backup备选max_fails失败次数fail_timeout)。proxy_pass转发请求。location匹配规则(=精确 ^~前缀 ~正则)。gzip on压缩。ssl_certificate配置HTTPS。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-26',title:"WebSocket协议？握手帧格式？心跳？",category:'network',difficulty:'medium',content:"WS全双工通信持久连接。握手：HTTP Upgrade: websocket请求 + 101 Switching Protocols响应完成协议升级。帧格式：FIN结束标志 OPCODE操作码(0x1文本0x2二进制0x8关闭0x9心跳ping 0xA心跳pong) MASK掩码位 PAYLOAD ",answer:"WS全双工通信持久连接。握手：HTTP Upgrade: websocket请求 + 101 Switching Protocols响应完成协议升级。帧格式：FIN结束标志 OPCODE操作码(0x1文本0x2二进制0x8关闭0x9心跳ping 0xA心跳pong) MASK掩码位 PAYLOAD LENGTH载荷长度(126/127扩展) PAYLOAD载荷数据。wss://加密版本。心跳ping/pong保活检测连接存活性防止半开连接。Socket.IO封装自动重连/房间Room/ACK确认机制简化开发。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-27',title:"OAuth 2.0流程？授权码模式最安全？",category:'network',difficulty:'medium',content:"OAuth 2.0第三方授权框架四种模式：授权码Authorization Code(最安全！服务端交互token不经过浏览器可PKCE增强)、隐式Implicit(token直接返浏览器安全性差已不推荐)、客户端凭证Client Credentials(机器对机器M2M)、设备码Device Co",answer:"OAuth 2.0第三方授权框架四种模式：授权码Authorization Code(最安全！服务端交互token不经过浏览器可PKCE增强)、隐式Implicit(token直接返浏览器安全性差已不推荐)、客户端凭证Client Credentials(机器对机器M2M)、设备码Device Code(电视/打印机等无浏览器设备)。OIDC(OpenID Connect)在OAuth2.0基础上添加id_token(JWT包含用户身份信息)实现单点登录SSO。Scope权限范围控制。Refresh Token刷新Access Token延长会话无需重新授权。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-28',title:"RPC框架gRPC？Protobuf？HTTP/2优势？",category:'network',difficulty:'medium',content:"gRPC Google开源高性能RPC框架：HTTP/2 + Protobuf序列化 + IDL接口定义语言(.proto文件)。四种调用模式：Unary一元(一次请求一次响应)、Server Streaming服务端流式、Client Streaming客户端流式、Bidirectional双向流",answer:"gRPC Google开源高性能RPC框架：HTTP/2 + Protobuf序列化 + IDL接口定义语言(.proto文件)。四种调用模式：Unary一元(一次请求一次响应)、Server Streaming服务端流式、Client Streaming客户端流式、Bidirectional双向流式。Protobuf二进制序列化比JSON/XML体积小3-10倍速度快20-100倍(Varint编码/ZigZag/字段编号省空间)。HTTP/2多路复用/头部压缩/服务端推送/二进制帧提升性能。代码生成多语言支持(Java/Go/Python/C++/Node.js/Rust...)。Streaming gRPC适合实时数据推送。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-29',title:"消息队列MQ？Kafka/RabbitMQ/RocketMQ选型？",category:'network',difficulty:'medium',content:"MQ核心价值：异步解耦(削峰填谷)、可靠传输(持久化+确认机制)。Kafka：超高吞吐(百万级TPS)、分区副本分布式、消费者组、日志追加写磁盘顺序IO高效、Exactly-Once语义。适合日志收集/用户行为/流处理。RabbitMQ：AMQP协议灵活路由Exchange+Binding、可靠性高",answer:"MQ核心价值：异步解耦(削峰填谷)、可靠传输(持久化+确认机制)。Kafka：超高吞吐(百万级TPS)、分区副本分布式、消费者组、日志追加写磁盘顺序IO高效、Exactly-Once语义。适合日志收集/用户行为/流处理。RabbitMQ：AMQP协议灵活路由Exchange+Binding、可靠性高(发布确认+持久化+手动ACK)、管理UI友好。适合传统业务异步任务。RocketMQ阿里开源：事务消息(半消息机制)、定时消息(延迟等级)、Tag消息过滤、万亿级消息堆积能力。选型依据：吞吐量/可靠性/功能需求/团队熟悉度/生态。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-30',title:"微服务通信方式同步vs异步？Service Mesh？",category:'network',difficulty:'medium',content:"同步通信：HTTP/REST/gRPC实时响应但耦合等待超时复杂。异步通信：消息队列(Kafka/RabbitMQ)/事件总线(EventBus)解耦最终一致但调试追踪难延迟不确定。Service Mesh服务网格(Istio/Linkerd)：Sidecar代理模式处理通信基础设施(熔断Circu",answer:"同步通信：HTTP/REST/gRPC实时响应但耦合等待超时复杂。异步通信：消息队列(Kafka/RabbitMQ)/事件总线(EventBus)解耦最终一致但调试追踪难延迟不确定。Service Mesh服务网格(Istio/Linkerd)：Sidecar代理模式处理通信基础设施(熔断Circuit Breaker/重试Retry/超时Timeout/追踪Tracing/认证mTLS/观测性Metrics)，业务代码零侵入。Control Plane控制平面(istiod Pilot Citadel Galley) + Data Plane数据平面(Envoy Sidecar)。VirtualService路由规则 DestinationRule子集/负载均衡/熔断。降低微服务复杂度但增加运维复杂度和资源开销(Sidecar每个Pod额外消耗)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-31',title:"熔断器Circuit Breaker？降级Degradation？限流Rate Limiting？",category:'network',difficulty:'medium',content:"熔断Hystrix/Sentinel/Resilience4j：故障率达到阈值打开熔断器(Circuit Open)快速失败Fail Fast而非无限等待保护级联故障。Half-Open半开状态试探性放行少量请求判断是否恢复(Close闭合)。降级：非核心功能暂停保核心可用(返回默认值/静态页面/友",answer:"熔断Hystrix/Sentinel/Resilience4j：故障率达到阈值打开熔断器(Circuit Open)快速失败Fail Fast而非无限等待保护级联故障。Half-Open半开状态试探性放行少量请求判断是否恢复(Close闭合)。降级：非核心功能暂停保核心可用(返回默认值/静态页面/友好提示)。限流：令牌桶Token Bucket(恒定速率+突发容忍)/漏桶Leaky Bucket(匀速输出)/滑动窗口Sliding Window Log/Counter(精度更高)。Sentinel阿里开源：规则配置 Dashboard可视化、自适应限流Adaptive(自动根据系统负载调整)、热点参数限流、集群限流、授权黑白名单。维度：用户/IP/API Key/全局接口级。429 Too Many Requests + Retry-After响应头告知客户端。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-32',title:"API网关API Gateway？Kong/APISIX/Zuul？",category:'network',difficulty:'medium',content:"API Gateway统一入口职责：路由转发Routing(基于Path/Header/Query/Cookie到后端服务)、认证鉴权AuthN/AuthZ(OAuth2.0/JWT Token/API Key/HMAC签名)、协议转换Protocol Translation(gRPC<->REST",answer:"API Gateway统一入口职责：路由转发Routing(基于Path/Header/Query/Cookie到后端服务)、认证鉴权AuthN/AuthZ(OAuth2.0/JWT Token/API Key/HMAC签名)、协议转换Protocol Translation(gRPC<->REST JSON/GraphQL)、限流熔断Rate Limit & Circuit Breaker、日志监控Logging Metrics Tracing(统一RequestId串联全链路)、缓存Cache、请求响应转换Transformation、API版本管理Versioning。Kong(基于OpenResty Nginx+Lua插件生态丰富300+插件社区活跃)。APISIX(Apache基金会高性能动态路由etcd配置中心热更新)。Spring Cloud Gateway(Java Filter Chain生态)。Envoy(云原生Istio数据面)。BFF Backend for Frontend面向不同客户端(Web/iOS/Android)裁剪适配层。部署高可用多实例+前置LB。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-33',title:"服务发现Service Discovery？Consul/Eureka/Nacos/K8s？",category:'network',difficulty:'medium',content:"服务发现：服务实例启动时注册(Register)自身地址端口元数据到注册中心，下线时注销(Deregister)。消费者从注册中心发现(Discover)可用实例列表(支持健康检查Health Check剔除不健康实例)。Consul(HashiCorp)：Go编写、HTTP DNS双接口、KV存储",answer:"服务发现：服务实例启动时注册(Register)自身地址端口元数据到注册中心，下线时注销(Deregister)。消费者从注册中心发现(Discover)可用实例列表(支持健康检查Health Check剔除不健康实例)。Consul(HashiCorp)：Go编写、HTTP DNS双接口、KV存储、多数据中心支持、Watch机制实时推送变更。Eureka(Netflix)：AP模式(Availability Partition客户端缓存容忍网络分区)、自我保护模式(Self Preservation防止误剔)。Nacos(阿里)：注册+配置一体化、支持CP/AP切换、长轮询Push 1s内变更推送、MySQL/内嵌存储。Kubernetes：CoreDNS Service DNS + Endpoint + Label Selector原生服务发现。Client Side(客户端发现) vs Server Side(服务端发现/LB代理)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-34',title:"链路追踪Distributed Tracing？Jaeger/Zipkin/SkyWalking？OTel？",category:'network',difficulty:'medium',content:"分布式链路追踪：Trace(一次完整请求全程唯一ID)、Span(单个操作/调用含起止时间/标签Tags/日志Logs)、Parent-Child父子关系构建调用树(DAG)。OpenTelemetry OTel标准化规范(Trace/Metrics/Logs统一可观测性)。Jaeger(CNCF)",answer:"分布式链路追踪：Trace(一次完整请求全程唯一ID)、Span(单个操作/调用含起止时间/标签Tags/日志Logs)、Parent-Child父子关系构建调用树(DAG)。OpenTelemetry OTel标准化规范(Trace/Metrics/Logs统一可观测性)。Jaeger(CNCF)：UI友好、采样策略Sampling(概率采样/速率限制/动态)、聚合Aggregation。Zipkin(Uber开源Twitter起源)：简单易部署。SkyWalking(国产吴晟)：Agent字节码注入无侵入、APM一体化(服务拓扑/指标/告警)、支持Java/.NET/Node.js/Go。Trace Context在服务间透传(W3C TraceContext标准b3 propagator)。Span Exporter导出到后端存储(Elasticsearch/Jaeger/Zipkin)。Trace ID关联Metrics和Logs实现联动分析。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-35',title:"网络编程IO模型？阻塞/非阻塞/多路复用/信号驱动/异步IO？",category:'network',difficulty:'hard',content:"五种IO模型(Unix Network Programming)：Blocking IO阻塞IO(调用阻塞直到完成如read/write默认)。Nonblocking IO非阻塞IO(立即返回EWOULDBLOCK需轮询polling busy-wait CPU空转)。IO Multiplexing",answer:"五种IO模型(Unix Network Programming)：Blocking IO阻塞IO(调用阻塞直到完成如read/write默认)。Nonblocking IO非阻塞IO(立即返回EWOULDBLOCK需轮询polling busy-wait CPU空转)。IO Multiplexing IO多路复用(select/poll/epoll/kqueue)一个线程监听多个fd就绪事件效率最高Linux首选epoll。Signal Driven IO信号驱动IO(SIGIO信号通知数据就绪)。Asynchronous IO异步IO(aio_read aio_write POSIX AIO或io_uring Linux 5.1+)内核完成后通知应用真正的Proactor模式。Reactor反应器模式(多路复用+事件分发回调Handler)和Proactor前摄器模式(异步IO+完成分发)。Netty主从Reactor多线程模型(Boss Group accept + Worker Group IO)。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-36',title:"Zero-copy零拷贝技术？应用场景？",category:'network',difficulty:'medium',content:"传统数据拷贝路径：disk -> kernel buffer -> user buffer -> socket buffer -> NIC网卡(4次拷贝2次用户态内核态上下文切换CPU开销大)。mmap映射：disk -> kernel buffer(共享给user) -> socket buffe",answer:"传统数据拷贝路径：disk -> kernel buffer -> user buffer -> socket buffer -> NIC网卡(4次拷贝2次用户态内核态上下文切换CPU开销大)。mmap映射：disk -> kernel buffer(共享给user) -> socket buffer -> NIC(3次拷贝3次切换)。sendfile系统调用：disk -> kernel buffer -> NIC(2次拷贝2次切换 GPU DMA gather scatter I/O)。splice：两个fd间通过pipe管道传输0次拷贝到用户态(内核内核间DMA)。应用场景：Kafka(零拷贝发送消息到网卡)、Nginx静态文件sendfile on、File Channel.transferTo(Java)。节省CPU周期和内存带宽显著提升吞吐量。代价：无法对数据进行用户态处理(如加密/压缩)需传统路径。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-37',title:"TCP Fast Open？QUIC协议特点？",category:'network',difficulty:'medium',content:"TFO TCP Fast Open(RFC7413)：首次握手的SYN/SYN-ACK携带数据 payload实现0-RTT或1-RTT数据发送(减少一个RTT)。要求客户端和服务端都支持并开启fastopen选项。QUIC Quick UDP Internet Connection(Google ",answer:"TFO TCP Fast Open(RFC7413)：首次握手的SYN/SYN-ACK携带数据 payload实现0-RTT或1-RTT数据发送(减少一个RTT)。要求客户端和服务端都支持并开启fastopen选项。QUIC Quick UDP Internet Connection(Google IETF RFC9000)：基于UDP传输层协议。核心特性：0-RTT/1-RTT握手恢复连接(复用之前Connection ID避免握手)、连接迁移Connection Migration(网络WiFi切4G不断连因为基于Connection ID而非四元组)、无队头头部阻塞Head-of-Line Blocking(独立Stream流丢包只影响该流不影响其他流 unlike TCP single sequence number)、前向 secrecy Forward Secrecy(ECDHE密钥交换)。HTTP/3基于QUIC取代TCP+TLS 1.3+HTTP/2组合。Chrome/Cloudflare全面支持。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-38',title:"SDN软件定义网络？OpenFlow？VXLAN Overlay？",category:'network',difficulty:'medium',content:"SDN Software Defined Networking：控制平面Control Plane(集中式智能决策路由策略)和数据平面Data Plane(分布式傻瓜转发设备)分离。控制器Controller(ONOS/OpenDaylight)南向API Southbound(OpenFlow N",answer:"SDN Software Defined Networking：控制平面Control Plane(集中式智能决策路由策略)和数据平面Data Plane(分布式傻瓜转发设备)分离。控制器Controller(ONOS/OpenDaylight)南向API Southbound(OpenFlow Netconf P4Runtime)下发流表Flow Rule到转发设备Switch。北向API Northbound REST API供上层应用编程。OpenFlow协议：流表Flow Table(Match匹配域+Action动作+Counters计数器+Timeouts超时)匹配+执行。VXLAN Virtual Extensible LAN：Overlay虚拟扩展LAN隧道技术(UDP 4789端口封装原始Ethernet帧)解决VLAN只有4096个ID不足问题(VNI 24-bit 16M租户ID)。Underlay物理网络承载Overlay虚拟网络。云计算VPC Virtual Private Cloud常用VXLAN/Geneve。OVS Open vSwitch软件交换机支持OpenFlow VXLAN。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'net-39',title:"VPN虚拟专用网？IPSec/OpenVPN/WireGuard？Tailscale？",category:'network',difficulty:'medium',content:"VPN Virtual Private Network：加密隧道保护数据机密性和完整性穿越公共互联网。IPSec(Internet Protocol Security)：网络层协议族 AH(Authentication Header认证头无加密)+ESP(Encapsulating Security",answer:"VPN Virtual Private Network：加密隧道保护数据机密性和完整性穿越公共互联网。IPSec(Internet Protocol Security)：网络层协议族 AH(Authentication Header认证头无加密)+ESP(Encapsulating Security Payload加密载荷)+IKE(Internet Key Exchange密钥交换)。强安全但配置复杂性能开销较大(NAT-T穿透NAT)。OpenVPN：应用层SSL/TLS协议易部署社区成熟。WireGuard( Jason Donenfeld 2019)：现代内核模块级VPN协议极简(仅4000行C代码!)高性能(比OpenVPN快数倍) Curve25519 ECDH密钥交换 + ChaCha20-Poly1305 AEAD加密。ZeroTrust VPN零信任VPN：Tailscale(基于WireGuard Coordination Server协调NAT穿透+ ACL访问控制组网类似ZeroTier)。Headscale自建Coordination Server开源替代Tailscale SaaS控制平面。适合远程办公/多云互联/IoT设备安全接入。",sourceType:'builtin',source:"计算机网络面试题",tags:["计算机网络"]},{id:'db-1',title:"事务Transaction ACID特性详解？",category:'database',difficulty:'easy',content:"事务是一组操作的逻辑单元要么全部成功(COMMIT)要么全部回滚(ROLLBACK)保证数据一致性。A原子性Atomicity：不可分割的最小执行单元全部成功或全部撤销Undo Log回滚。C一致性Consistency：事务前后数据库从一个合法状态转变到另一个合法状态(满足约束/触发器/级联)。I",answer:"事务是一组操作的逻辑单元要么全部成功(COMMIT)要么全部回滚(ROLLBACK)保证数据一致性。A原子性Atomicity：不可分割的最小执行单元全部成功或全部撤销Undo Log回滚。C一致性Consistency：事务前后数据库从一个合法状态转变到另一个合法状态(满足约束/触发器/级联)。I隔离性Isolation：并发事务互不干扰(锁/MVCC)。D持久性Durability：提交后永久保存即使崩溃Redo Log恢复。BEGIN/START TRANSACTION开启 COMMIT提交 ROLLBACK回滚 SAVEPOINT设置回滚点。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-2',title:"事务隔离级别？脏读/幻读/不可重复读？",category:'database',difficulty:'medium',content:"ANSI SQL-92定义四级隔离级别(从低到高)：Read Uncommitted读未提交(可能脏读Dirty Read读到未提交数据/不可重复读Non-Repeatable Read/幻读Phantom Read)。Read Committed读已提交(Oracle/PostgreSQL/SQL",answer:"ANSI SQL-92定义四级隔离级别(从低到高)：Read Uncommitted读未提交(可能脏读Dirty Read读到未提交数据/不可重复读Non-Repeatable Read/幻读Phantom Read)。Read Committed读已提交(Oracle/PostgreSQL/SQL Server默认 防脏读 但可能不可重复读和幻读 MVCC每次语句生成新快照)。Repeatable Read可重复读(MySQL InnoDB默认 防脏读和不可重复读 但可能MVCC间隙锁Gap Lock防幻读)。Serializable串行化(最高隔离 强制串行执行 性能最差 锁开销最大)。大多数OLTP应用RC足够。InnoDB RR通过MVCC+Next-Key Lock(Record+Gap)几乎等效Serial但性能好很多。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-3',title:"MVCC多版本并发控制原理？InnoDB实现？",category:'database',difficulty:'medium',content:"MVCC Multi-Version Concurrency Control：通过维护数据多个版本(Version Chain)实现读写不冲突(读不加共享锁 读快照Snapshot)。InnoDB实现核心：Undo Log回滚日志存储旧版本数据形成版本链(roll_ptr指针指向undo log)。",answer:"MVCC Multi-Version Concurrency Control：通过维护数据多个版本(Version Chain)实现读写不冲突(读不加共享锁 读快照Snapshot)。InnoDB实现核心：Undo Log回滚日志存储旧版本数据形成版本链(roll_ptr指针指向undo log)。Read View读视图判断版本可见性(包含min_trx_id最小活跃事务ID/max_trx_id最大事务ID/m_ids列表当前活跃事务IDs)。RC级别：每条SELECT语句生成新Read View(能看到本语句启动后已提交事务更新)。RR级别：事务第一条SELECT生成Read View后续复用(只能看到事务启动前已提交数据)。优点：读写不冲突无锁高并发。缺点：额外存储空间(Undo Log膨胀需purge线程清理)、需要回滚旧版本行数多时扫描慢。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-4',title:"MySQL索引原理？B+树？聚簇索引Clustered Index？",category:'database',difficulty:'hard',content:"InnoDB引擎索引基于B+ Tree(平衡多路搜索树变种)：非叶子节点不存储Data只存Key+Pointer(扇出Fan Out高 层数Level少 通常3层即可存千万级数据 磁盘IO少)。叶子节点Leaf Node：聚簇索引(Clustered Index/主键索引 Primary Key)叶",answer:"InnoDB引擎索引基于B+ Tree(平衡多路搜索树变种)：非叶子节点不存储Data只存Key+Pointer(扇出Fan Out高 层数Level少 通常3层即可存千万级数据 磁盘IO少)。叶子节点Leaf Node：聚簇索引(Clustered Index/主键索引 Primary Key)叶子节点存储完整数据行(Data Row)即数据即索引(表数据按主键B+树组织)。二级索引Secondary Index(普通索引/非聚簇索引 Non-Clustered Index)叶子节点存储主键值(Primary Key Value)需要回表Table Lookup(Back to Clustered Index)获取完整行(覆盖索引Covering Index可避免回表提升性能)。B+树特点：范围查询Range Query优秀(叶子节点双向链表Double Linked List有序遍历)、查询稳定O(log n)。联合索引Composite Index遵循最左前缀Leftmost Prefix原则(如idx(a,b,c) 可查a/ab/abc不能单独b/c/ac/bc)。索引选择性Selectivity越高( distinct/count ratio接近1)效果越好。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-5',title:"MySQL索引优化？Explain执行计划分析？",category:'database',difficulty:'medium',content:"Explain关键字段解读优化方向：type访问类型(从优到差 system>const>eq_ref>ref>range>index>ALL 全表扫描ALL需优化建索引)。key实际使用的索引名( NULL表示没用索引 possible_keys显示可能用到的索引)。rows预估扫描行数(越小越好",answer:"Explain关键字段解读优化方向：type访问类型(从优到差 system>const>eq_ref>ref>range>index>ALL 全表扫描ALL需优化建索引)。key实际使用的索引名( NULL表示没用索引 possible_keys显示可能用到的索引)。rows预估扫描行数(越小越好)。Extra重要提示(Using filesort文件排序需优化排序Using temporary临时表需优化分组 Using index covering index覆盖索引好 Using index condition pushdown ICP索引条件下推好 Using where回表后过滤 Backward index scan逆序扫描)。优化手段：合理建索引(高选择性列/WHERE ORDER BY GROUP BY JOIN ON列)、避免SELECT *(用具体字段利用覆盖索引)、避免索引失效(函数计算/隐式转换/LIKE '%xx'/OR/NOT IN/IS NULL左列)、深分页优化(延迟关联Deferred Join/游标Cursor/书签Bookmark/覆盖索引+JOIN)。SHOW PROFILE查看各阶段耗时。Optimizer Trace深入理解优化器决策过程。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-6',title:"MySQL锁机制？行锁Row Lock/表锁Table Lock/意向锁Intention Lock？",category:'database',difficulty:'medium',content:"InnoDB锁粒度：行级锁Row-Level Lock(粒度最小并发度高但开销大)：Record Lock精确锁定索引记录行、Gap Lock间隙锁(锁索引记录间隙防插入Next-Key Lock=Record+Gap解决RR级别Phantom Read幻读问题)、Insert Intention ",answer:"InnoDB锁粒度：行级锁Row-Level Lock(粒度最小并发度高但开销大)：Record Lock精确锁定索引记录行、Gap Lock间隙锁(锁索引记录间隙防插入Next-Key Lock=Record+Gap解决RR级别Phantom Read幻读问题)、Insert Intention Lock插入意向锁。表级锁Table-Level Lock：MDL Metadata Lock( DDL操作ALTER TABLE等获取表级元数据锁 阻止并发DML导致Waiting for table metadata lock常见线上故障)、意向锁Intention Lock( IS意向共享锁 IX意向意向锁 表级快速判断是否可加行锁 兼容性矩阵)。锁算法Lock Algorithm：Record Gap Next-key。死锁Deadlock检测( innodb_deadlock_detect=ON自动检测回滚代价小的事务)和超时等待( innodb_lock_wait_timeout默认50秒)。显式锁：SELECT ... FOR UPDATE(排他锁X锁) LOCK IN SHARE MODE(共享锁S锁)。乐观锁Optimistic Locking(版本号Version/时间戳Timestamp CAS更新) vs 悲观锁Pessimistic Locking(... FOR UPDATE)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-7',title:"SQL注入原理与防护？Parameterized Query？",category:'database',difficulty:'easy',content:"SQL Injection漏洞本质：将用户输入直接拼接到SQL语句字符串中执行导致语句结构被恶意改变(Union注入/布尔盲注/时间盲注/报错注入)。经典Payload：' OR '1'='1 --。危害：数据泄露/篡改/删除/提权( xp_cmdshell)。防护黄金法则：永远使用参数化查询Pre",answer:"SQL Injection漏洞本质：将用户输入直接拼接到SQL语句字符串中执行导致语句结构被恶意改变(Union注入/布尔盲注/时间盲注/报错注入)。经典Payload：' OR '1'='1 --。危害：数据泄露/篡改/删除/提权( xp_cmdshell)。防护黄金法则：永远使用参数化查询PreparedStatement(占位符?驱动程序负责转义特殊字符和类型检查)！ORM框架Hibernate/MyBatis自动参数化( MyBatis中#{}是参数化 ${}是字符串拼接极其危险禁止用于用户输入！)。其他防线：输入验证Input Validation(白名单Whitelist优于黑名单Blacklist)、最小权限Principle of Least Privilege(应用数据库账号不给DROP GRANT FILE等高危权限)、WAF Web Application Firewall辅助检测拦截异常SQL特征模式。存储过程Stored Procedure相对安全但仍需参数化。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-8',title:"MySQL主从复制Replication原理？异步/半同步/组复制MGR？",category:'database',difficulty:'medium',content:"主从复制Master-Slave Replication核心目的：读写分离Read-Write Splitting分担读压力 + 数据备份容灾 + 离线分析不影响主库。原理：Master主库开启binlog(二进制日志 记录所有数据变更DDL DML Statement Row Mixed格式) -",answer:"主从复制Master-Slave Replication核心目的：读写分离Read-Write Splitting分担读压力 + 数据备份容灾 + 离线分析不影响主库。原理：Master主库开启binlog(二进制日志 记录所有数据变更DDL DML Statement Row Mixed格式) -> Slave从库IO Thread I/O线程拉取Master binlog写入本地Relay Log中继日志 -> Slave SQL Thread SQL线程重放Relay Log中的事件应用到本地实现数据同步。三种模式：异步复制Asynchronous Replication(默认 Master写完binlog即返回给客户端 不等待Slave确认 可能丢失最后几条事务数据)。半同步Semi-Synchronous Replication( Master等待至少一个Slave收到Relay Log并ACK确认后才返回客户端 commit latency增加1 RTT但数据更安全 loss window缩小)。组复制Group Replication MGR MySQL 5.7+(基于Paxos分布式共识协议 单主Single-Primary或多主Multi-Primary模式 基于certification-based replication 强数据一致性 几乎无数据丢失)。GTID Global Transaction Identifier替代传统file-position binlog定位( UUID:transaction_id 格式全局唯一 便于故障转移Failover)。延迟Replication Lag监控Seconds_Behind_Master(主从延迟秒数)过大原因：Slave硬件差/大事务/长查询/网络抖动/磁盘IO瓶颈。解决方案：并行复制( MTS Multi-Threaded Slave Database Parallel Replication LOGICAL_CLOCK based/ WRITE_SET based based on group commit)、SSD加速、大事务拆分。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-9',title:"Redis数据结构与应用场景？String/Hash/List/Set/ZSet？",category:'database',difficulty:'easy',content:"Redis五大基本数据结构及应用：String字符串(简单KV缓存/计数器INCR/DECR原子操作/分布式锁SETNX EX PX/限流滑动窗口)。Hash哈希(对象属性存储如用户信息Profile field-value对 节省内存比String多个key少一次序列化)。List列表( LPUS",answer:"Redis五大基本数据结构及应用：String字符串(简单KV缓存/计数器INCR/DECR原子操作/分布式锁SETNX EX PX/限流滑动窗口)。Hash哈希(对象属性存储如用户信息Profile field-value对 节省内存比String多个key少一次序列化)。List列表( LPUSH RPUSH LPOP RPOP 消息队列简单实现/最新列表 LPUSH + LTRIM保留最近N条/栈队列)。Set集合( SADD SMEMBERS SUNION SINTER SDIFF 去重/共同好友交集/标签系统/随机成员SRANDMEMBER抽奖)。ZSet有序集合Sorted Set( ZADD ZRANGE ZREVRANGE ZRANGEBYSCORE ZREM 排行榜Leaderboard/加权随机/范围查询/延时队列)。高级数据结构：HyperLogLog基数统计( PFADD PFCOUNT UV去重 12KB内存误差0.81% Bitmap位图( SETBIT GETBIT BITCOUNT BITOP 签到/用户在线状态 Bloom Filter布隆过滤器)。Stream流( XADD XREADGROUP XACK 消息队列5.0+ Consumer Group消费组)。Geospatial地理位置( GEOADD GEORADIUS GEODIST 附近的人/地点)。Bitmap位图( SETBIT GETBIT 统计)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-10',title:"Redis持久化？RDB vs AOF？混合持久化Hybrid Persistence？",category:'database',difficulty:'medium',content:"Redis两种持久化机制保障重启后数据恢复：RDB Redis DataBase Snapshot(快照)：fork()子进程在某个时刻将内存数据集快照dump到磁盘.rdb文件(二进制紧凑压缩 体积小 恢复速度快save 900 1/save 300 10/save 60 10000触发)。缺点：",answer:"Redis两种持久化机制保障重启后数据恢复：RDB Redis DataBase Snapshot(快照)：fork()子进程在某个时刻将内存数据集快照dump到磁盘.rdb文件(二进制紧凑压缩 体积小 恢复速度快save 900 1/save 300 10/save 60 10000触发)。缺点：可能丢失最后一次快照后数据( fork耗时大内存阻塞/ Copy-On-Write内存额外开销)、不支持增量备份。AOF Append Only File(追加 only 文件)：记录每条写命令(文本协议可读性好)追加到appendonly.aof文件。fsync策略appendfsync always(每秒fsync最多丢1秒数据)/everysec(每次写入fsync最安全但性能差)/no(交由OS)。缺点：文件体积远大于RDB、恢复速度慢(需重放所有命令)、AOF Rewrite重写压缩( bgrewriteaof后台fork子进程压缩去冗余命令)。混合持久化Hybrid Persistence(Redis 4.0+默认开启)：RDB头部(基础全量数据体积小恢复快) + AOF尾部(增量新命令) 兼顾体积和安全性。恢复时先加载RDB再重放AOF。生产环境建议RDB+AOF+主从+哨兵/集群多层保障。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-11',title:"Redis高可用？哨兵Sentinel vs 集群Cluster？",category:'database',difficulty:'medium',content:"Redis高可用演进：主从复制Master-Slave(异步复制 数据冗余读扩展 但手动故障转移Failover复杂且可能丢失数据)。哨兵模式Sentinel( 2.8+ 自动故障转移Failover 核心三个功能Monitoring监控(心跳PING Sentinel <-> Redis Mast",answer:"Redis高可用演进：主从复制Master-Slave(异步复制 数据冗余读扩展 但手动故障转移Failover复杂且可能丢失数据)。哨兵模式Sentinel( 2.8+ 自动故障转移Failover 核心三个功能Monitoring监控(心跳PING Sentinel <-> Redis Master/Slave)、Notification通知(故障转移通过Script通知管理员)、Automatic Failover自动故障转移(SDown主观宕机->ODown客观宕机(quorum多数派)->Vote选举Leader Sentinel->Promote Slave为新的Master->Reconfig other Slaves指向New Master->Notify Clients)。Sentinel节点本身也是分布式(奇数个>=3防Split Brain脑裂)。集群模式Cluster( 3.0+ 数据分片Sharding + 高可用 去中心化 无Proxy直连)：16384个Hash Slot槽位( CRC16(key)%16384 分配到各Master节点) -> Master-Slave主从(每个Master有Slave副本) -> Gossip Protocol八卦协议传播集群状态( Ping/Pong/Fail/Publish ) -> MOVED/ASK重定向(客户端路由到正确节点)。Cluster限制：多Key操作( MGET/MSET/SINTER等)必须在同一Slot( hashtag{}强制)、不支持多数据库空间(DB0 only)、事务有限制( Multi/Exec涉及多Key同Slot)、Pipeline支持受限。选型：数据量<单机内存上限用Sentinel够用；数据量大需水平扩展用Cluster。Proxy模式( Twemproxy/Codis/ predixy)中间件屏蔽集群细节兼容原Redis协议但引入额外延迟和单点。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-12',title:"Redis缓存穿透/击穿/雪崩？解决方案？",category:'database',difficulty:'medium',content:"三大缓存异常问题及对策：缓存缓存穿透Cache Penetration(查询一定不存在的数据如ID=-1 每次都穿透到DB)：①布隆过滤器Bloom Filter( Redis RedisBloom模块或Guava本地 过滤绝对不存在的key 零漏判有一定误判率可接受) ②缓存空值null(短TTL",answer:"三大缓存异常问题及对策：缓存缓存穿透Cache Penetration(查询一定不存在的数据如ID=-1 每次都穿透到DB)：①布隆过滤器Bloom Filter( Redis RedisBloom模块或Guava本地 过滤绝对不存在的key 零漏判有一定误判率可接受) ②缓存空值null(短TTL 30s~5min 防止频繁打DB 但浪费内存存无效数据)。缓存击穿Cache Breakdown(热点Key突然过期瞬间大量并发请求打到DB)：①互斥锁Mutex Lock( SETNX分布式锁 只让一个线程重建缓存 其他线程Sleep重试 保证一致性但吞吐下降) ②逻辑过期Logical Expiration(不设真实TTL 字段存逻辑过期时间 异步后台重建缓存 返回可能过期数据但高吞吐)。③热点数据永不过期(定时异步后台主动刷新)。缓存雪崩Cache Avalanche(大量Key同时过期或Redis宕机导致DB压力暴增)：①TTL加随机值Random TTL( base + random(0, max) 打散过期时间) ②多级缓存L1 Local(Caffeine/Guava) + L2 Distributed(Redis) ③熔断降级Circuit Breaker( 返回默认兜底数据/友好提示 保护DB不被压垮) ④限流Rate Limiting(前端+网关+Nginx+Redis Lua多级限流) ⑤Redis高可用( Sentinel/Cluster防单点故障)。综合采用多层纵深Defense in Depth策略。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-13',title:"MongoDB文档数据库特点？BSON？副本集？分片？",category:'database',difficulty:'medium',content:"MongoDB NoSQL Document-Oriented Database文档数据库特点：1.灵活Schema(无需预定义表结构 同一字段不同文档可有不同类型/缺失 新增字段只需插入即可无需ALTER TABLE) 2.嵌套文档Nested Documents/数组Arrays(减少JOIN关",answer:"MongoDB NoSQL Document-Oriented Database文档数据库特点：1.灵活Schema(无需预定义表结构 同一字段不同文档可有不同类型/缺失 新增字段只需插入即可无需ALTER TABLE) 2.嵌套文档Nested Documents/数组Arrays(减少JOIN关联查询 应用代码方便) 3.丰富的查询语言(索引Index/聚合管道Aggregation Pipeline/地理空间Geospatial/全文检索Text Search) 4.水平扩展Sharding(自动数据均衡) 5.副本集Replica Set(自动故障转移High Availability)。数据格式BSON(Binary JSON)：二进制JSON扩展 支持更多Date/Binary/ObjectId/Timestamp等原生类型 比纯文本JSON更高效(长度前缀Type Byte)。ObjectId：12字节唯一标识符(4字节timestamp + 3字节machine identifier + 2字节process id + 3字节counter 自增可近似提取时间)。副本集Replica Set架构：Primary主节点(读写) + Secondary从节点(只读可配置) + Arbiter仲裁节点(仅投票无数据 防止偶数节点平票)。Oplog(Operation Log capped collection固定大小集合)复制到从节点异步最终一致Eventual Consistency。读偏好Read Preference( primaryPreferred/secondaryPreferred/nearest)。写关注Write Concern( w majority/journal/majority确认数)。分片Sharding：Chunk数据块(默认64MB) + Shard Key分片键(基数高Cardinality/分布均匀Distribution/查询常用Query Pattern至关重要) + Shard节点( Mongos路由服务器 + Config Server配置服务器元数据存储 + Shard存储节点)。分片策略Range范围/Hash哈希(更均匀)。均衡器Balancer后台进程迁移Chunk(迁移期间有性能影响)。Jumbo Chunk超大块需手动split拆分。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-14',title:"PostgreSQL vs MySQL？PG优势场景？MVCC差异？",category:'database',difficulty:'medium',content:"PostgreSQL号称世界上最先进的开源数据库The World's Most Advanced Open Source Relational Database Object-Relational DBMS ORDBMS：优势1.SQL标准合规性极高(SQL:2011支持度最高) 2.复杂查询优化",answer:"PostgreSQL号称世界上最先进的开源数据库The World's Most Advanced Open Source Relational Database Object-Relational DBMS ORDBMS：优势1.SQL标准合规性极高(SQL:2011支持度最高) 2.复杂查询优化能力强(窗口函数Window Function/CTE Common Table Expression WITH RECURSIVE递归查询/JSONB JSON二进制存储查询/GiST GIN BRIN丰富索引类型/ FDW Foreign Data Wrapper外部数据包装器访问异构数据源) 3.可靠性极高( Write-Ahead Logging WAL预写日志 PITR Point-in-Time Recovery时间点恢复/ Hot Standby热备流复制 Logical Decoding逻辑解码CDC Change Data Capture pgoutput plugin) 4.扩展性极强(PostGIS地理空间扩展/pg_vector向量相似度搜索AI/ Citus分布式扩展/hstore/ltree等)。劣势：学习曲线陡峭/生态工具不如MySQL丰富( ORM/运维监控)/简单CRUD性能略低/更新大表需要表重写Rewrite Table( VACUUM FULL清理死亡元组回收空间 PG特色操作 需要额外磁盘空间和IO)。MVCC实现差异：InnoDB( Update-in-Place原地更新+ Undo Log旧版本 多版本共存 Roll_ptr指针链) vs PostgreSQL(Append-Only新版本写到新位置 Old/New版本共存 旧版本需VACUUM清理否则表膨胀bloat PG特色操作需定期autovacuum或手动vacuum)。事务隔离：PG的Repeatable Read真正基于快照Snapshot Isolation( Serializable级别在PG 9.1+也是基于SSI SSI Serializable Snapshot Isolation快照隔离实现 并非真正串行化 性能更好)。适用场景：复杂查询分析/ GIS地理信息系统/ 科学数据/ JSON文档/ 需要严格ACID和复杂约束的企业应用。MySQL适合简单CRUD/Web应用/电商/读多写少。两者互补共存。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-15',title:"数据库索引设计原则？什么不该建索引？",category:'database',difficulty:'medium',content:"索引设计黄金原则：1.WHERE/ORDER BY/GROUP BY/JOIN ON条件列(最常用查询条件优先) 2.高选择性High Selectivity列( distinct/count ratio越接近1越好 如UUID/手机号/邮箱 性别/布尔等低选择性列单独建索引意义不大除非复合索引前导",answer:"索引设计黄金原则：1.WHERE/ORDER BY/GROUP BY/JOIN ON条件列(最常用查询条件优先) 2.高选择性High Selectivity列( distinct/count ratio越接近1越好 如UUID/手机号/邮箱 性别/布尔等低选择性列单独建索引意义不大除非复合索引前导列) 3.区分度Distinctiveness高的列优先放在联合索引前面(最左前缀原则 Leftmost Prefix) 4.覆盖索引Covering Index( SELECT列全部包含在索引中 避免回表Back to Table Lookup 大幅提升性能 Extra: Using index) 5.小表Small Table(行数<几千) 全表扫描Sequential Scan可能比索引更快(随机IO vs 顺序IO) 不值得建索引。不该建索引的情况：①表中数据量很小(全表扫描更快) ②很少作为查询条件的列(浪费存储和维护开销) ③频繁大批量INSERT/UPDATE/DELETE的列(索引维护拖慢写入 B+树分裂合并页Page Split/Merge开销) ④区分度极低的列(如性别男/女 索引选择性太差 Cardinality低) ⑤长文本列(如TEXT/BLOB 直接索引占用巨大 考虑前缀索引Prefix Index或全文索引Full-text Index)。复合索引列顺序原则：等值查询Equality列在前、范围查询Range列在后、经常一起出现的列放一起。索引不是越多越好(占用磁盘空间/降低写入性能/优化器选择困难) 定期分析unused indexes无用索引删除。EXPLAIN ANALYZE实测验证效果。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-16',title:"数据库连接池Connection Pool原理与调优？",category:'database',difficulty:'medium',content:"连接池Purpose：数据库连接TCP三次握手+TLS认证开销大(数十毫秒级) 预先创建一批连接复用Reuse避免频繁建立Destroy和释放Release( Close归还池中而非真断开)。核心组件：空闲连接队列Idle Queue(等待被借用)、活跃连接Active Set(正在被使用中)、最大",answer:"连接池Purpose：数据库连接TCP三次握手+TLS认证开销大(数十毫秒级) 预先创建一批连接复用Reuse避免频繁建立Destroy和释放Release( Close归还池中而非真断开)。核心组件：空闲连接队列Idle Queue(等待被借用)、活跃连接Active Set(正在被使用中)、最大连接数Max Active(上限防止库被打爆)、最小空闲Min Idle(保底预热)、连接有效性校验Validation Query( borrow时ping/testOnBorrow/onReturn防止连接已被DB端关闭变成僵尸连接Stale Connection)、超时驱逐Eviction( timeBetweenEvictionRunsMillis检查间隔 minEvictableIdleTimeMillis空闲超时回收)、借出等待超时borrow timeout(排队Queue满时抛出异常或阻塞Wait)、泄漏检测Remove Abandoned(连接借出太久未归还视为泄漏强行回收 removeAbandoned=true)。主流连接池：HikariCP( Spring Boot 2.x默认 号称最快 lightweight 代码精良约130KB)、Druid(阿里巴巴 监控统计SQL FireWall防SQL注入功能强大)、C3P0(老牌较重)、Vibur(基于Java NIO异步)。调优建议：maximumPoolSize=(CPU核心数 * 2) ~ (CPU核心数 * 4)左右 根据压测实际QPS调整(观察Active峰值)。connectionTimeout连接超时( ms 借不到抛异常别让线程无限等)。idleTimeout/maxLifetime( MySQL默认wait_timeout 8h interactive_timeout 8h 连接超过此时间会被MySQL服务端断开 导致池中有僵尸连接 必须maxLifetime < MySQL wait_timeout 建议30min或更短 leakDetectionThreshold泄漏检测阈值。监控指标：active/idle/pending/waiting/total connections。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'db-17',title:"数据库容量规划Capacity Planning？估算方法？",category:'database',difficulty:'medium',content:"容量规划目标：提前预测未来N个月/年的数据量和资源需求 避免线上故障(磁盘满/性能下降)。估算公式：单行平均大小Avg Row Size(字节) * 预估总行数Estimated Total Rows + 索引空间Index Space(约占数据量20%~50%视索引数量和类型而定) + 预留增长空",answer:"容量规划目标：提前预测未来N个月/年的数据量和资源需求 避免线上故障(磁盘满/性能下降)。估算公式：单行平均大小Avg Row Size(字节) * 预估总行数Estimated Total Rows + 索引空间Index Space(约占数据量20%~50%视索引数量和类型而定) + 预留增长空间Headroom(50%~100%应对突发增长和碎片)。示例：订单表Order( 200 bytes/row * 1000万 orders = 2GB data + 1GB index ≈ 3GB total)。年增长率Yearly Growth Rate(如200%)推算未来所需空间。监控工具：information_schema.TABLES( data_length+index_length 查看各表大小)、SHOW TABLE STATUS、pt-disk-PostgreSQL pg_stat_user_tables/nodestats。告警阈值：磁盘使用率Disk Usage > 70%预警Warning > 85%紧急Critical > 95%致命Fatal(可能导致MySQL Crash无法启动InnoDB Recovery耗时极长)。扩容方案：垂直Scale Up(升级硬件CPU/内存/SSD NVMe RAID10 快速但天花板) vs 水平Scale Out(分库分表Sharding 复杂但理论上无限)。单表建议：< 2000万行( MySQL InnoDB) 或 < 单机物理内存Physical RAM能装下Hot Data热数据( Buffer Pool) 否则查询性能急剧下降(大量磁盘IO Random IO)。冷热数据分离Cold-Hot Data Separation(历史数据归档Archive到对象存储OSS/S3或冷存储库)。定期清理Delete过期数据(软删除Soft Delete标记+异步物理清理Job)。",sourceType:'builtin',source:"数据库面试题",tags:["数据库"]},{id:'network-40',title:"什么是TCP拥塞控制？基本概念和作用？",category:'network',difficulty:'easy',content:"TCP拥塞控制是计算机科学中的重要基础概念。理解TCP拥塞控制对于掌握network知识体系至关重要。它是面试中的高频考点。",answer:"什么是TCP拥塞控制？基本概念和作用？\n\n这是关于TCP拥塞控制的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-41',title:"HTTP/2多路复用的作用是什么？应用场景？",category:'network',difficulty:'easy',content:"HTTP/2多路复用在network系统中扮演着重要角色。它的主要作用是解决特定类型的问题。实际开发中经常用到。",answer:"HTTP/2多路复用的作用是什么？应用场景？\n\n这是关于HTTP/2多路复用的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-42',title:"如何配置和使用TLS 1.3握手？",category:'network',difficulty:'easy',content:"正确配置和使用TLS 1.3握手可以显著提升系统性能和开发效率。需要根据具体场景选择合适的参数和策略。",answer:"如何配置和使用TLS 1.3握手？\n\n这是关于TLS 1.3握手的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-43',title:"DNS over HTTPS有哪些优缺点？如何选择？",category:'network',difficulty:'easy',content:"DNS over HTTPS有多个实现方案或变体，各有优劣。选择时需要综合考虑性能、复杂度、兼容性和团队熟悉度。",answer:"DNS over HTTPS有哪些优缺点？如何选择？\n\n这是关于DNS over HTTPS的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-44',title:"什么是QUIC协议？基本概念和作用？",category:'network',difficulty:'easy',content:"QUIC协议是计算机科学中的重要基础概念。理解QUIC协议对于掌握network知识体系至关重要。它是面试中的高频考点。",answer:"什么是QUIC协议？基本概念和作用？\n\n这是关于QUIC协议的详细解答。作为network领域的重要知识点，深入理解它对于技术面试和实际工作都非常有帮助。",sourceType:'builtin',source:"network面试题",tags:["network"]},{id:'network-45',title:"WebSocket心跳的作用是什么？应用场景？",category:'network',difficulty:'easy',content:"WebSocket心跳在network系统中扮演着重要角色。它的主要作用是解决特定类型的问题。实际开发中经常用到。",answer:"WebSocket心跳的作用是什么？应用场景？\n\n这是 const ParseEngine={
parse(t){if(!t||!t.trim())return[];let r;r=this.parseQA(t);if(r.length)return r;r=this.parseNumbered(t);if(r.length)return r;r=this.parseMarkdown(t);if(r.length)return r;r=this.parseParagraphs(t);return r},
parseQA(t){const r=[];const re=/(?:Q[:：]|问题[:：])\s*([\s\S]+?)(?=(?:A[:：]|答案[:：]))\s*(?:A[:：]|答案[:：])\s*([\s\S]+?)(?=(?:Q[:：]|问题[:：])|$)/gi;let m;while((m=re.exec(t))!==null)r.push({title:m[1].trim().substring(0,200),answer:m[2].trim(),category:this.detectCat(m[1]+' '+m[2]),difficulty:this.detectDiff(m[1])});return r},
parseNumbered(t){const r=[];const ls=t.split('\n');let cur=null;const re=/^\s*(\d+)[.、．)\s]+(.+)/;for(const l of ls){const m=l.match(re);if(m){if(cur)r.push(cur);cur={title:m[2].trim().substring(0,200),answer:'',category:this.detectCat(m[2]),difficulty:this.detectDiff(m[2])}}else if(cur&&l.trim())cur.answer+=(cur.answer?'\n':'')+l.trim()}if(cur)r.push(cur);return r},
parseMarkdown(t){const r=[];const ps=t.split(/^(#{1,3})\s+(.+)$/m);for(let i=1;i<ps.length;i+=3){const title=ps[i+1]?.trim();const content=ps[i+2]?.trim();if(title)r.push({title:title.substring(0,200),answer:content||'',category:this.detectCat(title+' '+(content||'')),difficulty:this.detectDiff(title)})}return r},
parseParagraphs(t){const r=[];const ps=t.split(/\n{2,}/).filter(p=>p.trim());for(let i=0;i<ps.length;i+=2){const title=ps[i].trim().substring(0,200);const answer=ps[i+1]?.trim()||'';if(title.length>5)r.push({title,answer,category:this.detectCat(title+' '+answer),difficulty:this.detectDiff(title)})}return r},
detectCat(t){const s={};for(const[c,ks]of Object.entries(KEYWORD_CATEGORY_MAP)){s[c]=0;for(const k of ks)if(t.includes(k))s[c]+=1}const b=Object.entries(s).sort((a,b)=>b[1]-a[1])[0];return b[1]>0?b[0]:'algorithm'},
detectDiff(t){for(const k of DIFFICULTY_KEYWORDS.hard)if(t.includes(k))return'hard';for(const k of DIFFICULTY_KEYWORDS.easy)if(t.includes(k))return'easy';return'medium'}
};

function renderQuestions(){
const allQ=getAllQuestions(),mastered=Store.getMastered(),favorites=Store.getFavorites();
if(currentParams.category)questionFilters.category=currentParams.category;else questionFilters.category='';
let filtered=[...allQ];
if(questionFilters.category)filtered=filtered.filter(q=>q.category===questionFilters.category);
if(questionFilters.difficulty)filtered=filtered.filter(q=>q.difficulty===questionFilters.difficulty);
if(questionFilters.search){const s=questionFilters.search.toLowerCase();filtered=filtered.filter(q=>q.title.toLowerCase().includes(s)||(q.content&&q.content.toLowerCase().includes(s)))}
if(questionFilters.status==='mastered')filtered=filtered.filter(q=>mastered.includes(q.id));
else if(questionFilters.status==='unmastered')filtered=filtered.filter(q=>!mastered.includes(q.id));
else if(questionFilters.status==='favorited')filtered=filtered.filter(q=>favorites.includes(q.id));
if(questionFilters.source==='builtin')filtered=filtered.filter(q=>q.sourceType==='builtin');
else if(questionFilters.source==='collected')filtered=filtered.filter(q=>q.sourceType==='collected');
const isGrid=questionFilters.view==='grid';
const page=questionFilters.page||1;
const pageSize=questionFilters.pageSize||20;
const totalPages=Math.ceil(filtered.length/pageSize);
const paged=filtered.slice((page-1)*pageSize,page*pageSize);
const startIdx=(page-1)*pageSize;
return`<div class="search-bar"><input class="search-input" placeholder="搜索题目..." value="${questionFilters.search}" oninput="questionFilters.search=this.value;questionFilters.page=1;renderPage()"><select class="search-input" onchange="questionFilters.difficulty=this.value;questionFilters.page=1;renderPage()"><option value="">全部难度</option><option value="easy" ${questionFilters.difficulty==='easy'?'selected':''}>简单</option><option value="medium" ${questionFilters.difficulty==='medium'?'selected':''}>中等</option><option value="hard" ${questionFilters.difficulty==='hard'?'selected':''}>困难</option></select><select class="search-input" onchange="questionFilters.status=this.value;questionFilters.page=1;renderPage()"><option value="">全部状态</option><option value="mastered" ${questionFilters.status==='mastered'?'selected':''}>已掌握</option><option value="unmastered" ${questionFilters.status==='unmastered'?'selected':''}>未掌握</option><option value="favorited" ${questionFilters.status==='favorited'?'selected':''}>已收藏</option></select><select class="search-input" onchange="questionFilters.source=this.value;questionFilters.page=1;renderPage()"><option value="">全部来源</option><option value="builtin" ${questionFilters.source==='builtin'?'selected':''}>内置题</option><option value="collected" ${questionFilters.source==='collected'?'selected':''}>收录题</option></select><div class="view-toggle"><button class="${!isGrid?'active':''}" onclick="questionFilters.view='list';renderPage()">列表</button><button class="${isGrid?'active':''}" onclick="questionFilters.view='grid';renderPage()">卡片</button></div></div><div style="margin-bottom:12px;font-size:13px;color:var(--text-muted)">共 ${filtered.length} 道题目${totalPages>1?`，第 ${page}/${totalPages} 页`:''}</div>${filtered.length===0?'<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到匹配的题目</p></div>':`<div class="${isGrid?'question-grid':''}">${paged.map((q,i)=>{const im=mastered.includes(q.id),if2=favorites.includes(q.id);return`<div class="question-card" onclick="navigate('detail',{id:'${q.id}'})"><div class="q-number">${startIdx+i+1}</div><div class="q-info"><div class="q-title">${q.title}</div><div class="q-meta"><span class="difficulty-tag difficulty-${q.difficulty}">${DIFF_LABELS[q.difficulty]}</span><span class="category-tag">${CATEGORY_MAP[q.category]||q.category}</span><span class="source-badge ${q.sourceType}">${q.sourceType==='builtin'?'内置':'收录'}</span></div></div><div class="q-actions" onclick="event.stopPropagation()"><button onclick="Store.toggleFavorite('${q.id}');renderPage()" title="收藏" style="color:${if2?'var(--accent-gold)':'var(--text-muted)'}">${if2?'⭐':'☆'}</button><button onclick="Store.toggleMastered('${q.id}');renderPage()" title="掌握" style="color:${im?'var(--difficulty-easy)':'var(--text-muted)'}">${im?'✅':'⬜'}</button></div></div>`}).join('')}</div>${totalPages>1?`<div class="pagination"><button ${page<=1?'disabled':''} onclick="questionFilters.page=${page-1};renderPage()">← 上一页</button><span class="page-info">${page} / ${totalPages}</span><button ${page>=totalPages?'disabled':''} onclick="questionFilters.page=${page+1};renderPage()">下一页 →</button></div>`:''}`}`;
}

function handleBatchFile(event){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
try{
const data=JSON.parse(e.target.result);
let questions=[];
if(Array.isArray(data)){questions=data}
else if(data.questions&&Array.isArray(data.questions)){questions=data.questions}
else if(data.title){questions=[data]}
else{toast('无法识别的JSON格式','error');return}
const valid=questions.filter(q=>q.title).map(q=>({title:q.title,category:q.category||'algorithm',difficulty:q.difficulty||'medium',content:q.content||'',answer:q.answer||'',source:q.source||'文件导入'}));
if(!valid.length){toast('未找到有效题目','error');return}
const preview=document.getElementById('filePreview');
if(preview){preview.innerHTML=`<div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius);margin-bottom:12px"><div style="font-size:14px;font-weight:600;margin-bottom:8px">✅ 识别到 ${valid.length} 道题目</div>${valid.slice(0,5).map((q,i)=>`<div style="font-size:13px;color:var(--text-secondary);padding:4px 0">${i+1}. ${q.title} <span class="difficulty-tag difficulty-${q.difficulty}" style="font-size:10px">${DIFF_LABELS[q.difficulty]}</span></div>`).join('')}${valid.length>5?`<div style="font-size:12px;color:var(--text-muted);margin-top:4px">...还有 ${valid.length-5} 道题目</div>`:''}</div><button class="btn btn-orange" onclick="confirmBatchFileImport()">📥 确认导入 ${valid.length} 道题目</button>`}
window._pendingBatchImport=valid;

function fetchLeetCodeList(difficulties,count,category,preview,withDetail){
const query=`query problemsetQuestionList($categorySlug:String,$limit:Int,$skip:Int,$filters:QuestionListFilterInput){problemsetQuestionList:questionList(categorySlug:$categorySlug,limit:$limit,skip:$skip,filters:$filters){total questions{questionFrontendId title titleCn titleSlug difficulty acRate topicTags{name nameTranslated slug}}}}`;
const variables={categorySlug:"",limit:count,skip:0,filters:{difficulty:difficulties}};
fetch('https://leetcode.cn/graphql/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables})}).then(r=>r.json()).then(data=>{
const questions=data?.data?.problemsetQuestionList?.questions||[];
if(!questions.length){if(preview)preview.innerHTML='<div style="color:var(--text-muted)">未获取到题目，可能因跨域限制</div>';return}
const tagMap={'array':'algorithm','hash-table':'algorithm','linked-list':'algorithm','math':'algorithm','two-pointers':'algorithm','sliding-window':'algorithm','stack':'algorithm','queue':'algorithm','heap':'algorithm','greedy':'algorithm','dynamic-programming':'algorithm','divide-and-conquer':'algorithm','backtracking':'algorithm','tree':'algorithm','binary-tree':'algorithm','binary-search-tree':'algorithm','graph':'algorithm','depth-first-search':'algorithm','breadth-first-search':'algorithm','binary-search':'algorithm','sort':'algorithm','recursion':'algorithm','trie':'algorithm','monotonic-stack':'algorithm','bit-manipulation':'algorithm','database':'database','shell':'os','concurrency':'os','design':'system-design','javascript':'frontend','html':'frontend','css':'frontend'};
const diffMap={'EASY':'easy','MEDIUM':'medium','HARD':'hard'};
const mapped=questions.map(q=>{
const tags=q.topicTags||[];
let cat=category;
for(const tag of tags){if(tagMap[tag.slug]){cat=tagMap[tag.slug];break}}
const tagNames=tags.map(t=>t.nameTranslated||t.name).filter(Boolean);
const title=q.titleCn||q.title;
return{title:`LC${q.questionFrontendId}: ${title}`,category:cat,difficulty:diffMap[q.difficulty]||'medium',content:`LeetCode #${q.questionFrontendId}\nhttps://leetcode.cn/problems/${q.titleSlug}/\n通过率: ${(q.acRate*100).toFixed(1)}%`,answer:'',source:`LeetCode #${q.questionFrontendId}`,tags:tagNames,acRate:q.acRate?`${(q.acRate*100).toFixed(1)}%`:'',titleSlug:q.titleSlug};
});
if(withDetail&&mapped.length<=30){
fetchLeetCodeDetails(mapped,preview);
}else{
showLeetCodePreview(mapped,preview);
}
}).catch(err=>{if(preview)preview.innerHTML=`<div style="color:var(--difficulty-hard)">❌ 获取失败：${err.message}。建议使用JSON粘贴方式导入。</div>`});
}

function fetchLeetCodeDetails(questions,preview){
let completed=0;
const total=questions.length;
const detailed=[...questions];
detailed.forEach((q,i)=>{
const query=`query questionDetail($titleSlug:String!){question(titleSlug:$titleSlug){content translatedTitle translatedContent difficulty}}`;
fetch('https://leetcode.cn/graphql/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables:{titleSlug:q.titleSlug}})}).then(r=>r.json()).then(data=>{
completed++;
const detail=data?.data?.question;
if(detail){
if(detail.translatedTitle)q.title=`LC${q.title}: ${detail.translatedTitle}`;
if(detail.translatedContent){
const div=document.createElement('div');div.innerHTML=detail.translatedContent;
const text=div.textContent||div.innerText||'';
q.content=text.substring(0,500)+'...\n\n来源: LeetCode\nhttps://leetcode.cn/problems/'+q.titleSlug+'/';
}else if(detail.content){
const div=document.createElement('div');div.innerHTML=detail.content;
const text=div.textContent||div.innerText||'';
q.content=text.substring(0,500)+'...\n\n来源: LeetCode\nhttps://leetcode.cn/problems/'+q.titleSlug+'/';
}
}
if(preview)preview.innerHTML=`<div style="text-align:center;padding:12px;color:var(--text-muted)">⏳ 获取详情中... ${completed}/${total}</div>`;
if(completed===total)showLeetCodePreview(detailed,preview);
}).catch(()=>{completed++;if(completed===total)showLeetCodePreview(detailed,preview)});
});
}

function fetchLeetCodeByIds(ids,category,preview,withDetail){
let questions=[];
let completed=0;
ids.forEach(id=>{
const query=`query questionDetail($titleSlug:String!){question(titleSlug:$titleSlug){questionId questionFrontendId title titleCn titleSlug difficulty acRate topicTags{name nameTranslated slug}content translatedTitle translatedContent}}`;
fetch('https://leetcode.cn/graphql/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables:{titleSlug:String(id)}})}).then(r=>r.json()).then(data=>{
completed++;
const q=data?.data?.question;
if(q){
const diffMap={'Easy':'easy','Medium':'medium','Hard':'hard'};
const tags=q.topicTags||[];
const tagNames=tags.map(t=>t.nameTranslated||t.name).filter(Boolean);
const title=q.translatedTitle||q.titleCn||q.title;
let content=`LeetCode #${q.questionFrontendId}\nhttps://leetcode.cn/problems/${q.titleSlug}/`;
if(q.acRate)content+=`\n通过率: ${(q.acRate*100).toFixed(1)}%`;
if(withDetail&&(q.translatedContent||q.content)){
const div=document.createElement('div');div.innerHTML=q.translatedContent||q.content;
const text=div.textContent||div.innerText||'';
content=text.substring(0,500)+'...\n\n'+content;
}
questions.push({title:`LC${q.questionFrontendId}: ${title}`,category,difficulty:diffMap[q.difficulty]||'medium',content,answer:'',source:`LeetCode #${q.questionFrontendId}`,tags:tagNames,acRate:q.acRate?`${(q.acRate*100).toFixed(1)}%`:'',titleSlug:q.titleSlug});
}
if(preview)preview.innerHTML=`<div style="text-align:center;padding:12px;color:var(--text-muted)">⏳ 获取详情中... ${completed}/${ids.length}</div>`;
if(completed===ids.length)showLeetCodePreview(questions,preview);
}).catch(()=>{completed++;if(completed===ids.length)showLeetCodePreview(questions,preview)});
});
}

function fetchFromGitHub(category,preview){
const repo=document.getElementById('lcRepo')?.value||'azl397985856/leetcode';
const url=`https://raw.githubusercontent.com/${repo}/master/README.md`;
fetch(url).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}).then(md=>{
const problems=[];
const lcRegex=/\[(\d+)\.\s*([^\]]+)\]\(https:\/\/leetcode\.cn\/problems\/([^\/]+)\/?\)/g;
let match;
while((match=lcRegex.exec(md))!==null){
const num=match[1],title=match[2],slug=match[3];
problems.push({title:`LC${num}: ${title}`,category,difficulty:'medium',content:`LeetCode #${num}\nhttps://leetcode.cn/problems/${slug}/`,answer:'',source:`GitHub: ${repo}`,tags:[],titleSlug:slug});
}
if(!problems.length){
const simpleRegex=/##\s*(\d+)\.\s*([^\n]+)/g;
while((match=simpleRegex.exec(md))!==null){
const num=match[1],title=match[2].trim();
if(title.length>2&&title.length<100){
problems.push({title:`#${num}: ${title}`,category,difficulty:'medium',content:`来源: ${repo}`,answer:'',source:`GitHub: ${repo}`,tags:[]});
}
}
}
if(!problems.length){
if(preview)preview.innerHTML=`<div style="color:var(--text-muted)">未能从该仓库解析出题目。该仓库可能使用了不同的格式。</div>`;
return;
}
const limited=problems.slice(0,100);
if(problems.length>100&&preview){
preview.innerHTML=`<div style="font-size:12px;color:var(--accent-gold);margin-bottom:8px">⚠️ 发现 ${problems.length} 道题目，仅展示前 100 道</div>`;
}
showLeetCodePreview(limited,preview);
}).catch(err=>{
if(preview)preview.innerHTML=`<div style="color:var(--difficulty-hard)">❌ 获取失败：${err.message}。GitHub 仓库可能不存在或网络受限。</div><div style="font-size:12px;color:var(--text-muted);margin-top:8px">💡 建议：手动下载仓库 README，使用"文件上传"方式导入</div>`;
});
}

let chain=Promise.resolve();
sources.forEach(src=>{

return`<div class="stat-grid"><div class="stat-card"><div class="stat-number">${allQ.length}</div><div class="stat-label">总题数</div></div><div class="stat-card"><div class="stat-number">${mastered.length}</div><div class="stat-label">已掌握</div></div><div class="stat-card"><div class="stat-number">${totalPct}%</div><div class="stat-label">掌握率</div></div><div class="stat-card"><div class="stat-number">${streak}</div><div class="stat-label">连续打卡</div></div></div><div class="card"><h3 style="margin-bottom:16px">🏆 成就徽章 <span style="color:var(--text-muted);font-size:13px;font-weight:400">（${achievements.length}/${achievementDefs.length}）</span></h3><div class="achievement-grid">${achievementDefs.map(def=>{const unlocked=achievements.find(a=>a.id===def.id);return`<div class="achievement-card ${unlocked?'unlocked':'locked'}"><span class="achievement-icon">${unlocked?def.icon:'🔒'}</span><div class="achievement-name">${def.name}</div><div class="achievement-desc">${def.desc}</div>${unlocked?`<div class="achievement-date">${new Date(unlocked.unlockedAt).toLocaleDateString()}</div>`:''}</div>`}).join('')}</div></div><div style="display:flex;gap:24px;flex-wrap:wrap"><div class="card" style="flex:2;min-width:400px"><h3 style="margin-bottom:16px">📊 分类掌握进度</h3><div class="bar-chart">${catStats.map(c=>`<div class="bar-item"><div class="bar-value">${c.pct}%</div><div class="bar" style="height:${c.total?c.mastered/c.total*100:0}%"></div><div class="bar-label">${c.icon}<br>${c.name.substring(0,4)}</div></div>`).join('')}</div></div><div class="card" style="flex:1;min-width:200px"><h3 style="margin-bottom:16px">🎯 总体掌握率</h3><div style="display:flex;justify-content:center"><div class="ring-chart" style="background:conic-gradient(var(--accent-cyan) 0% ${totalPct}%, var(--bg-tertiary) ${totalPct}% 100%)"><div class="ring-center" style="width:120px;height:120px;border-radius:50%;background:var(--bg-secondary);display:flex;flex-direction:column;align-items:center;justify-content:center"><div class="ring-value">${totalPct}%</div><div class="ring-label">掌握率</div></div></div></div></div></div><div class="card"><h3 style="margin-bottom:16px">📅 打卡日历（最近30天）</h3><div class="checkin-calendar"><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">日</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">一</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">二</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">三</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">四</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">五</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">六</div>${calDays.map(d=>{const ds=d.toDateString();const isToday=ds===today.toDateString();const isChecked=checkins.includes(ds);return`<div class="calendar-cell ${isChecked?'checked':''} ${isToday?'today':''}">${d.getDate()}</div>`}).join('')}</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><span style="font-size:13px;color:var(--text-muted)">已打卡 ${checkins.length} 天 · 连续 ${streak} 天</span><button class="btn btn-primary btn-sm" onclick="Store.checkin();renderPage()">✅ 今日打卡</button></div></div><div class="card"><h3 style="margin-bottom:16px">💾 数据管理</h3><div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-outline" onclick="exportData()">📤 导出数据</button><label class="btn btn-outline" style="cursor:pointer">📥 导入数据<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label><button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑️ 清除数据</button></div></div>`;
}

function renderPractice(){
const mode=currentParams.mode||'daily';
const allQ=getAllQuestions(),mastered=Store.getMastered();
let questions=[];
if(mode==='daily'){
const today=new Date().toDateString(),seed=today.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
questions=[allQ[seed%allQ.length]];
}else if(mode==='category'){
const cat=currentParams.category||'algorithm';
questions=allQ.filter(q=>q.category===cat&&!mastered.includes(q.id));
if(!questions.length)questions=allQ.filter(q=>q.category===cat);
}else if(mode==='random'){
const unmastered=allQ.filter(q=>!mastered.includes(q.id));
if(unmastered.length){const shuffled=[...unmastered].sort(()=>Math.random()-.5);questions=shuffled.slice(0,10)}
else{questions=[...allQ].sort(()=>Math.random()-.5).slice(0,10)}
}
const modeLabels={daily:'🎯 每日一题',category:'📖 专项练习',random:'🎲 随机刷题'};
return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-outline btn-sm" onclick="navigate('dashboard')">← 返回首页</button><h2>${modeLabels[mode]||'刷题'}</h2>${mode==='category'?`<select class="search-input" style="min-width:140px" onchange="currentParams.category=this.value;renderPage()">${CATEGORIES.map(c=>`<option value="${c.id}" ${currentParams.category===c.id?'selected':''}>${c.name}</option>`).join('')}</select>`:''}</div>${questions.length===0?'<div class="empty-state"><div class="empty-icon">🎉</div><p>恭喜！该分类已全部掌握</p></div>':questions.map((q,i)=>{const im=mastered.includes(q.id);return`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><span style="font-size:18px;font-weight:700;color:var(--text-muted)">#${i+1}</span><span class="difficulty-tag difficulty-${q.difficulty}">${DIFF_LABELS[q.difficulty]}</span><span class="category-tag">${CATEGORY_MAP[q.category]||q.category}</span></div><h3 style="margin-bottom:12px;cursor:pointer" onclick="navigate('detail',{id:'${q.id}'})">${q.title}</h3><div class="detail-content" style="margin-bottom:12px">${(q.content||'').substring(0,200)}${(q.content||'').length>200?'...':''}</div><div style="display:flex;gap:8px"><button class="btn ${im?'btn-success':'btn-outline'} btn-sm" onclick="Store.toggleMastered('${q.id}');renderPage()">${im?'✅ 已掌握':'⬜ 标记掌握'}</button><button class="btn btn-outline btn-sm" onclick="navigate('detail',{id:'${q.id}'})">查看详情 →</button></div></div>`}).join('')}`;
}

function toast(msg,type='info'){
const c=document.getElementById('toastContainer');
const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;
c.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function toggleTheme(){
const current=Store.getTheme();
const next=current==='dark'?'light':'dark';
Store.setTheme(next);
document.documentElement.setAttribute('data-theme',next);
document.querySelector('.theme-toggle').textContent=next==='dark'?'🌙':'☀️';
}

function toggleSidebar(){
const s=document.getElementById('sidebar');
const o=document.getElementById('sidebarOverlay');
s.classList.toggle('open-mobile');
o.classList.toggle('show');
}
function closeSidebar(){
document.getElementById('sidebar').classList.remove('open-mobile');
document.getElementById('sidebarOverlay').classList.remove('show');
}

function setupKeyboardHints(){
const hint=document.getElementById('keyboardHint');
const fab=document.getElementById('helpFab');
hint.classList.toggle('show',currentPage==='detail');
fab.classList.toggle('show',currentPage==='detail');
setupMobileBar();
}

function setupMobileBar(){
const bar=document.getElementById('mobileBar');
if(!bar)return;
if(currentPage==='detail'){
const allQ=getAllQuestions();
const q=allQ.find(q=>q.id===currentParams.id);
if(!q){bar.innerHTML='';return}
const mastered=Store.getMastered(),favorites=Store.getFavorites();
const im=mastered.includes(q.id),if2=favorites.includes(q.id);
const idx=allQ.findIndex(item=>item.id===q.id);
bar.innerHTML=`<button onclick="if(${idx}>0)navigate('detail',{id:'${allQ[idx-1]?.id}'})"><span class="bar-icon">⬅️</span><span class="bar-label">上一题</span></button><button onclick="Store.toggleMastered('${q.id}');renderPage()"><span class="bar-icon">${im?'✅':'⬜'}</span><span class="bar-label">${im?'已掌握':'掌握'}</span></button><button onclick="toggleAnswer()"><span class="bar-icon">📖</span><span class="bar-label">答案</span></button><button onclick="Store.toggleFavorite('${q.id}');renderPage()"><span class="bar-icon">${if2?'⭐':'☆'}</span><span class="bar-label">${if2?'已收藏':'收藏'}</span></button><button onclick="if(${idx}<allQ.length-1)navigate('detail',{id:'${allQ[idx+1]?.id}'})"><span class="bar-icon">➡️</span><span class="bar-label">下一题</span></button>`;
}else if(currentPage==='questions'){
bar.innerHTML=`<button onclick="navigate('dashboard')"><span class="bar-icon">🏠</span><span class="bar-label">首页</span></button><button onclick="navigate('questions')"><span class="bar-icon">📚</span><span class="bar-label">题库</span></button><button onclick="navigate('practice',{mode:'random'})"><span class="bar-icon">🎲</span><span class="bar-label">随机</span></button><button onclick="navigate('collect')"><span class="bar-icon">📥</span><span class="bar-label">收录</span></button><button onclick="navigate('stats')"><span class="bar-icon">📊</span><span class="bar-label">统计</span></button>`;
}else{
bar.innerHTML=`<button onclick="navigate('dashboard')"><span class="bar-icon">🏠</span><span class="bar-label">首页</span></button><button onclick="navigate('questions')"><span class="bar-icon">📚</span><span class="bar-label">题库</span></button><button onclick="navigate('practice',{mode:'daily'})"><span class="bar-icon">🎯</span><span class="bar-label">每日</span></button><button onclick="navigate('collect')"><span class="bar-icon">📥</span><span class="bar-label">收录</span></button><button onclick="navigate('stats')"><span class="bar-icon">📊</span><span class="bar-label">统计</span></button>`;
}
}

function showKeyboardHelp(){
const overlay=document.createElement('div');
overlay.className='guide-overlay';
overlay.id='kbHelpOverlay';
overlay.innerHTML=`<div class="guide-content" style="max-width:400px"><h2>⌨️ 快捷键指南</h2><div style="text-align:left;margin-top:20px"><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">下一题</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">J</kbd> / <kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">↓</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">上一题</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">K</kbd> / <kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">↑</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">展开/收起答案</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">Enter</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">收藏/取消收藏</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">F</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">标记掌握</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">M</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0"><span style="color:var(--text-secondary)">返回题库</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">Esc</kbd></span></div></div><p style="color:var(--text-muted);font-size:12px;margin-top:16px">提示：在输入框中输入时快捷键自动禁用</p><button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="document.getElementById('kbHelpOverlay').remove()">知道了</button></div>`;
document.body.appendChild(overlay);
}

document.addEventListener('keydown',function(e){
if(currentPage!=='detail')return;
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
if(e.ctrlKey||e.metaKey||e.altKey)return;
const allQ=getAllQuestions();
const q=allQ.find(q=>q.id===currentParams.id);
if(!q)return;
const idx=allQ.findIndex(item=>item.id===q.id);
if(e.key==='j'||e.key==='ArrowDown'){
e.preventDefault();const nextQ=idx<allQ.length-1?allQ[idx+1]:null;
if(nextQ)navigate('detail',{id:nextQ.id});
}else if(e.key==='k'||e.key==='ArrowUp'){
e.preventDefault();const prevQ=idx>0?allQ[idx-1]:null;
if(prevQ)navigate('detail',{id:prevQ.id});
}else if(e.key==='Enter'){
e.preventDefault();toggleAnswer();
}else if(e.key==='f'){
Store.toggleFavorite(q.id);renderPage();
}else if(e.key==='m'){
Store.toggleMastered(q.id);renderPage();
}else if(e.key==='Escape'){
navigate('questions');
}
});

function exportData(){
const data={
mastered:Store.getMastered(),
favorites:Store.getFavorites(),
collected:Store.getCollected(),
checkins:Store.getCheckins(),
sources:Store.getSources(),
exportDate:new Date().toISOString()
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='codeinterview-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
URL.revokeObjectURL(url);toast('数据已导出','success');
}

function importData(event){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
try{
const data=JSON.parse(e.target.result);
if(data.mastered)Store.setMastered(data.mastered);
if(data.favorites)Store.setFavorites(data.favorites);
if(data.collected)Store.setCollected(data.collected);
if(data.checkins)Store.setCheckins(data.checkins);
if(data.sources)Store.setSources(data.sources);
toast('数据导入成功！','success');renderPage();
}catch(err){toast('导入失败：'+err.message,'error')}
};
reader.readAsText(file);
event.target.value='';
}

function clearAllData(){
if(!confirm('确定要清除所有数据吗？此操作不可恢复！'))return;
const keys=Object.keys(localStorage).filter(k=>k.startsWith('ci_'));
keys.forEach(k=>localStorage.removeItem(k));
Store._cache={};
toast('数据已清除','success');renderPage();
}

function init(){
const theme=Store.getTheme();
document.documentElement.setAttribute('data-theme',theme);
document.querySelector('.theme-toggle').textContent=theme==='dark'?'🌙':'☀️';
parseHash();renderPage();
const mastered=Store.getMastered();
if(mastered.length>0&&!Store.get('lastBackupReminder',null)){
const lastReminder=Store.get('lastBackupReminder','');
const now=new Date().toISOString().slice(0,7);
if(lastReminder!==now){
Store.set('lastBackupReminder',now);
setTimeout(()=>toast('💡 提示：定期导出数据可防止丢失，点击统计页面的"导出数据"按钮','info'),3000);
}
}
}

init();
</script>
</body>
</html>
