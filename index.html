function fetchLeetCodeProblems(){
const mode=document.getElementById('lcMode')?.value;
const category=document.getElementById('lcCategory')?.value||'algorithm';
const preview=document.getElementById('lcPreview');
if(preview)preview.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted)">⏳ 正在从 LeetCode 获取题目...</div>';
if(mode==='ids'){
const idsStr=document.getElementById('lcIds')?.value||'';
const ids=idsStr.split(',').map(s=>s.trim()).filter(Boolean).map(Number).filter(n=>n>0);
if(!ids.length){toast('请输入有效的题号','error');return}
fetchLeetCodeByIds(ids,category,preview);
}else{
const easy=document.getElementById('lcEasy')?.checked;
const medium=document.getElementById('lcMedium')?.checked;
const hard=document.getElementById('lcHard')?.checked;
const count=parseInt(document.getElementById('lcCount')?.value)||20;
const difficulties=[];
if(easy)difficulties.push('EASY');
if(medium)difficulties.push('MEDIUM');
if(hard)difficulties.push('HARD');
if(!difficulties.length){toast('请至少选择一个难度','error');return}
fetchLeetCodeList(difficulties,count,category,preview);
}
}

function fetchLeetCodeList(difficulties,count,category,preview){
const query=`query problemsetQuestionList($categorySlug:String,$limit:Int,$skip:Int,$filters:QuestionListFilterInput){problemsetQuestionList:questionList(categorySlug:$categorySlug,limit:$limit,skip:$skip,filters:$filters){total questions{title titleSlug difficulty topicTags{name slug}}}}`;
const variables={categorySlug:"",limit:count,skip:0,filters:{difficulty:difficulties}};
fetch('https://leetcode.cn/graphql/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables})}).then(r=>r.json()).then(data=>{
const questions=data?.data?.problemsetQuestionList?.questions||[];
if(!questions.length){if(preview)preview.innerHTML='<div style="color:var(--text-muted)">未获取到题目，可能因跨域限制</div>';return}
const tagMap={'array':'algorithm','hash-table':'algorithm','linked-list':'algorithm','math':'algorithm','two-pointers':'algorithm','sliding-window':'algorithm','stack':'algorithm','queue':'algorithm','heap':'algorithm','greedy':'algorithm','dynamic-programming':'algorithm','divide-and-conquer':'algorithm','backtracking':'algorithm','tree':'algorithm','binary-tree':'algorithm','binary-search-tree':'algorithm','graph':'algorithm','depth-first-search':'algorithm','breadth-first-search':'algorithm','binary-search':'algorithm','sort':'algorithm','recursion':'algorithm','trie':'algorithm','monotonic-stack':'algorithm','bit-manipulation':'algorithm','database':'database','shell':'os','concurrency':'os','design':'system-design','javascript':'frontend','html':'frontend','css':'frontend'};
const mapped=questions.map(q=>{
const diffMap={'EASY':'easy','MEDIUM':'medium','HARD':'hard'};
const tags=q.topicTags||[];
let cat=category;
for(const tag of tags){if(tagMap[tag.slug]){cat=tagMap[tag.slug];break}}
return{title:`LC-${q.titleSlug.replace(/-/g,' ')}: ${q.title}`,category:cat,difficulty:diffMap[q.difficulty]||'medium',content:`来源：LeetCode ${q.titleSlug}\nhttps://leetcode.cn/problems/${q.titleSlug}/`,answer:'',source:`LeetCode: ${q.titleSlug}`};
});
showLeetCodePreview(mapped,preview);
}).catch(err=>{if(preview)preview.innerHTML=`<div style="color:var(--difficulty-hard)">❌ 获取失败：${err.message}。建议使用JSON粘贴方式导入。</div>`});
}

function fetchLeetCodeByIds(ids,category,preview){
let questions=[];
let completed=0;
ids.forEach(id=>{
const query=`query questionDetail($titleSlug:String){question(titleSlug:$titleSlug){questionId title titleSlug difficulty topicTags{name slug}}}`;
fetch('https://leetcode.cn/graphql/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables:{titleSlug:String(id)}})}).then(r=>r.json()).then(data=>{
completed++;
const q=data?.data?.question;
if(q){
const diffMap={'Easy':'easy','Medium':'medium','Hard':'hard'};
questions.push({title:`LC-${q.questionId}: ${q.title}`,category,difficulty:diffMap[q.difficulty]||'medium',content:`来源：LeetCode #${q.questionId}\nhttps://leetcode.cn/problems/${q.titleSlug}/`,answer:'',source:`LeetCode #${q.questionId}`});
}
if(completed===ids.length)showLeetCodePreview(questions,preview);
}).catch(()=>{completed++;if(completed===ids.length)showLeetCodePreview(questions,preview)});
});
}

function showLeetCodePreview(questions,preview){
if(!preview)return;
if(!questions.length){preview.innerHTML='<div style="color:var(--text-muted)">未获取到题目</div>';return}
preview.innerHTML=`<div style="padding:12px;background:var(--bg-primary);border-radius:var(--radius);margin-bottom:12px"><div style="font-size:14px;font-weight:600;margin-bottom:8px">✅ 获取到 ${questions.length} 道题目</div><div style="max-height:300px;overflow-y:auto">${questions.map((q,i)=>`<div style="font-size:13px;color:var(--text-secondary);padding:4px 0;border-bottom:1px solid var(--border-color)">${i+1}. ${q.title} <span class="difficulty-tag difficulty-${q.difficulty}" style="font-size:10px">${DIFF_LABELS[q.difficulty]}</span></div>`).join('')}</div></div><button class="btn btn-orange" onclick="confirmLeetCodeImport()">📥 确认导入 ${questions.length} 道题目</button>`;
window._pendingLcImport=questions;
}

function refreshAllSources(){
const sources=Store.getSources();
if(!sources.length){toast('暂无题源','error');return}
toast('正在刷新全部题源...','info');
let allResults=[];
let chain=Promise.resolve();
sources.forEach(src=>{
chain=chain.then(()=>fetch(src.url).then(r=>r.text()).then(t=>{
allResults=allResults.concat(ParseEngine.parse(t));
}).catch(()=>{}));
});
chain.then(()=>{

parsedResults=allResults;collectTab=1;
toast(`共识别到 ${allResults.length} 道题目，请查看预览`,'success');renderPage();
});
}

const checkins=Store.getCheckins();
const streak=Store.getStreak();

{id:'fifty-questions',name:'渐入佳境',icon:'🎯',desc:'掌握50道题目'},
{id:'hundred-questions',name:'题海无涯',icon:'🏆',desc:'掌握100道题目'},
{id:'streak-3',name:'三日坚持',icon:'🔥',desc:'连续打卡3天'},

{id:'streak-30',name:'月度达人',icon:'👑',desc:'连续打卡30天'},
{id:'collector',name:'收藏家',icon:'📚',desc:'收藏10道题目'},
{id:'contributor',name:'贡献者',icon:'🤝',desc:'收录5道题目'},

ass="ring-value">${totalPct}%</div><div class="ring-label">掌握率</div></div></div></div></div></div><div class="card"><h3 style="margin-bottom:16px">📅 打卡日历（最近30天）</h3><div class="checkin-calendar"><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">日</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">一</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">二</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">三</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">四</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">五</div><div class="calendar-cell" style="color:var(--text-muted);font-weight:600">六</div>${calDays.map(d=>{const ds=d.toDateString();const isToday=ds===today.toDateString();const isChecked=checkins.includes(ds);return`<div class="calendar-cell ${isChecked?'checked':''} ${isToday?'today':''}">${d.getDate()}</div>`}).join('')}</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><span style="font-size:13px;color:var(--text-muted)">已打卡 ${checkins.length} 天 · 连续 ${streak} 天</span><button class="btn btn-primary btn-sm" onclick="Store.checkin();renderPage()">✅ 今日打卡</button></div></div><div class="card"><h3 style="margin-bottom:16px">💾 数据管理</h3><div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-outline" onclick="exportData()">📤 导出数据</button><label class="btn btn-outline" style="cursor:pointer">📥 导入数据<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label><button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑️ 清除数据</button></div></div>`;

function renderPractice(){
const mode=currentParams.mode||'daily';
const allQ=getAllQuestions(),mastered=Store.getMastered();
let questions=[];
if(mode==='daily'){
const today=new Date().toDateString(),seed=today.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
questions=[allQ[seed%allQ.length]];
}else if(mode==='category'){
const cat=currentParams.category||'algorithm';
questions=allQ.filter(q=>q.category===cat&&!mastered.includes(q.id));
if(!questions.length)questions=allQ.filter(q=>q.category===cat);
}else if(mode==='random'){
const unmastered=allQ.filter(q=>!mastered.includes(q.id));
if(unmastered.length){const shuffled=[...unmastered].sort(()=>Math.random()-.5);questions=shuffled.slice(0,10)}
else{questions=[...allQ].sort(()=>Math.random()-.5).slice(0,10)}
}
const modeLabels={daily:'🎯 每日一题',category:'📖 专项练习',random:'🎲 随机刷题'};
return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-outline btn-sm" onclick="navigate('dashboard')">← 返回首页</button><h2>${modeLabels[mode]||'刷题'}</h2>${mode==='category'?`<select class="search-input" style="min-width:140px" onchange="currentParams.category=this.value;renderPage()">${CATEGORIES.map(c=>`<option value="${c.id}" ${currentParams.category===c.id?'selected':''}>${c.name}</option>`).join('')}</select>`:''}</div>${questions.length===0?'<div class="empty-state"><div class="empty-icon">🎉</div><p>恭喜！该分类已全部掌握</p></div>':questions.map((q,i)=>{const im=mastered.includes(q.id);return`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><span style="font-size:18px;font-weight:700;color:var(--text-muted)">#${i+1}</span><span class="difficulty-tag difficulty-${q.difficulty}">${DIFF_LABELS[q.difficulty]}</span><span class="category-tag">${CATEGORY_MAP[q.category]||q.category}</span></div><h3 style="margin-bottom:12px;cursor:pointer" onclick="navigate('detail',{id:'${q.id}'})">${q.title}</h3><div class="detail-content" style="margin-bottom:12px">${(q.content||'').substring(0,200)}${(q.content||'').length>200?'...':''}</div><div style="display:flex;gap:8px"><button class="btn ${im?'btn-success':'btn-outline'} btn-sm" onclick="Store.toggleMastered('${q.id}');renderPage()">${im?'✅ 已掌握':'⬜ 标记掌握'}</button><button class="btn btn-outline btn-sm" onclick="navigate('detail',{id:'${q.id}'})">查看详情 →</button></div></div>`}).join('')}`;
}

function toast(msg,type='info'){
const c=document.getElementById('toastContainer');
const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;
c.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function toggleTheme(){
const current=Store.getTheme();
const next=current==='dark'?'light':'dark';
Store.setTheme(next);
document.documentElement.setAttribute('data-theme',next);
document.querySelector('.theme-toggle').textContent=next==='dark'?'🌙':'☀️';
}

s.classList.toggle('open-mobile');
o.classList.toggle('show');
}
function closeSidebar(){

}

function setupKeyboardHints(){

fab.classList.toggle('show',currentPage==='detail');

const allQ=getAllQuestions();

if(!q){bar.innerHTML='';return}
const mastered=Store.getMastered(),favorites=Store.getFavorites();
const im=mastered.includes(q.id),if2=favorites.includes(q.id);
const idx=allQ.findIndex(item=>item.id===q.id);
bar.innerHTML=`<button onclick="if(${idx}>0)navigate('detail',{id:'${allQ[idx-1]?.id}'})"><span class="bar-icon">⬅️</span><span class="bar-label">上一题</span></button><button onclick="Store.toggleMastered('${q.id}');renderPage()"><span class="bar-icon">${im?'✅':'⬜'}</span><span class="bar-label">${im?'已掌握':'掌握'}</span></button><button onclick="toggleAnswer()"><span class="bar-icon">📖</span><span class="bar-label">答案</span></button><button onclick="Store.toggleFavorite('${q.id}');renderPage()"><span class="bar-icon">${if2?'⭐':'☆'}</span><span class="bar-label">${if2?'已收藏':'收藏'}</span></button><button onclick="if(${idx}<allQ.length-1)navigate('detail',{id:'${allQ[idx+1]?.id}'})"><span class="bar-icon">➡️</span><span class="bar-label">下一题</span></button>`;
}else if(currentPage==='questions'){
bar.innerHTML=`<button onclick="navigate('dashboard')"><span class="bar-icon">🏠</span><span class="bar-label">首页</span></button><button onclick="navigate('questions')"><span class="bar-icon">📚</span><span class="bar-label">题库</span></button><button onclick="navigate('practice',{mode:'random'})"><span class="bar-icon">🎲</span><span class="bar-label">随机</span></button><button onclick="navigate('collect')"><span class="bar-icon">📥</span><span class="bar-label">收录</span></button><button onclick="navigate('stats')"><span class="bar-icon">📊</span><span class="bar-label">统计</span></button>`;
}else{
bar.innerHTML=`<button onclick="navigate('dashboard')"><span class="bar-icon">🏠</span><span class="bar-label">首页</span></button><button onclick="navigate('questions')"><span class="bar-icon">📚</span><span class="bar-label">题库</span></button><button onclick="navigate('practice',{mode:'daily'})"><span class="bar-icon">🎯</span><span class="bar-label">每日</span></button><button onclick="navigate('collect')"><span class="bar-icon">📥</span><span class="bar-label">收录</span></button><button onclick="navigate('stats')"><span class="bar-icon">📊</span><span class="bar-label">统计</span></button>`;
}
}

function showKeyboardHelp(){
const overlay=document.createElement('div');
overlay.className='guide-overlay';
overlay.id='kbHelpOverlay';
overlay.innerHTML=`<div class="guide-content" style="max-width:400px"><h2>⌨️ 快捷键指南</h2><div style="text-align:left;margin-top:20px"><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">下一题</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">J</kbd> / <kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">↓</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">上一题</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">K</kbd> / <kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">↑</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">展开/收起答案</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">Enter</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">收藏/取消收藏</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">F</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-secondary)">标记掌握</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">M</kbd></span></div><div style="display:flex;justify-content:space-between;padding:12px 0"><span style="color:var(--text-secondary)">返回题库</span><span><kbd style="background:var(--bg-tertiary);padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace">Esc</kbd></span></div></div><p style="color:var(--text-muted);font-size:12px;margin-top:16px">提示：在输入框中输入时快捷键自动禁用</p><button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="document.getElementById('kbHelpOverlay').remove()">知道了</button></div>`;
document.body.appendChild(overlay);
}

document.addEventListener('keydown',function(e){
if(currentPage!=='detail')return;
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
if(e.ctrlKey||e.metaKey||e.altKey)return;
const allQ=getAllQuestions();
const q=allQ.find(q=>q.id===currentParams.id);
if(!q)return;
const idx=allQ.findIndex(item=>item.id===q.id);
if(e.key==='j'||e.key==='ArrowDown'){
e.preventDefault();const nextQ=idx<allQ.length-1?allQ[idx+1]:null;
if(nextQ)navigate('detail',{id:nextQ.id});
}else if(e.key==='k'||e.key==='ArrowUp'){
e.preventDefault();const prevQ=idx>0?allQ[idx-1]:null;
if(prevQ)navigate('detail',{id:prevQ.id});
}else if(e.key==='Enter'){
e.preventDefault();toggleAnswer();
}else if(e.key==='f'){
Store.toggleFavorite(q.id);renderPage();
}else if(e.key==='m'){
Store.toggleMastered(q.id);renderPage();
}else if(e.key==='Escape'){
navigate('questions');
}
});

function exportData(){
const data={
mastered:Store.getMastered(),
favorites:Store.getFavorites(),
collected:Store.getCollected(),
checkins:Store.getCheckins(),
sources:Store.getSources(),
exportDate:new Date().toISOString()
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='codeinterview-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
URL.revokeObjectURL(url);toast('数据已导出','success');
}

function importData(event){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
try{
const data=JSON.parse(e.target.result);
if(data.mastered)Store.setMastered(data.mastered);
if(data.favorites)Store.setFavorites(data.favorites);
if(data.collected)Store.setCollected(data.collected);
if(data.checkins)Store.setCheckins(data.checkins);
if(data.sources)Store.setSources(data.sources);
toast('数据导入成功！','success');renderPage();
}catch(err){toast('导入失败：'+err.message,'error')}
};
reader.readAsText(file);
event.target.value='';
}

function clearAllData(){
if(!confirm('确定要清除所有数据吗？此操作不可恢复！'))return;
const keys=Object.keys(localStorage).filter(k=>k.startsWith('ci_'));
keys.forEach(k=>localStorage.removeItem(k));
Store._cache={};
toast('数据已清除','success');renderPage();
}

function init(){
const theme=Store.getTheme();
document.documentElement.setAttribute('data-theme',theme);
document.querySelector('.theme-toggle').textContent=theme==='dark'?'🌙':'☀️';
parseHash();renderPage();
const mastered=Store.getMastered();
if(mastered.length>0&&!Store.get('lastBackupReminder',null)){
const lastReminder=Store.get('lastBackupReminder','');
const now=new Date().toISOString().slice(0,7);
if(lastReminder!==now){
Store.set('lastBackupReminder',now);
setTimeout(()=>toast('💡 提示：定期导出数据可防止丢失，点击统计页面的"导出数据"按钮','info'),3000);
}
}
}

init();
</script>
